<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #000;
  --s1:     #0c0c0c;
  --s2:     #141414;
  --s3:     #1c1c1c;
  --bd:     rgba(255,255,255,0.06);
  --bd2:    rgba(102,88,255,0.28);
  --tx:     #f0ede8;
  --tx2:    #666;
  --tx3:    #333;
  --ac:     #6658ff;
  --ac-dim: rgba(102,88,255,0.12);
  --ok:     #00d97e;
  --err:    #ff3366;
  --warn:   #ffb800;
  --r-sm:   6px;
  --r-md:   10px;
  --r-lg:   16px;
}
body {
  background: var(--bg);
  color: var(--tx);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 3px; }

.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--s1);
  border-right: 1px solid var(--bd);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 20;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo-mark {
  width: 30px; height: 30px;
  background: var(--ac); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
  letter-spacing: -0.05em; flex-shrink: 0;
}
.sidebar-logo-text { font-size: 13px; font-weight: 600; color: var(--tx); letter-spacing: -0.02em; }
.sidebar-logo-sub  { font-size: 10px; color: var(--tx2); margin-top: 1px; }
.nav { padding: 12px 10px; flex: 1; }
.nav-item {

  padding: 9px 10px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 400; color: var(--tx2);
  cursor: pointer; transition: background .12s, color .12s;
  margin-bottom: 2px; border: none; background: transparent;
  width: 100%; text-align: left;
}
.nav-item:hover { background: var(--s2); color: var(--tx); }
.nav-item.active { background: var(--ac-dim); color: var(--ac); font-weight: 500; }
.sidebar-footer { padding: 14px 10px; border-top: 1px solid var(--bd); }
.user-chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--r-sm); cursor: pointer; }
.user-chip:hover { background: var(--s2); }
.user-avatar {

}
.user-email { font-size: 11px; color: var(--tx2); }

/* Main */
.main { margin-left: 220px; flex: 1; min-height: 100vh; }
.topbar {

.topbar-title { font-size: 14px; font-weight: 600; color: var(--tx); letter-spacing: -0.02em; }

.content { padding: 28px; max-width: 1060px; }

.region-row-meta { display: flex; align-items: center; gap: 12px; }
.region-row-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--tx2); }
.region-row-pct { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--tx); }
.region-bar { height: 3px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.region-bar-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

/* Btn */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: var(--r-sm); font-family: 'DM Sans', sans-serif;

.btn-ghost { background: var(--s2); color: var(--tx); border: 1px solid var(--bd); }
.btn-ghost:hover { opacity: .8; }

/* Tooltip */
.pie-center-label {

@media (max-width: 760px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr; }

</style>

// ── SVG Pie ──────────────────────────────────────────────────────
function polarToXY(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function PieChart({ data, size = 180, innerR = 62, hoveredIdx, setHoveredIdx }) {
  const cx = size / 2, cy = size / 2, r = size / 2 - 6;
  let cursor = 0;
  const slices = data.map((d, i) => {
    const start = cursor;
    const sweep = (d.pct / 100) * 360;
    cursor += sweep;
    const end = cursor;
    const s = polarToXY(cx, cy, r, start);
    const e = polarToXY(cx, cy, r, end);
    const li = polarToXY(cx, cy, innerR, start);
    const lo = polarToXY(cx, cy, innerR, end);
    const large = sweep > 180 ? 1 : 0;
    const path = [
      `M ${s.x} ${s.y}`,
      `A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`,
      `L ${lo.x} ${lo.y}`,
      `A ${innerR} ${innerR} 0 ${large} 0 ${li.x} ${li.y}`,
      'Z'
    ].join(' ');
    return { path, color: ASSET_COLORS[d.label] || '#555', d, i };
  });

  const hov = hoveredIdx !== null ? data[hoveredIdx] : null;

  return (
    <svg width={size} height={size} style={{overflow:'visible'}}>
      {slices.map(s => (
        <path
          key={s.i}
          d={s.path}
          fill={s.color}
          opacity={hoveredIdx === null ? 1 : hoveredIdx === s.i ? 1 : 0.35}
          style={{cursor:'pointer', transition:'opacity .2s'}}
          onMouseEnter={() => setHoveredIdx(s.i)}
          onMouseLeave={() => setHoveredIdx(null)}
        />
      ))}
      <circle cx={cx} cy={cy} r={innerR - 2} fill="#0c0c0c"/>
      {hov ? (
        <>
          <text x={cx} y={cy - 10} textAnchor="middle" fill="#f0ede8" fontSize="15" fontFamily="DM Mono" fontWeight="500">{hov.pct}%</text>
          <text x={cx} y={cy + 8} textAnchor="middle" fill="#666" fontSize="9" fontFamily="DM Sans" letterSpacing="1">{hov.label.toUpperCase()}</text>
          <text x={cx} y={cy + 24} textAnchor="middle" fill="#666" fontSize="9" fontFamily="DM Mono">${hov.val?.toLocaleString()}</text>
        </>
      ) : (
        <>
          <text x={cx} y={cy - 4} textAnchor="middle" fill="#f0ede8" fontSize="13" fontFamily="DM Mono" fontWeight="500">Dağılım</text>
          <text x={cx} y={cy + 14} textAnchor="middle" fill="#666" fontSize="9" fontFamily="DM Sans" letterSpacing="1">HOVERla</text>
        </>
      )}
    </svg>
  );
}

            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-chip">
            <div className="user-avatar">AK</div>
            <div className="user-email">ahmet@mail.com</div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="main">
        <header className="topbar">
          <span className="topbar-title">Analiz</span>
          <div className="topbar-right">
            <div className="period-bar">
              {['1A','3A','6A','YTD','1Y','Tümü'].map(p => (
                <button key={p} className={`period-btn${period===p?' on':''}`} onClick={() => setPeriod(p)}>{p}</button>
              ))}
            </div>
          </div>
        </header>

        <div className="content">

          {/* KPI strip */}
          <div className="kpi-grid" style={{marginBottom:24}}>
            {KPI.map(k => (
              <div key={k.label} className="kpi-card">
                <div className="kpi-label">{k.label}</div>
                <div className={`kpi-value${k.cls ? ' '+k.cls : ''}`}>{k.value}</div>
                <div className="kpi-sub">{k.sub}</div>
              </div>
            ))}
          </div>

          {/* Row 1: Pie + Win/Loss */}
          <div className="grid-2 mb16">

            {/* Pie */}
            <div className="card">
              <div className="card-header">
                <div>
                  <div className="card-title">Varlık Dağılımı</div>
                  <div className="card-sub">
                    {assetFilter ? `${assetFilter} kırılımı` : 'Genel portföy dağılımı'}
                  </div>
                </div>
                {assetFilter && (
                  <button className="btn btn-ghost" style={{fontSize:11,padding:'4px 10px'}} onClick={() => { setAssetFilter(null); setPieHov(null); }}>
                    ← Genel
                  </button>
                )}
              </div>
              {/* Asset type pills */}
              {!assetFilter && (
                <div style={{padding:'12px 20px 0', borderBottom:'1px solid var(--bd)', display:'flex', gap:6, flexWrap:'wrap', paddingBottom:12}}>
                  {Object.keys(ASSET_BREAKDOWN).map(key => (
                    <button
                      key={key}
                      className="asset-chip"
                      onClick={() => { setAssetFilter(key); setPieHov(null); }}
                      style={{borderColor: ASSET_COLORS[key]+'44', color: ASSET_COLORS[key]}}
                    >
                      {key}
                    </button>
                  ))}
                </div>
              )}
              <div className="pie-layout">
                <div className="pie-svg-wrap">
                  <PieChart
                    data={pieData}
                    size={170}
                    innerR={58}
                    hoveredIdx={pieHov}
                    setHoveredIdx={setPieHov}
                  />
                </div>
                <div className="pie-legend">
                  {pieData.map((d, i) => {
                    const color = assetFilter
                      ? breakdownColors[i % breakdownColors.length]
                      : ASSET_COLORS[d.label] || '#555';
                    return (
                      <div
                        key={d.label}
                        className={`pie-row${pieHov === i ? ' active' : ''}`}
                        onMouseEnter={() => setPieHov(i)}
                        onMouseLeave={() => setPieHov(null)}
                      >
                        <div className="pie-dot" style={{background: color}}/>
                        <span className="pie-row-label">{d.label}</span>
                        <span className="pie-row-val">${d.val?.toLocaleString()}</span>
                        <span className="pie-row-pct">{d.pct}%</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Win / Loss */}
            <div className="card">
              <div className="card-header">
                <div>
                  <div className="card-title">Kazanan / Kaybeden İşlemler</div>
                  <div className="card-sub">Aylık işlem performansı</div>
                </div>
              </div>
              <div className="winloss-wrap">
                <div className="winloss-header">
                  <div className="winloss-stat">
                    <div className="winloss-stat-val" style={{color:'var(--ok)'}}>{winPct}%</div>
                    <div className="winloss-stat-lbl">Win Rate</div>
                  </div>
                  <div className="winloss-divider"/>
                  <div className="winloss-stat">
                    <div className="winloss-stat-val" style={{color:'var(--ok)'}}>{totalWin}</div>
                    <div className="winloss-stat-lbl">Kazanan</div>
                  </div>
                  <div className="winloss-divider"/>
                  <div className="winloss-stat">
                    <div className="winloss-stat-val" style={{color:'var(--err)'}}>{totalLoss}</div>
                    <div className="winloss-stat-lbl">Kaybeden</div>
                  </div>
                  <div className="winloss-divider"/>
                  <div className="winloss-stat">
                    <div className="winloss-stat-val" style={{color:'var(--tx)'}}>{totalTrades}</div>
                    <div className="winloss-stat-lbl">Toplam</div>
                  </div>
                </div>

                <div className="winloss-bar-track">
                  <div className="winloss-bar-win" style={{width:`${winPct}%`}}/>
                  <div className="winloss-bar-loss" style={{width:`${100-winPct}%`}}/>
                </div>
                <div className="winloss-labels">
                  <span style={{color:'var(--ok)'}}>● Kazanan {winPct}%</span>
                  <span style={{color:'var(--err)'}}>Kaybeden {100-winPct}% ●</span>
                </div>

                {/* Monthly bars */}
                <div className="winloss-months">
                  {MONTHLY_TRADES.map((m, i) => {
                    const total = m.win + m.loss;
                    const maxH = 64;
                    const winH = Math.round((m.win / maxMonthTotal) * maxH);
                    const lossH = Math.round((m.loss / maxMonthTotal) * maxH);
                    return (
                      <div key={m.month} className="month-bar-wrap">
                        <div style={{display:'flex', flexDirection:'column', gap:1, justifyContent:'flex-end', height: maxH+'px'}}>
                          <div className="month-bar-inner" style={{height:winH+'px', background:'var(--ok)', opacity:.7, borderRadius:'2px 2px 0 0'}} title={`${m.win} kazanan`}/>
                          <div className="month-bar-inner" style={{height:lossH+'px', background:'var(--err)', opacity:.5, borderRadius:'0 0 2px 2px'}} title={`${m.loss} kaybeden`}/>
                        </div>
                        <div className="month-lbl">{m.month}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          {/* Row 2: Commission + Region */}
          <div className="grid-2">

            {/* Commission */}
            <div className="card">
              <div className="card-header">
                <div>
                  <div className="card-title">Ödenen Komisyon</div>
                  <div className="card-sub">Seçili dönemde toplam komisyon gideri</div>
                </div>
              </div>
              <div className="commission-wrap">
                <div className="commission-total">${totalCommission.toFixed(2)}</div>
                <div className="commission-sub">98 işlemde ortalama ${(totalCommission/98).toFixed(2)} komisyon/işlem</div>
                <div className="commission-rows">
                  {COMMISSION_DATA.map(c => (
                    <div key={c.label} className="comm-row">
                      <div style={{flex:1}}>
                        <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                          <span className="comm-row-label">{c.label}</span>
                          <div style={{display:'flex', gap:16, alignItems:'center'}}>
                            <span className="comm-row-count">{c.trades} işlem</span>
                            <span className="comm-row-val">${c.amount.toFixed(2)}</span>
                          </div>
                        </div>
                        <div className="comm-bar">
                          <div className="comm-bar-fill" style={{width: `${(c.amount/maxComm)*100}%`}}/>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Region */}
            <div className="card">
              <div className="card-header">
                <div>
                  <div className="card-title">Bölge Dağılımı</div>
                  <div className="card-sub">Coğrafi portföy ağırlıkları</div>
                </div>
              </div>
              <div className="region-wrap">
                <div className="region-rows">
                  {REGION_DATA.map(r => (
                    <div key={r.label} className="region-row">
                      <div className="region-row-top">
                        <div style={{display:'flex', alignItems:'center', gap:8}}>
                          <div style={{width:8, height:8, borderRadius:2, background:r.color, flexShrink:0}}/>
                          <span className="region-row-label">{r.label}</span>
                        </div>
                        <div className="region-row-meta">
                          <span className="region-row-val">${r.val.toLocaleString()}</span>
                          <span className="region-row-pct">{r.pct}%</span>
                        </div>
                      </div>
                      <div className="region-bar">
                        <div className="region-bar-fill" style={{width:`${r.pct}%`, background:r.color, opacity:.7}}/>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  );
}

// ── Icons ────────────────────────────────────────────────────────
function IconGrid() { return <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/><rect x="9" y="1" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/><rect x="1" y="9" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/></svg>; }
function IconList() { return <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h11M2 11h11" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>; }
function IconChart() { return <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1 13l4-5 3 3 3-4 3 3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/><path d="M1 13h13" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>; }
function IconDoc() { return <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2.5" y="1" width="10" height="13" rx="1.5" stroke="currentColor" strokeWidth="1.2"/><path d="M5 5h5M5 7.5h5M5 10h3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>; }
function IconGear() { return <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="2" stroke="currentColor" strokeWidth="1.2"/><path d="M7.5 1.5v1M7.5 12.5v1M1.5 7.5h1M12.5 7.5h1M3.3 3.3l.7.7M11 11l.7.7M3.3 11.7l.7-.7M11 4l.7-.7" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>; }

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
