              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,fontWeight:700,fontFamily:"DM Mono,monospace",color:"var(--info)",cursor:"pointer",textDecoration:"underline",textDecorationColor:"transparent"}}
                  onMouseEnter={e=>e.currentTarget.style.textDecorationColor="var(--info)"}
                  onMouseLeave={e=>e.currentTarget.style.textDecorationColor="transparent"}
                  onClick={e=>{e.stopPropagation();openDetail&&openDetail(tk,undefined,"history");}}
                  data-tip="Detay sayfasını aç">{tk}</span>
                <span className="dim" style={{fontSize:11}}>{items.length} işlem</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {!hideAmts&&<span className="dim mono" style={{fontSize:11}}>{mask(groupSym+fmt(tot,0))}</span>}
                <span style={{color:"var(--text3)",fontSize:12}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>
            {isOpen&&items.map(t=>(
              <div key={t.id} style={{borderTop:"0.5px solid var(--border)"}}>
                {editId===t.id?(
                  <div style={{padding:"12px 14px",background:"var(--bg3)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      <div><div className="kk" style={{marginBottom:3}}>Tarih</div><input className="finp sm" type="date" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))} max={today()}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>İşlem</div>
                        <select className="finp sm" value={editForm.way} onChange={e=>setEditForm(f=>({...f,way:e.target.value}))}>
                          <option value="BUY">Alış</option><option value="SELL">Satış</option><option value="DIV">Temettü</option>
                        </select>
                      </div>
                      <div><div className="kk" style={{marginBottom:3}}>Para</div>
                        <select className="finp sm" value={editForm.currency} onChange={e=>setEditForm(f=>({...f,currency:e.target.value}))}>
                          <option>USD</option><option>TRY</option><option>EUR</option>
                        </select>
                      </div>
                      <div><div className="kk" style={{marginBottom:3}}>Adet</div><input className="finp sm" type="number" step="any" value={editForm.shares} onChange={e=>setEditForm(f=>({...f,shares:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Fiyat</div><input className="finp sm" type="number" step="any" value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Broker</div><input className="finp sm" maxLength={50} value={editForm.broker} onChange={e=>setEditForm(f=>({...f,broker:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Komisyon</div><input className="finp sm" type="number" step="any" value={editForm.commission||""} onChange={e=>setEditForm(f=>({...f,commission:e.target.value}))}/></div>
                    </div>
                    <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Toplam: {displaySym(editForm.currency)}{fmt((+editForm.shares)*(+editForm.price))}</div>
                    <div className="brow">
                      <button className="pri btn-md" onClick={()=>saveEdit(t)} disabled={saving}>{saving?"Kaydediliyor...":"Kaydet"}</button>
                      <button className="btn-md" onClick={()=>setEditId(null)}>İptal</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center",flex:1,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,color:"var(--text2)",fontFamily:"monospace",minWidth:80}}>{fmtDateTR(t.date)}</span>
                      <span className={t.way==="BUY"?"ok":t.way==="DIV"?"warn":"err"} style={{fontSize:11,minWidth:28}}>{t.way==="BUY"?"Alış":t.way==="DIV"?"Temettü":"Satış"}</span>
                      <span className="mono" style={{fontSize:12}}>{fmtShares(t.shares)} adet</span>
                      {!hideAmts&&<span className="mono dim" style={{fontSize:12}}>{mask(displaySym(t.currency)+fmt(t.price))}</span>}
                      {!hideAmts&&<span className="mono" style={{fontSize:12,fontWeight:600}}>{mask(displaySym(t.currency)+fmt(t.total,0))}</span>}
                      {t.broker&&<span className="dim" style={{fontSize:10}}>{t.broker}</span>}
                      {!hideAmts&&+t.commission>0&&<span className="dim" style={{fontSize:10}}>Kom: {mask(displaySym(t.currency)+fmt(+t.commission,2))}</span>}
                      {(()=>{
                        const af=(splits||[]).filter(s=>s.ticker===t.ticker&&s.split_date>t.date);
                        if(!af.length)return null;
                        const fac=af.reduce((a,s)=>a*+s.ratio,1);
                        const tip=`Bu işlem sonrası split: ${af.map(s=>`${s.split_date} ${s.ratio}:1`).join(" · ")}. Pozisyon hesabı ×${fac} uygulanır.`;
                        return<span className="badge split" data-tip={tip}>⚡ ×{fac}</span>;
                      })()}
                    </div>
                    <div className="brow" style={{gap:5}}>
                      <button className="btn-xs" onClick={()=>startEdit(t)}>Düzenle</button>
                      <button className="btn-xs btn-danger-out" onClick={()=>delTx(t)}>Sil</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── ManuelPosForm ────────────────────────────────────────────────
function ManuelPosForm({session,user,pos,loadData,flash_,confirm_,prefillType,portfolioId}){
  // prefillType: AddTab type-picker'dan gelen başlangıç tipi (US_STOCK/BIST/...).
  // BIST için currency varsayılanı TRY; diğerleri USD. Kullanıcı dropdown'larla
  // istediği zaman değiştirebilir; type değişimi `onChange`'de currency'i de
  // BIST'e göre günceller (mevcut davranış korunuyor).
  const initType = prefillType || "US_STOCK";
  const initCurrency = initType==="BIST" ? "TRY" : "USD";
  const E={ticker:"",name:"",type:initType,shares:"",avgCost:"",currency:initCurrency,broker:"",commission:"",date:today(),unit:"oz"};
  const [form,setForm]=useState(E);
  const [curPrice,setCurPrice]=useState(null);
  // Fiyat fetch sonucu hakkında inline uyarı/bilgi: {type:"ok"|"warn", text}.
  // warn: tarihin fiyatı yok, fallback kullanıldı → kullanıcı bilinçli kontrol etsin.
  const [priceNote,setPriceNote]=useState(null);
  const [fetchP,setFetchP]=useState(false);
  const [saving,setSaving]=useState(false);
  const [editTk,setEditTk]=useState(null);
  const [errs,setErrs]=useState({});
  const set=f=>setForm(p=>({...p,...f}));
  const validate=()=>{
    const e={};
    if(+form.shares<=0||isNaN(+form.shares))e.shares="Adet 0'dan büyük olmalı";
    if(+form.avgCost<=0||isNaN(+form.avgCost))e.avgCost="Fiyat 0'dan büyük olmalı";
    setErrs(e);
    return Object.keys(e).length===0;
  };

  const NAMES={SCHD:"Schwab US Dividend ETF",SPY:"SPDR S&P 500 ETF",QQQ:"Invesco QQQ Trust",MCHI:"iShares MSCI China ETF",VT:"Vanguard Total World ETF",NVDA:"NVIDIA Corp",SOFI:"SoFi Technologies",GOOGL:"Alphabet Inc",META:"Meta Platforms",KO:"Coca-Cola Co",UBER:"Uber Technologies",MNSO:"MINISO Group",AEVA:"Aeva Technologies",PYPL:"PayPal Holdings",SKLZ:"Skillz Inc",NNOX:"Nano-X Imaging",TSLA:"Tesla Inc",AAPL:"Apple Inc",MSFT:"Microsoft Corp",AMZN:"Amazon.com",BTC:"Bitcoin"};

  const fetchPrice=async(tk,date,typeOverride)=>{
    const upper=(tk||form.ticker).toUpperCase();
    const useDate=date||form.date||today();
    // typeOverride: onChange'lerden çağrıldığında stale closure yerine yeni tipi geçirmek için
    const at=typeOverride||form.type;
    if(!upper)return;
    if(NAMES[upper])set({name:NAMES[upper]});
    setFetchP(true);setCurPrice(null);setPriceNote(null);
    // Sembol: form.currency'den (kullanıcı override edebildiği için type yerine currency referans).
    const sym = displaySym(form.currency);
    try{
      // Önce date-spesifik dene; hafta sonu / tatil 403 verirse latest close'a fallback.
      const r=await edgeCall("fetch-prices",{ticker:upper,mode:"price",date:useDate,asset_type:at});
      const d=await r.json();
      let price=d.result?.price;
      let fallback=false;
      let fallbackDate=null;
      if(!price){
        DEBUG && console.warn(`[fetchPrice ${upper}] date fail`,d.result?.error||d.error);
        const r2=await edgeCall("fetch-prices",{ticker:upper,mode:"price",asset_type:at});
        const d2=await r2.json();
        if(d2.result?.price){
          price=d2.result.price;
          fallback=true;
          fallbackDate=d2.date||null;
        } else {
          const msg=d2.result?.error||d.result?.error||d.error||"fiyat alınamadı";
          DEBUG && console.warn(`[fetchPrice ${upper}] no fallback`,msg);
          setPriceNote({type:"err", text:`${upper}: ${msg}`});
        }
      }
      if(price){
        setCurPrice(price);
        set({avgCost:price.toFixed(2)});
        if(fallback){
          // avgCost yine de doldurulur ama uyarı persistent: kullanıcı tarihi
          // kontrol edip gerekirse manuel düzeltsin.
          setPriceNote({
            type:"warn",
            text:`⚠ ${fmtDateTR(useDate)} için veri yok${fallbackDate?` — ${fmtDateTR(fallbackDate)} kapanışı kullanıldı`:" — en son kapanış kullanıldı"} (${sym}${fmt(price)}). Tarih hafta sonu/tatil olabilir; düzeltebilir veya devam edebilirsin.`,
          });
        } else {
          setPriceNote({type:"ok", text:`${fmtDateTR(useDate)} fiyatı: ${sym}${fmt(price)}`});
        }
      }
    }catch(e){
      DEBUG && console.warn(`[fetchPrice ${upper}]`,e);
      setPriceNote({type:"err", text:`${upper} fiyatı alınamadı: ${e.message}`});
    }
    setFetchP(false);
  };

  const startEdit=p=>{
    setEditTk(p.ticker);
    setForm({...E,ticker:p.ticker,name:p.name,type:p.type,shares:p.shares,avgCost:p.avgCost,currency:p.currency,broker:p.broker||""});
    fetchPrice(p.ticker);
  };

  const savePos=async()=>{
    if(!form.ticker||!form.shares||!form.avgCost)return;
    if(!validate())return;
    setSaving(true);
    const tk=form.ticker.toUpperCase();
    const nm=form.name||tk;
    // GOLD: kullanıcı seçili birimde giriyor → oz-eşdeğerine çevir.
    // oz dışındaki birimler: shares × ozFactor = oz, avgCost / ozFactor = $/oz.
    // factor=1 (oz veya diğer tipler) → math unchanged.
    const ozFactor = form.type==="GOLD" ? goldOzPerUnit(form.unit||'oz') : 1;
    const sh = +form.shares * ozFactor;   // shares artık oz-eşdeğeri
    const pr = +form.avgCost / ozFactor;  // avg_cost artık $/oz (veya currency/oz)

    // Transaction'a yaz
    const goldUnitNote = form.type==="GOLD"&&form.unit&&form.unit!=="oz" ? `Manuel giriş (${form.unit})` : "Manuel giriş";
    const tx={
      user_id:user.id,
      date:form.date||today(),
      ticker:tk,name:nm,
      asset_type:form.type,
      way:"BUY",
      shares:sh,price:pr,
      currency:form.currency,
      total:+(sh*pr).toFixed(4),
      broker:form.broker||"",
      commission:+(form.commission||0),exchange:"",notes:goldUnitNote,
      portfolio_id:portfolioId
    };
    const{error:te}=await sb.from("transactions").insert(tx);
    if(te){flash_(te.message,"err");setSaving(false);return;}

    // Pozisyonu güncelle
    const ex=pos.find(x=>x.ticker===tk);
    const ns=(ex?.shares||0)+sh;
    const na=((ex?.shares||0)*(ex?.avgCost||0)+sh*pr)/ns;
    await sb.from("positions").upsert({
      user_id:user.id,ticker:tk,name:nm,type:form.type,
      shares:+ns.toFixed(6),avg_cost:+na.toFixed(6),
      currency:form.currency,broker:form.broker||"",
      unit:form.type==="GOLD"?(form.unit||'oz'):null,
      updated_at:new Date().toISOString(),
      portfolio_id:portfolioId
    },{onConflict:"user_id,ticker"});

    await loadData();
    flash_(`${tk} işlem geçmişine ve pozisyona eklendi ✓`);
    setEditTk(null);setForm(E);setCurPrice(null);
    setSaving(false);
  };

  const delPos=async(tk)=>{
    if(!(await confirm_(`${tk} pozisyonu silinsin mi?`,{okLbl:"Sil"})))return;
    await sb.from("positions").delete().eq("user_id",user.id).eq("ticker",tk).eq("portfolio_id",portfolioId);
    await loadData();flash_(`${tk} silindi`);
  };

  return(
    <div>
      <div className="cbox" style={{marginBottom:16}}>
        <div className="lbl" style={{marginBottom:12}}>{editTk?`${editTk} — Düzenle`:"Yeni Pozisyon Ekle"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <div className="kk" style={{marginBottom:4}}>Tarih</div>
            <input className="finp" type="date" value={form.date}
              onChange={e=>{
                const newDate=e.target.value;
                set({date:newDate});
                setCurPrice(null);
                // Ticker zaten girilmişse, yeni tarihin fiyatını otomatik çek
                if(form.ticker&&newDate)fetchPrice(form.ticker,newDate);
              }}
              max={today()}/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Ticker *</div>
            <div style={{display:"flex",gap:6}}>
              <input className="finp" style={{textTransform:"uppercase"}} maxLength={20} value={form.ticker}
                onChange={e=>{set({ticker:e.target.value.toUpperCase(),name:"",avgCost:""});setCurPrice(null);setPriceNote(null);}}
                onBlur={e=>e.target.value&&fetchPrice(e.target.value)}
                placeholder="AAPL" disabled={!!editTk}/>
              <button style={{whiteSpace:"nowrap",fontSize:12,padding:"7px 10px"}}
                onClick={()=>fetchPrice()} disabled={fetchP||!form.ticker}>
                {fetchP?<div className="spin" style={{width:12,height:12}}></div>:"↻"}
              </button>
            </div>
            {form.type==="CRYPTO"&&!editTk&&(
              <div style={{marginTop:6}}>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:4}}>Popüler:</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {CRYPTO_SYMBOLS.map(({sym,name})=>(
                    <button key={sym} type="button" className="btn-xs"
                      onClick={()=>{set({ticker:sym,name});setCurPrice(null);fetchPrice(sym);}}
                      style={{fontSize:10,padding:"3px 8px"}}>{sym}</button>
                  ))}
                </div>
              </div>
            )}
            {form.type==="GOLD"&&!editTk&&(
              <div style={{marginTop:6}}>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:4}}>Emtia (1 ons = 31.1035 g):</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {COMMODITY_SYMBOLS.map(({sym,name})=>(
                    <button key={sym} type="button" className="btn-xs"
                      onClick={()=>{set({ticker:sym,name:`${name} (1 ons)`});setCurPrice(null);fetchPrice(sym);}}
                      style={{fontSize:10,padding:"3px 8px",display:"inline-flex",alignItems:"center",gap:4}}>
                      <span style={{color:"var(--warn)",display:"flex"}}>{COMMODITY_ICONS[sym]&&COMMODITY_ICONS[sym](14)}</span>{sym}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {form.type==="GOLD"&&(
              <div style={{marginTop:8}}>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:4}}>Birim:</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {GOLD_UNITS.map(({key,label})=>(
                    <button key={key} type="button"
                      className={"btn-xs"+(form.unit===key?" on":"")}
                      onClick={()=>set({unit:key})}
                      style={{fontSize:10,padding:"3px 8px"}}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {priceNote&&(
              <div style={{
                fontSize:11,
                marginTop:6,
                padding:priceNote.type==="ok"?"0":"6px 10px",
                borderRadius:priceNote.type==="ok"?0:6,
                background:priceNote.type==="warn"?"rgba(255,184,0,0.08)":priceNote.type==="err"?"rgba(255,51,102,0.08)":"transparent",
                border:priceNote.type==="warn"?"1px solid rgba(255,184,0,0.25)":priceNote.type==="err"?"1px solid rgba(255,51,102,0.25)":"none",
                color:priceNote.type==="ok"?"var(--ok)":priceNote.type==="warn"?"var(--warn)":"var(--err)",
                lineHeight:1.4,
              }}>{priceNote.text}</div>
            )}
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Şirket Adı</div>
            <input className="finp" maxLength={100} value={form.name} onChange={e=>set({name:e.target.value})} placeholder="Apple Inc"/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Varlık Türü</div>
            <select className="finp" value={form.type} onChange={e=>{
              const newType=e.target.value;
              const upd={type:newType};
              // Currency varsayılanları — kullanıcı manuel override edebilir
              if(newType==="BIST")upd.currency="TRY";
              else if(newType==="CRYPTO"||newType==="US_STOCK"||newType==="FUND"||newType==="GOLD")upd.currency="USD";
              set(upd);
              // Type değişince eski fiyat geçersiz; ticker varsa yeniden çek
              setCurPrice(null);
              if(form.ticker)fetchPrice(form.ticker,form.date,newType);
            }}>
              <option value="US_STOCK">Hisse (US)</option>
              <option value="FUND">ETF / Fon</option>
              <option value="CRYPTO">Kripto</option>
              <option value="BIST">BIST</option>
              <option value="GOLD">Altın</option>
              <option value="FX">Döviz</option>
            </select>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Para Birimi</div>
            <select className="finp" value={form.currency} onChange={e=>set({currency:e.target.value})}>
              <option>USD</option><option>TRY</option><option>EUR</option>
            </select>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>{form.type==="GOLD"?`Adet * (${GOLD_UNITS.find(g=>g.key===form.unit)?.label||'oz'})`:"Adet *"}</div>
            <input className="finp" type="number" step="any" value={form.shares}
              aria-invalid={!!errs.shares}
              style={errs.shares?{borderColor:"var(--err)"}:{}}
              onChange={e=>{set({shares:e.target.value});if(errs.shares)setErrs(p=>({...p,shares:undefined}));}}
              onBlur={()=>{if(form.shares&&+form.shares<=0)setErrs(p=>({...p,shares:"Adet 0'dan büyük olmalı"}));}}
              placeholder="0"/>
            {errs.shares&&<div style={{fontSize:11,color:"var(--err)",marginTop:3}}>{errs.shares}</div>}
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>{form.type==="GOLD"?`Ort. Maliyet * (${form.currency}/${GOLD_UNITS.find(g=>g.key===form.unit)?.label||'oz'})`:"Ort. Maliyet *"}</div>
            <input className="finp" type="number" step="any" value={form.avgCost}
              aria-invalid={!!errs.avgCost}
              style={errs.avgCost?{borderColor:"var(--err)"}:{}}
              onChange={e=>{set({avgCost:e.target.value});if(errs.avgCost)setErrs(p=>({...p,avgCost:undefined}));}}
              onBlur={()=>{if(form.avgCost&&+form.avgCost<=0)setErrs(p=>({...p,avgCost:"Fiyat 0'dan büyük olmalı"}));}}
              placeholder="0.00"/>
            {errs.avgCost&&<div style={{fontSize:11,color:"var(--err)",marginTop:3}}>{errs.avgCost}</div>}
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Broker</div>
            <input className="finp" maxLength={50} value={form.broker} onChange={e=>set({broker:e.target.value})} placeholder="Akbank, Midas..."/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Komisyon</div>
            <input className="finp" type="number" step="any" value={form.commission} onChange={e=>set({commission:e.target.value})} placeholder="0.00"/>
          </div>
          <div style={{display:"flex",alignItems:"flex-end"}}>
            {form.shares&&form.avgCost?(
              <div style={{fontSize:11,color:"var(--text2)",padding:"7px 0"}}>
                Maliyet: {form.currency==="TRY"?"₺":"$"}{fmt((+form.shares)*(+form.avgCost),0)}
                {curPrice&&<><br/>Piyasa: {form.currency==="TRY"?"₺":"$"}{fmt((+form.shares)*curPrice,0)}</>}
              </div>
            ):null}
          </div>
        </div>
        <div className="brow">
          <button className="pri" onClick={savePos} disabled={saving||!form.ticker||!form.shares||!form.avgCost}>
            {saving?"Kaydediliyor...":(editTk?"Güncelle":"Pozisyon Kaydet")}
          </button>
          {editTk&&<button onClick={()=>{setEditTk(null);setForm(E);setCurPrice(null);}}>İptal</button>}
        </div>
        <div style={{fontSize:11,color:"var(--text2)",marginTop:8}}>ℹ Bu form bir BUY işlemi kaydeder ve mevcut pozisyonu günceller.</div>
      </div>

      {pos.filter(p=>p.currency==="USD").length>0&&(
        <div>
          <div className="stitle">Mevcut Pozisyonlar</div>
          {[...pos].filter(p=>p.currency==="USD").sort((a,b)=>a.ticker.localeCompare(b.ticker)).map(p=>(
            <div key={p.ticker} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"0.5px solid var(--border)"}}>
              <div>
                <span style={{fontWeight:700,fontSize:13,fontFamily:"monospace"}}>{p.ticker}</span>
                <span className="dim" style={{fontSize:11,marginLeft:8}}>{fmtShares(p.shares)} adet · ${fmt(p.avgCost)} ort.</span>
                {p.broker&&<span className="dim" style={{fontSize:10,marginLeft:6}}>· {p.broker}</span>}
              </div>
              <div className="brow" style={{gap:5}}>
                <button className="btn-xs" onClick={()=>startEdit(p)}>Düzenle</button>
                <button className="btn-xs btn-danger-out" onClick={()=>delPos(p.ticker)}>Sil</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SearchTab ────────────────────────────────────────────────────
// Global ticker arama: portföydeki + tüm SEC kayıtlı US hisseler.
// Sonuca tıklayınca TickerDetailTab açılır (held veya not held).
function SearchTab({pos,txs,openDetail,flash_}){
  const [q,setQ]=useState("");
  const [tickerDb,setTickerDb]=useState(()=>tickerDbCacheGet());
  const [loading,setLoading]=useState(false);
  const [recent,setRecent]=useState(()=>LS.get("il_recent_search",[]));
  const clearRecent=()=>{setRecent([]);LS.set("il_recent_search",[]);};
  const handleOpen=(ticker,type)=>{
    const next=[ticker,...recent.filter(t=>t!==ticker)].slice(0,8);
    setRecent(next);LS.set("il_recent_search",next);
    openDetail(ticker,type);
  };

  useEffect(()=>{
    if(tickerDb)return;
    setLoading(true);
    // ticker_db tablosunu doğrudan Supabase'den oku (edge function / SEC EDGAR bypass).
    // Tablo haftalık pg_cron ile sync-ticker-db modu üstünden beslenir.
    sb.from("ticker_db").select("ticker,name,exchange").limit(15000)
      .then(({data,error})=>{
        if(error||!data||data.length===0){
          // Supabase okuma başarısız veya tablo henüz dolu değilse edge fn fallback
          return edgeCall("fetch-fundamentals",{mode:"ticker-list"})
            .then(r=>r.json())
            .then(d=>{ if(Array.isArray(d.list)){tickerDbCacheSet(d.list);setTickerDb(d.list);} });
        }
        tickerDbCacheSet(data);
        setTickerDb(data);
      })
      .catch(e=>flash_("Ticker DB hatası: "+e.message,"err"))
      .finally(()=>setLoading(false));
  },[]);

  const qTrim=q.trim();
  const qLower=qTrim.toLowerCase();
  const qUpper=qTrim.toUpperCase();

  // Portföy ticker'ları: aktif pozisyon + geçmiş işlem (kapatılmış pozisyon dahil)
  // type da tutulur — search'ten detay'a giderken asset_type'ı geçirmek için.
  const portfolioMap=new Map();
  pos.forEach(p=>portfolioMap.set(p.ticker,{name:p.name||"",held:true,type:p.type}));
  txs.forEach(t=>{ if(!portfolioMap.has(t.ticker))portfolioMap.set(t.ticker,{name:t.name||"",held:false,type:t.asset_type}); });

  const portfolioMatches=qTrim?[...portfolioMap.entries()].filter(([t,info])=>
    t.includes(qUpper)||info.name.toLowerCase().includes(qLower)
  ).map(([ticker,info])=>({ticker,name:info.name,held:info.held,type:info.type,exchange:info.type==="BIST"?"XIST":"US"})):[];

  const portfolioSet=new Set(portfolioMap.keys());
  const allMatches=qTrim&&tickerDb?tickerDb.filter(({ticker,name})=>
    !portfolioSet.has(ticker)&&(ticker.startsWith(qUpper)||(name||"").toLowerCase().includes(qLower))
  ).slice(0,50):[];

  // exchange → asset_type mapping (openDetail'e geçirilir)
  const exchToType = (ex) => ex==="XIST" ? "BIST" : "US_STOCK";

  const nameFor=(ticker)=>{const pm=portfolioMap.get(ticker);if(pm?.name)return pm.name;return tickerDb?.find(x=>x.ticker===ticker)?.name||"";};
  const typeFor=(ticker)=>{const pm=portfolioMap.get(ticker);if(pm?.type)return pm.type;return tickerDb?.find(x=>x.ticker===ticker)?.exchange==="XIST"?"BIST":"US_STOCK";};

  const Row=({ticker,name,held,exchange,type})=>{
    const ex = exchange || (type==="BIST"?"XIST":"US");
    const at = type || exchToType(ex);
    return (
      <div onClick={()=>handleOpen(ticker,at)} className="pos-row" style={{
        display:"flex",alignItems:"center",gap:10,
        padding:"11px 14px",borderBottom:"0.5px solid var(--border)"
      }}>
        <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600,fontSize:13,minWidth:72}}>{ticker}</span>
        <span style={{flex:1,fontSize:12,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name||"—"}</span>
        {ex==="XIST"&&<span className="badge cry" style={{fontSize:9}}>BIST</span>}
        {held&&<span className="badge etf" style={{fontSize:9}}>açık</span>}
        <span style={{color:"var(--text3)",fontSize:14}}>›</span>
      </div>
    );
  };

  return(
    <div>
      <input type="text" autoFocus value={q} onChange={e=>setQ(e.target.value)}
        placeholder="🔍 Ticker (AAPL) veya şirket adı (Apple)…"
        maxLength={64} data-test="search-input"
        style={{marginBottom:14}}/>

      {loading&&<div className="dim" style={{fontSize:13,padding:"20px 0",textAlign:"center"}}>
        <span className="spin" style={{width:14,height:14,marginRight:8,verticalAlign:"middle"}}></span>
        Ticker veritabanı yükleniyor…
      </div>}

      {!qTrim&&!loading&&(
        <div>
          {recent.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span className="stitle" style={{marginBottom:0}}>Son Aramalar</span>
                <button onClick={clearRecent} style={{fontSize:11,color:"var(--text3)",background:"transparent",border:"none",cursor:"pointer",padding:"2px 4px"}}>Temizle</button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {recent.map(t=>(
                  <button key={t} onClick={()=>handleOpen(t,typeFor(t))}
                    style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,
                      padding:"5px 12px",borderRadius:8,background:"var(--bg3)",
                      border:"1px solid var(--border)",cursor:"pointer",color:"var(--text)"}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div className="dim" style={{fontSize:13,padding:recent.length>0?"12px 0":"30px 0",textAlign:"center"}}>
            Ticker veya şirket adı yazarak başla
            {tickerDb&&(()=>{
              const us=tickerDb.filter(x=>x.exchange!=="XIST").length;
              const bist=tickerDb.filter(x=>x.exchange==="XIST").length;
              return <div style={{fontSize:11,marginTop:6,color:"var(--text3)"}}>{us.toLocaleString("tr-TR")} US + {bist.toLocaleString("tr-TR")} BIST hisse aranabilir</div>;
            })()}
          </div>
        </div>
      )}

      {qTrim&&!loading&&(()=>{
        const noResults=portfolioMatches.length===0&&allMatches.length===0;
        if(noResults){
          return(
            <div className="empty-card" style={{padding:"30px 20px"}}>
              <div className="ic">🔍</div>
              <div className="ttl">Sonuç yok</div>
              <div className="sub">"{qTrim}" için eşleşen ticker veya şirket bulunamadı.</div>
            </div>
          );
        }
        return(
          <div>
            {portfolioMatches.length>0&&(
              <div style={{marginBottom:18,border:"0.5px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
                <div className="stitle" style={{padding:"10px 14px",margin:0,background:"var(--bg3)"}}>Portföyünden · {portfolioMatches.length}</div>
                {portfolioMatches.map(m=><Row key={m.ticker} {...m}/>)}
              </div>
            )}
            {allMatches.length>0&&(
              <div style={{border:"0.5px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
                <div className="stitle" style={{padding:"10px 14px",margin:0,background:"var(--bg3)"}}>Tüm hisseler · {allMatches.length}{allMatches.length===50?"+":""}</div>
                {allMatches.map(m=><Row key={m.ticker} {...m} held={false}/>)}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ── AddTab ───────────────────────────────────────────────────────
// AddTab giriş noktası: context-free butonlardan açılınca önce varlık türü
// seçtirir. Detay sayfasından gelen "+ Ekle" akışı AddTxInline kullandığı
// için bu adım sadece AddTab'a özel.
const ADD_TYPES = [
  {type:"US_STOCK", label:"US Hisse",   desc:"NYSE / NASDAQ — AAPL, TSLA"},
  {type:"BIST",     label:"BIST",       desc:"Borsa İstanbul — THYAO, ASELS"},
  {type:"FUND",     label:"ETF / Fon",  desc:"SPY, QQQ, VT"},
  {type:"CRYPTO",   label:"Kripto",     desc:"BTC, ETH"},
  {type:"GOLD",     label:"Altın",      desc:"Spot ons (XAUUSD)"},
  {type:"FX",       label:"Döviz",      desc:"USDTRY, EURUSD"},
];

function AddTab({session,user,pos,loadData,flash_,confirm_,portfolioId}){
  const [pickedType,setPickedType]=useState(null);  // null = picker; set → mode tabs
  const [mode,setMode]=useState("text");
  const [parsed,setParsed]=useState(null);
  const [parsing,setParsing]=useState(false);
  const [parseErr,setParseErr]=useState("");
  const [textInput,setTextInput]=useState("");
  const [imgFile,setImgFile]=useState(null);
  const [csvText,setCsvText]=useState("");
  const [csvRows,setCsvRows]=useState([]);
  const [csvSkipped,setCsvSkipped]=useState(0);
  const [csvBusy,setCsvBusy]=useState(false);
  const [progStep,setProgStep]=useState("");
  const [progPct,setProgPct]=useState(0);
  const [progDone,setProgDone]=useState(false);
  const fileRef=useRef(null);

  const switchMode=m=>{setMode(m);setParsed(null);setParseErr("");};

  // Tipi değiştir → buffer temizle, mode'u text'e resetle, picker'a dön
  const resetType=()=>{
    setPickedType(null);
    setMode("text");
    setParsed(null);setParseErr("");
    setTextInput("");setImgFile(null);
    setCsvText("");setCsvRows([]);
  };

  const callParse=async(body)=>{
    setParsing(true);setParseErr("");setParsed(null);
    try{
      const r=await edgeCallAuth("parse-transaction",body);
      const d=await r.json();
      if(!r.ok||d.error||d.code)throw new Error(d.message||d.error||`HTTP ${r.status}`);
      // Yeni edge function `transactions` array döner; eski tek-obje formatına da fallback
      const list = Array.isArray(d.transactions) ? d.transactions : (d.ticker && d.date ? [d] : []);
      if(list.length===0)throw new Error("Geçersiz yanıt — işlem bulunamadı");
      setParsed(await enrichParseListWithPrices(list));
    }catch(e){setParseErr("Hata: "+e.message);}
    setParsing(false);
  };

  const parseText=()=>{if(textInput.trim())callParse({text:textInput});};

  const parseImage=async()=>{
    if(!imgFile)return;
    const b64=await new Promise((res,rej)=>{
      const rd=new FileReader();
      rd.onload=()=>res(rd.result.split(",")[1]);
      rd.onerror=rej;
      rd.readAsDataURL(imgFile);
    });
    callParse({imageBase64:b64,imageType:imgFile.type||"image/png"});
  };

  // Bulk save — parsed bir array (1 veya N işlem). Hepsini batch insert et,
  // sonra rebuildPositions ile pozisyon tablosunu split-aware yeniden hesapla.
  const saveTx=async(list)=>{
    const items = Array.isArray(list) ? list : (parsed||[]);
    if(!items||items.length===0)return;
    const valid=items.filter(p=>{const sh=+p.shares,pr=+p.price;return !isNaN(sh)&&sh>0&&!isNaN(pr)&&pr>=0;});
    const invalidCnt=items.length-valid.length;
    if(valid.length===0){flash_("Geçerli işlem bulunamadı","err");return;}
    const rows = valid.map(p=>({
      user_id:user.id,date:p.date,ticker:p.ticker,name:p.name||"",
      asset_type:p.asset_type,way:p.way,shares:+p.shares,price:+p.price,
      currency:p.currency||"USD",total:+((+p.shares)*(+p.price)).toFixed(4),
      broker:p.broker||"",commission:+(p.commission||0),exchange:p.exchange||"",notes:p.notes||"",
      portfolio_id:portfolioId
    }));
    const{error}=await sb.from("transactions").insert(rows);
    if(error){flash_(error.message,"err");return;}
    await rebuildPositions(user.id,portfolioId);
    await loadData();
    setParsed(null);setTextInput("");setImgFile(null);
    const msg=rows.length===1?"Kaydedildi ✓":`${rows.length} işlem kaydedildi ✓`;
    flash_(invalidCnt>0?msg+` · ${invalidCnt} geçersiz atlandı`:msg);
  };

  const handleFile=f=>{
    if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{setCsvText(ev.target.result);setCsvRows([]);};
    rd.readAsText(f);
  };

  // RFC 4180 style splitter: quotes içinde virgül ve "" (escaped quote) destekler.
  const splitCSVLine=(line)=>{
    const out=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){
        if(inQ&&line[i+1]==='"'){cur+='"';i++;}
        else inQ=!inQ;
      } else if(c===','&&!inQ){out.push(cur);cur="";}
      else cur+=c;
    }
    out.push(cur);
    return out.map(v=>v.trim());
  };

  const parseCSV=()=>{
    const lines=csvText.trim().split(/\r?\n/).filter(l=>l.trim());
    if(lines.length===0){setCsvRows([]);flash_("CSV boş","err");return;}
    const hdrs=splitCSVLine(lines[0]).map(h=>h.toLowerCase().replace(/ /g,"_"));
    // Beklenen header (en az biri) yoksa format yanlış.
    if(!hdrs.some(h=>["ticker","date","way","shares"].includes(h))){
      setCsvRows([]);
      flash_('Header bulunamadı. İlk satır şöyle olmalı: "Date,Ticker,Name,Type,Way,Shares,Price,Currency,Total,Broker,Commission"',"err");
      return;
    }
    if(lines.length<2){setCsvRows([]);flash_("Header var ama veri satırı yok","err");return;}
    const allDataRows=lines.slice(1).map(line=>{
      const vals=splitCSVLine(line);
      const obj={};
      hdrs.forEach((h,i)=>obj[h]=(vals[i]||""));
      return obj;
    });
    const rows=allDataRows.filter(r=>r.ticker&&["BUY","SELL","DIV"].includes((r.way||"").toUpperCase()));
    const skipped=allDataRows.length-rows.length;
    setCsvSkipped(skipped);
    if(rows.length===0){flash_("Geçerli BUY/SELL/DIV satırı bulunamadı","err");}
    setCsvRows(rows);
  };

  const importCSV=async()=>{
    if(!csvRows.length)return;
    setCsvBusy(true);setProgStep("Başlıyor...");setProgPct(5);setProgDone(false);

    const allCsvMapped=csvRows.map(r=>({
      user_id:user.id,
      date:r.date||today(),
      ticker:(r.ticker||"").toUpperCase(),
      name:r.name||r.ticker||"",
      asset_type:r.type||r.asset_type||"US_STOCK",
      way:(r.way||"BUY").toUpperCase(),
      shares:parseFloat(r.shares),
      price:parseFloat(r.price),
      currency:r.currency||"USD",
      total:+(parseFloat(r.shares)*parseFloat(r.price)).toFixed(4),
      broker:r.broker||"",
      commission:parseFloat(r.commission)||0,
      exchange:r.exchange||"",
      notes:r.notes||"",
      portfolio_id:portfolioId
    }));
    const txInserts=allCsvMapped.filter(r=>{
      const ok=r.shares>0&&isFinite(r.shares)&&r.price>=0&&isFinite(r.price);
      if(!ok)DEBUG&&console.warn("[CSV skip]",r.ticker,"shares="+r.shares,"price="+r.price);
      return ok;
    });
    const csvExtraSkip=allCsvMapped.length-txInserts.length;

    let ok=0;
    const bsz=CFG.CSV_BATCH_SIZE;
    for(let i=0;i<txInserts.length;i+=bsz){
      const{error}=await sb.from("transactions").insert(txInserts.slice(i,i+bsz));
      if(!error)ok+=Math.min(bsz,txInserts.length-i);
      const pct=Math.min(65,Math.round(((i+bsz)/txInserts.length)*60)+5);
      setProgStep(`${ok} / ${txInserts.length} işlem eklendi`);
      setProgPct(pct);
    }

    setProgStep("Pozisyonlar hesaplanıyor...");setProgPct(75);
    setProgStep("Supabase güncelleniyor...");setProgPct(90);
    const posCount=await rebuildPositions(user.id,portfolioId);
    await loadData();

    setProgStep(`✓ ${ok} işlem · ${posCount} pozisyon aktarıldı`+(csvExtraSkip>0?` · ${csvExtraSkip} satır atlandı`:""));
    setProgPct(100);setProgDone(true);setCsvBusy(false);
    setTimeout(()=>{setCsvText("");setCsvRows([]);setProgStep("");setProgPct(0);setProgDone(false);},CFG.CSV_PROGRESS_MS);
  };

  const MODES=[["text","📝 Metin"],["image","📷 Görüntü"],["csv","📋 CSV"],["manuel","📌 Manuel"]];

  // Picker — kullanıcı henüz tip seçmediyse sadece bunu göster
  if(!pickedType){
    return(
      <div>
        <div className="cbox" style={{padding:18}}>
          <div className="lbl" style={{marginBottom:6,fontSize:13}}>Hangi tür işlem ekliyorsun?</div>
          <div style={{fontSize:11,color:"var(--text2)",marginBottom:14}}>Devam etmek için varlık türünü seç. Sonradan değiştirebilirsin.</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
            {ADD_TYPES.map(({type,label,desc})=>(
              <button key={type} data-test={`pick-${type}`} className="pick-card"
                onClick={()=>setPickedType(type)}>
                <span style={{color:"var(--info)",display:"flex",alignItems:"center"}}>{ASSET_ICONS[type]&&ASSET_ICONS[type](28)}</span>
                <span style={{fontSize:14,fontWeight:600}}>{label}</span>
                <span style={{fontSize:11,color:"var(--text2)"}}>{desc}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const pickedMeta = ADD_TYPES.find(t=>t.type===pickedType);

  return(
    <div>
      {/* Tip context header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,marginBottom:14,fontSize:12}}>
        <span style={{color:"var(--info)",display:"flex",alignItems:"center"}}>{ASSET_ICONS[pickedMeta.type]&&ASSET_ICONS[pickedMeta.type](18)}</span>
        <span><span className="dim">Tip:</span> <strong>{pickedMeta.label}</strong></span>
        <div style={{flex:1}}></div>
        <button className="btn-xs" onClick={resetType} data-test="change-type">Tipi değiştir</button>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {MODES.map(([m,l])=>(
          <button key={m} className={"mtab"+(mode===m?" on":"")} onClick={()=>switchMode(m)}>{l}</button>
        ))}
      </div>

      {mode==="text"&&(
        <div>
          <textarea value={textInput} onChange={e=>setTextInput(e.target.value)} rows={4}
            placeholder={"\"NVDA 5 adet $210 Akbank bugün\"\n\"SPY 2 lot sattım $715 QNB komisyon $3\"\n\"BTC 0.001 adet 95000 TRY Binance\""}
            style={{marginBottom:10,lineHeight:1.6,resize:"vertical"}}/>
          <button className="pri" onClick={parseText} disabled={parsing||!textInput.trim()}>
            {parsing?"Parse ediliyor...":"AI ile Parse Et"}
          </button>
          {parseErr&&<div className="flash err" style={{marginTop:10}}>{parseErr}</div>}
          <ConfirmBox data={parsed} onSave={saveTx} onCancel={()=>setParsed(null)}/>
        </div>
      )}

      {mode==="image"&&(
        <div>
          <div style={{marginBottom:12}}>
            <div className="lbl" style={{marginBottom:8}}>Broker ekran görüntüsü</div>
            <input type="file" accept="image/*" onChange={e=>setImgFile(e.target.files[0])} style={{fontSize:13}}/>
            {imgFile&&<div style={{fontSize:11,color:"var(--text2)",marginTop:6}}>{imgFile.name} · {(imgFile.size/1024).toFixed(0)} KB</div>}
          </div>
          <button className="pri" onClick={parseImage} disabled={parsing||!imgFile}>
            {parsing?"Okunuyor...":"Görüntüyü Oku"}
          </button>
          {parseErr&&<div className="flash err" style={{marginTop:10}}>{parseErr}</div>}
          <ConfirmBox data={parsed} onSave={saveTx} onCancel={()=>setParsed(null)}/>
        </div>
      )}

      {mode==="csv"&&(
        <div>
          <div style={{marginBottom:12}}>
            <div className="lbl" style={{marginBottom:8}}>Dosya Yükle</div>
            <input ref={fileRef} type="file" accept=".csv,text/csv" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
            <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{marginBottom:10}}>📂 Dosya Seç</button>
          </div>
          <div style={{marginBottom:12}}>
            <div className="lbl" style={{marginBottom:6}}>veya Yapıştır</div>
            <textarea value={csvText} onChange={e=>{setCsvText(e.target.value);setCsvRows([]);}} rows={4}
              placeholder={"Date,Ticker,Name,Type,Way,Shares,Price,Currency,Total,Broker,Commission\n2021-03-03,TSLA,Tesla Inc,US_STOCK,BUY,2,692.08,USD,1384.16,QNB,20"}
              style={{fontSize:11,fontFamily:"monospace",resize:"vertical",marginBottom:0}}/>
          </div>
          <div className="brow" style={{marginBottom:14}}>
            <button onClick={parseCSV} disabled={!csvText.trim()||csvBusy}>Önizle</button>
            {csvRows.length>0&&!csvBusy&&!progDone&&(
              <button className="pri" onClick={importCSV}>{csvRows.length} İşlemi İçe Aktar</button>
            )}
          </div>
          {progStep&&(
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,color:progDone?"var(--ok)":"var(--text2)"}}>{progStep}</span>
                <span style={{fontSize:11,color:"var(--text3)"}}>{progPct}%</span>
              </div>
              <div className="pbar">
                <div className="pbar-fill" style={{width:progPct+"%",background:progDone?"var(--ok)":"var(--info)"}}/>
              </div>
            </div>
          )}
          {csvRows.length>0&&!csvBusy&&(
            <div>
              <div className="stitle">{csvRows.length} işlem bulundu{csvSkipped>0?` · ${csvSkipped} satır atlandı`:""} — ilk 5:</div>
              <div className="tbl-wrap">
                <table aria-label="CSV önizleme — ilk 5 işlem">
                  <thead><tr>{["Tarih","Ticker","İşlem","Adet","Fiyat","Broker"].map(h=><th key={h} scope="col" className="l">{h}</th>)}</tr></thead>
                  <tbody>
                    {csvRows.slice(0,5).map((r,i)=>(
                      <tr key={i}>
                        <td className="l" style={{fontSize:11}}>{fmtDateTR(r.date)}</td>
                        <td className="l" style={{fontWeight:700}}>{r.ticker}</td>
                        <td className={"l "+((r.way||"").toUpperCase()==="BUY"?"ok":(r.way||"").toUpperCase()==="DIV"?"warn":"err")} style={{fontSize:11}}>{(r.way||"").toUpperCase()==="BUY"?"Alış":(r.way||"").toUpperCase()==="DIV"?"Temettü":"Satış"}</td>
                        <td className="l">{r.shares}</td>
                        <td className="l">{r.price}</td>
                        <td className="l" style={{fontSize:11}}>{r.broker}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {csvRows.length>5&&<div className="dim" style={{fontSize:11,marginTop:4}}>...ve {csvRows.length-5} işlem daha</div>}
            </div>
          )}
        </div>
      )}

      {mode==="manuel"&&(
        <ManuelPosForm key={pickedType} session={session} user={user} pos={pos} loadData={loadData} flash_={flash_} confirm_={confirm_} prefillType={pickedType} portfolioId={portfolioId}/>
      )}
    </div>
  );
}

// Currency symbol helper
const sym_ = (cur) => cur==="TRY" ? "₺" : cur==="EUR" ? "€" : "$";

// SVG pie path generator — tek-slice ile multi-slice ayrı handle
const buildSlicesPath = (sliceArr, CX, CY, R) => {
  let acc = 0;
  return sliceArr.map(s => {
    const startA = acc * Math.PI * 2;
    acc += s.frac;
    const endA = acc * Math.PI * 2;
    const x1 = CX + R * Math.sin(startA), y1 = CY - R * Math.cos(startA);
    const x2 = CX + R * Math.sin(endA),   y2 = CY - R * Math.cos(endA);
    const large = (endA - startA) > Math.PI ? 1 : 0;
    let path;
    if (sliceArr.length === 1) {
      path = `M ${CX-R} ${CY} A ${R} ${R} 0 1 1 ${CX+R} ${CY} A ${R} ${R} 0 1 1 ${CX-R} ${CY} Z`;
    } else {
      path = `M ${CX} ${CY} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${R} ${R} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
    }
    return {...s, path};
  });
};

function AnalysisTab({pos,txs,splits,prc,hist,hide,mask,setTab,displayCur,fxRates,openDetail}){
  const [assetDistMode,setAssetDistMode]=useState("mv"); // "cost" | "mv"
  const [activeTypes,setActiveTypes]=useState(()=>BLOCK_TYPES.filter(cfg=>pos.some(p=>p.type===cfg.type)).map(cfg=>cfg.type));
  useEffect(()=>{
    const all=BLOCK_TYPES.filter(cfg=>pos.some(p=>p.type===cfg.type)).map(cfg=>cfg.type);
    setActiveTypes(prev=>{
      const valid=prev.filter(t=>all.includes(t));
      return valid.length>0?valid:all;
    });
  },[pos.length]);
  // Kart collapse state'leri — default kapalı (özet üstte, detay isteğe bağlı).
  const [healthOpen,setHealthOpen]=useState(false);
  const [commOpen,setCommOpen]=useState(false);
  const [cagrOpen,setCagrOpen]=useState(true);
  const [resilienceOpen,setResilienceOpen]=useState(false);
  const [assetPieOpen,setAssetPieOpen]=useState(true);
  const [regionPieOpen,setRegionPieOpen]=useState(true);
  const [sectorPieOpen,setSectorPieOpen]=useState(true);
  const [sectorMetaBusy,setSectorMetaBusy]=useState(false);
  const [sectorMetaTick,setSectorMetaTick]=useState(0); // inc to force re-render after meta fetch
  // Auto-fetch sector meta on mount for US_STOCK/BIST/FUND positions missing meta
  useEffect(()=>{
    const missing=pos.filter(p=>{
      if(p.type!=="US_STOCK"&&p.type!=="BIST"&&p.type!=="FUND")return false;
      const m=metaCacheGet(p.ticker);
      return!(m&&(m.sic_description||m.industry));
    });
    if(missing.length===0)return;
    setSectorMetaBusy(true);
    (async()=>{
      for(let i=0;i<missing.length;i++){
        const p=missing[i];
        try{
          const r=await edgeCall("fetch-prices",{ticker:p.ticker,mode:"meta",asset_type:p.type});
          const d=await r.json();
          if(r.ok&&d&&typeof d==="object")metaCacheSet(p.ticker,d);
        }catch(e){DEBUG&&console.warn("[sector auto-meta]",p.ticker,e);}
        if(i<missing.length-1)await new Promise(res=>setTimeout(res,600));
      }
      setSectorMetaBusy(false);
      setSectorMetaTick(t=>t+1);
    })();
  },[]);
  // Aktif tip filtresi — global chip bar
  const atAll = BLOCK_TYPES.filter(cfg=>pos.some(p=>p.type===cfg.type)).map(cfg=>cfg.type);
  const filteredPos = activeTypes.length >= atAll.length ? pos : pos.filter(p=>activeTypes.includes(p.type));
  const filteredTxs = (() => {
    if (filteredPos === pos) return txs;
    const tickers = new Set(filteredPos.map(p=>p.ticker));
    return txs.filter(t=>tickers.has(t.ticker));
  })();
  const dSym = displaySym(displayCur);
  const cnv = (amt, from) => convert(amt, from, displayCur, fxRates);
  // Sağlık tablosu state — ticker bazlı fund cache, mount'ta LS'ten topla.
  const [fundCache,setFundCache]=useState(()=>{
    const c={};
    pos.forEach(p=>{
      if(p.type!=="US_STOCK"&&p.type!=="BIST")return;
      const v=fundCacheGet(p.ticker);
      if(v?.metrics)c[p.ticker]=v;
    });
    return c;
  });
  const [fundBusy,setFundBusy]=useState(false);
  const [fundProg,setFundProg]=useState("");
  const [healthFilter,setHealthFilter]=useState("all"); // all | US_STOCK | BIST
  // pos değişince yeni eklenen pozisyonların cache'lerini de topla
  useEffect(()=>{
    setFundCache(prev=>{
      const next={...prev};
      pos.forEach(p=>{
        if(p.type!=="US_STOCK"&&p.type!=="BIST")return;
        if(next[p.ticker])return;
        const v=fundCacheGet(p.ticker);
        if(v?.metrics)next[p.ticker]=v;
      });
      return next;
    });
  },[pos]);
  // Sağlık tablosu için 8 kritik metrik (default; tüm 21 metrik FUND_THRESHOLDS'ta)
  const HEALTH_METRICS=[
    ["pe",                "P/E",          "x"],
    ["roe",               "ROE",          "pct"],
    ["netMargin",         "Net Marj",     "pct"],
    ["operatingMargin",   "Op Marj",      "pct"],
    ["revenueGrowth5Y",   "Gelir 5Y",     "pct"],
    ["earningsGrowth5Y",  "Kâr 5Y",       "pct"],
    ["liabToEquity",      "Borç/Özk",     "x"],
    ["netDebtToFcf",      "NetBorç/FCF",  "x"],
  ];
  const healthEligible = filteredPos.filter(p=>p.type==="US_STOCK"||p.type==="BIST");
  const healthFiltered = healthFilter==="all" ? healthEligible : healthEligible.filter(p=>p.type===healthFilter);
  const healthMissing = healthFiltered.filter(p=>!fundCache[p.ticker]);
  // Piyasa Düşüşü Dayanıklılık Skoru
  const ISY_KNOWN_BANKS = new Set(["GARAN","AKBNK","YKBNK","ISCTR","HALKB","VAKBN","ALBRK","QNBFB","TSKB","ICBCT","SKBNK"]);
  const resilienceEligible = filteredPos.filter(p =>
    (p.type === "US_STOCK" || p.type === "BIST") && !ISY_KNOWN_BANKS.has(p.ticker)
  );
  const resilienceMissing = resilienceEligible.filter(p => !fundCache[p.ticker]);
  const resilienceScore = (m) => {
    if (!m) return null;
    let raw = 0, counted = 0;
    if (m.liabToEquity != null) { counted++; if (m.liabToEquity < 0.5) raw += 2; }
    if (m.fcfMargin != null) { counted++; if (m.fcfMargin > 0.10) raw += 2; }
    if (m.operatingMargin != null) { counted++; if (m.operatingMargin > 0.15) raw += 2; }
    if (counted === 0) return null;
    return Math.round(raw / (counted * 2) * 9) + 1; // 1–10 scale
  };
  // Bir pozisyonun skoru: kaç metrik "good" (yeşil) / toplam değerli (null hariç)
  const rowScore = (m) => {
    if(!m) return {good:0,total:0};
    let good=0,total=0;
    HEALTH_METRICS.forEach(([key])=>{
      const s=fundScore(key,m[key]);
      if(s===null)return;
      total++;
      if(s==="good")good++;
    });
    return {good,total};
  };
  const fetchAllFund = async () => {
    const allMissing = [...new Map([...healthMissing, ...resilienceMissing].map(p=>[p.ticker,p])).values()];
    if(allMissing.length===0||fundBusy)return;
    setFundBusy(true);
    const next={...fundCache};
    for(let i=0;i<allMissing.length;i++){
      const p=allMissing[i];
      setFundProg(`${p.ticker} (${i+1}/${allMissing.length})`);
      try{
        const r=await edgeCall("fetch-fundamentals",{ticker:p.ticker,asset_type:p.type});
        const d=await r.json();
        if(r.ok&&d?.metrics){
          next[p.ticker]=d;
          fundCacheSet(p.ticker,d);
          setFundCache({...next});  // her başarıda UI tazele
        }
      }catch(e){DEBUG && console.warn(`[health ${p.ticker}]`,e);}
      if(i<allMissing.length-1) await new Promise(r=>setTimeout(r,800));
    }
    setFundBusy(false);
    setFundProg("");
  };
  // Pozisyon ham MV (orijinal currency'de) → display cur'a çevir
  const mvDisp = (p) => {
    const raw = (prc[p.ticker] || 0) * p.shares;
    if (raw <= 0) return 0;
    // price_cache stores TRY for BIST (Yahoo), USD for everything else (Massive).
    // Use asset-type-based currency, not p.currency which may be stale.
    const priceCur = p.type === "BIST" ? "TRY" : "USD";
    return cnv(raw, priceCur) || 0;
  };
  // Pozisyon maliyet (avg_cost × shares, orijinal currency'de) → display cur'a çevir
  const costDisp = (p) => {
    const raw = (p.avg_cost || 0) * p.shares;
    if (raw <= 0) return 0;
    return cnv(raw, p.currency || "USD") || 0;
  };

  // Split factor lookup — buy/sell tarihinden sonra split olmuşsa fiyatı düzelt.
  // factorAt(ticker,date) = ratio'ların tarihten sonraki çarpımı.
  // adjusted_price = original_price / factor (split sonrası eşdeğer fiyat).
  const splitsByT = {};
  (splits||[]).forEach(s => { (splitsByT[s.ticker]=splitsByT[s.ticker]||[]).push(s); });
  const factorAt = (ticker, date) => {
    const arr = splitsByT[ticker] || [];
    return arr.filter(s => s.split_date > date).reduce((a,s)=>a*+s.ratio,1);
  };

  // Slice hesabı: type breakdown — global filtre zaten aktif tip seçimini yönetiyor.
  // assetDistMode: "mv" → piyasa değeri, "cost" → maliyet. Tüm değerler display cur'a convert.
  const slices = (() => {
    const valFn = assetDistMode === "cost" ? costDisp : mvDisp;
    const byType = {};
    filteredPos.forEach(p => {
      const v = valFn(p);
      if (v > 0) byType[p.type] = (byType[p.type] || 0) + v;
    });
    const total = Object.values(byType).reduce((a,v)=>a+v,0);
    const arr = Object.entries(byType)
      .map(([type,value]) => ({key:type, label:TL[type]||type, value, color:TYPE_COLORS[type]||"#666"}))
      .sort((a,b)=>b.value-a.value);
    arr.forEach(s => s.frac = total > 0 ? s.value/total : 0);
    return {arr, total};
  })();

  // Tüm dağılım kartları display currency sembolünde gösterir
  const sym = dSym;

  // Region slices — type→region mapping. Tüm currency'ler display cur'a convert.
  const regionSlices = (() => {
    const byRegion = {};
    filteredPos.forEach(p => {
      const region = REGION_OF[p.type] || "fx";
      const mv = mvDisp(p);
      if (mv > 0) byRegion[region] = (byRegion[region] || 0) + mv;
    });
    const total = Object.values(byRegion).reduce((a,v)=>a+v,0);
    const arr = Object.entries(byRegion).map(([key,value]) => ({
      key, label: REGION_META[key]?.label || key, value, color: REGION_META[key]?.color || "#666"
    })).sort((a,b)=>b.value-a.value);
    arr.forEach(s => s.frac = total > 0 ? s.value/total : 0);
    return {arr, total};
  })();

  // Komisyon — filtreli tx'ler display cur'a convert; KPI/broker/year tek tutar.
  const commData = (() => {
    let total = 0;
    const byBroker = {};   // {broker: amount}
    const byYear = {};     // {year: amount}
    filteredTxs.forEach(t => {
      const raw = +t.commission || 0;
      if (raw <= 0) return;
      const cur = t.currency || "USD";
      const c = cnv(raw, cur);
      if (c == null) return;  // FX yok → atla
      const broker = (t.broker||"Bilinmiyor").trim() || "Bilinmiyor";
      const year = (t.date||"").slice(0,4);
      total += c;
      byBroker[broker] = (byBroker[broker]||0) + c;
      if (year) byYear[year] = (byYear[year]||0) + c;
    });
    const brokerList = Object.entries(byBroker).map(([broker,sum]) => ({broker, sum}))
      .sort((a,b)=>b.sum-a.sum);
    const yearList = Object.entries(byYear).map(([year,sum]) => ({year, sum}))
      .sort((a,b)=>a.year.localeCompare(b.year));
    return {total, brokerList, yearList};
  })();

  // Win/Loss — BUY ve SELL bağımsız, split-adjusted (NVDA gibi pre-split fiyatlar)
  const winLoss = (() => {
    let buyW=0, buyL=0, buyN=0, sellW=0, sellL=0, sellN=0;
    filteredTxs.forEach(t => {
      const cur = prc[t.ticker];
      if (cur == null || cur <= 0) {
        if (t.way === "BUY") buyN++;
        else if (t.way === "SELL") sellN++;
        return;
      }
      const adj = (+t.price) / factorAt(t.ticker, t.date);
      if (t.way === "BUY") {
        if (cur > adj) buyW++;
        else if (cur < adj) buyL++;
      } else if (t.way === "SELL") {
        if (cur < adj) sellW++;
        else if (cur > adj) sellL++;
      }
    });
    return {
      buy:  {win: buyW,  loss: buyL,  noPrice: buyN},
      sell: {win: sellW, loss: sellL, noPrice: sellN},
    };
  })();

  // Tab-level empty state
  if (pos.length === 0) {
    return (
      <div className="empty-card">
        <div className="ic">📊</div>
        <div className="ttl">Analiz için pozisyon yok</div>
        <div className="sub">Önce pozisyon ekle, sonra dağılım/komisyon/win-loss analizleri burada görünecek.</div>
        <button className="pri" onClick={()=>setTab("add")}>+ İlk işlemi ekle</button>
      </div>
    );
  }

  return(
    <div>
      {!fxRates&&<div className="warn-card" style={{marginBottom:14}}>⚠ FX kuru yüklenemedi — TRY/EUR pozisyonlar doğru toplamayabilir. Topbardaki ↻ butonuyla güncelle.</div>}
      {/* Global varlık türü filtre chip bar */}
      {(()=>{
        const presentTypes = BLOCK_TYPES.filter(cfg => pos.some(p=>p.type===cfg.type));
        if (presentTypes.length <= 1) return null;
        const allSelected = activeTypes.length >= presentTypes.length;
        const toggleType = (type) => {
          setActiveTypes(prev => {
            if (prev.includes(type)) {
              const next = prev.filter(t=>t!==type);
              return next.length > 0 ? next : prev;
            }
            return [...prev, type];
          });
        };
        return (
          <div className="fbar" style={{marginBottom:16}}>
            <button className={"mtab"+(allSelected?" on":"")} onClick={()=>setActiveTypes(atAll)}>Tümü</button>
            {presentTypes.map(cfg=>(
              <button key={cfg.type} className={"mtab"+(activeTypes.includes(cfg.type)?" on":"")}
                onClick={()=>toggleType(cfg.type)}>
                <span style={{opacity:.7,display:"flex"}}>{cfg.icon(12)}</span>{cfg.label}
              </button>
            ))}
          </div>
        );
      })()}
      {/* Varlık dağılımı — stacked bar */}
      <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div className="stitle" style={{marginBottom:0}}>Varlık Dağılımı</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div className="seg" style={{fontSize:11}}>
              <button className={assetDistMode==="cost"?"on":""} onClick={()=>setAssetDistMode("cost")}>Maliyet</button>
              <button className={assetDistMode==="mv"?"on":""} onClick={()=>setAssetDistMode("mv")}>Piyasa</button>
            </div>
            <button className="btn-xs" onClick={()=>setAssetPieOpen(o=>!o)}>{assetPieOpen?"▴":"▾"}</button>
          </div>
        </div>
        {slices.arr.length > 0 && (
          <div style={{height:12,borderRadius:6,overflow:"hidden",display:"flex",gap:1,marginTop:12}}>
            {slices.arr.map(s=>(
              <div key={s.key} style={{width:(s.frac*100)+"%",height:"100%",background:s.color}}
                data-tip={`${s.label}: ${(s.frac*100).toFixed(1)}%`}/>
            ))}
          </div>
        )}
        {assetPieOpen && (
          <div style={{marginTop:14}}>
            {slices.arr.length === 0 ? (
              <div className="empty" style={{padding:"20px 0"}}>Bu varlık türünde değerli pozisyon yok</div>
            ) : (
              <>
                {slices.arr.map(s=>(
                  <div key={s.key} className="pie-row">
                    <span className="pie-sw" style={{background:s.color}}></span>
                    <span style={{flex:1,minWidth:0}}>{s.label}</span>
                    <span className="mono" style={{textAlign:"right",flex:"0 0 70px"}}>{mask(sym+fmt(s.value,0))}</span>
                    <span className="dim" style={{textAlign:"right",fontSize:11,flex:"0 0 56px"}}>{(s.frac*100).toFixed(1)}%</span>
                  </div>
                ))}
                <div className="pie-row" style={{borderTop:"0.5px solid var(--border)",marginTop:6,paddingTop:8,fontWeight:600}}>
                  <span className="pie-sw" style={{visibility:"hidden"}}></span>
                  <span style={{flex:1,minWidth:0}}>Toplam</span>
                  <span className="mono" style={{textAlign:"right",flex:"0 0 70px"}}>{mask(sym+fmt(slices.total,0))}</span>
                  <span className="dim" style={{textAlign:"right",fontSize:11,flex:"0 0 56px"}}>100.0%</span>
                </div>
              </>
            )}
          </div>
        )}
      </div>

      {/* Bölge Dağılımı — stacked bar */}
      <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div className="stitle" style={{marginBottom:0}}>Bölge Dağılımı</div>
          <button className="btn-xs" onClick={()=>setRegionPieOpen(o=>!o)}>{regionPieOpen?"▴":"▾"}</button>
        </div>
        {regionSlices.arr.length > 0 && (
          <div style={{height:12,borderRadius:6,overflow:"hidden",display:"flex",gap:1,marginTop:12}}>
            {regionSlices.arr.map(s=>(
              <div key={s.key} style={{width:(s.frac*100)+"%",height:"100%",background:s.color}}
                data-tip={`${s.label}: ${(s.frac*100).toFixed(1)}%`}/>
            ))}
          </div>
        )}
        {regionPieOpen && (
          <div style={{marginTop:14}}>
            {regionSlices.arr.length === 0 ? (
              <div className="empty" style={{padding:"20px 0"}}>Pozisyon yok</div>
            ) : (
              <>
                {regionSlices.arr.map(s=>(
                  <div key={s.key} className="pie-row">
                    <span className="pie-sw" style={{background:s.color}}></span>
                    <span style={{flex:1,minWidth:0}}>{s.label}</span>
                    <span className="mono" style={{textAlign:"right",flex:"0 0 70px"}}>{mask(dSym+fmt(s.value,0))}</span>
                    <span className="dim" style={{textAlign:"right",fontSize:11,flex:"0 0 56px"}}>{(s.frac*100).toFixed(1)}%</span>
                  </div>
                ))}
                <div className="pie-row" style={{borderTop:"0.5px solid var(--border)",marginTop:6,paddingTop:8,fontWeight:600}}>
                  <span className="pie-sw" style={{visibility:"hidden"}}></span>
                  <span style={{flex:1,minWidth:0}}>Toplam</span>
                  <span className="mono" style={{textAlign:"right",flex:"0 0 70px"}}>{mask(dSym+fmt(regionSlices.total,0))}</span>
                  <span className="dim" style={{textAlign:"right",fontSize:11,flex:"0 0 56px"}}>100.0%</span>
                </div>
                <div style={{fontSize:10,color:"var(--text3)",marginTop:10,lineHeight:1.5}}>
                  Heuristik: US_STOCK/FUND→US, BIST→Türkiye, CRYPTO→Global·Kripto, GOLD→Global·Emtia, FX→Döviz. ETF içerikleri (MCHI=Çin gibi) ileride.
                </div>
              </>
            )}
          </div>
        )}
      </div>

      {/* Portföy Sağlık Tablosu — kapalı özet (3 rozet) + collapsible detay tablosu */}
      {healthEligible.length>0 && (() => {
        // Aggregate sayım: tüm healthFiltered ticker'ların 8 metrikinde good/neutral/bad toplam.
        let aggGood=0, aggWarn=0, aggBad=0;
        healthFiltered.forEach(p => {
          const m = fundCache[p.ticker]?.metrics;
          if(!m) return;
          HEALTH_METRICS.forEach(([key]) => {
            const s = fundScore(key, m[key]);
            if(s==="good") aggGood++;
            else if(s==="neutral") aggWarn++;
            else if(s==="bad") aggBad++;
          });
        });
        return(
        <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
          {/* Üst bar: başlık + 3 rozet + Detay toggle */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div className="stitle" style={{marginBottom:0}}>Portföy Sağlık Tablosu</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span className="hp hp-ok" data-tip="Eşiği geçen (iyi) metrik sayısı">🟢 {aggGood}</span>
              <span className="hp hp-warn" data-tip="Orta seviye metrik sayısı">🟡 {aggWarn}</span>
              <span className="hp hp-err" data-tip="Eşiğin altında kalan (zayıf) metrik sayısı">🔴 {aggBad}</span>
              <button className="btn-xs" onClick={()=>setHealthOpen(o=>!o)} style={{fontSize:11}}>
                {healthOpen?"Detay ▴":"Detay ▾"}
              </button>
            </div>
          </div>

          {/* Portföy F/K KPI — her zaman görünür (healthOpen'dan bağımsız) */}
          {(()=>{
            let weightedSum=0, weightTotal=0, included=0, missing=0;
            healthFiltered.forEach(p => {
              const pe = fundCache[p.ticker]?.metrics?.pe;
              const mv = mvDisp(p);
              if (pe != null && pe > 0 && mv > 0) { weightedSum += pe * mv; weightTotal += mv; included++; }
              else missing++;
            });
            const portfolioPE = weightTotal > 0 ? weightedSum / weightTotal : null;
            if (portfolioPE == null) return null;
            const sp500ref = 22;
            const below = portfolioPE < sp500ref;
            return (
              <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"var(--text2)"}}>Portföy F/K</span>
                <span className="mono" style={{fontSize:18,fontWeight:600}}>{portfolioPE.toFixed(1)}x</span>
                <span className={"hp "+(below?"hp-ok":"hp-warn")} style={{fontSize:11}}>
                  {below ? `S&P 500 (${sp500ref}x) altında` : `S&P 500 (${sp500ref}x) üstünde`}
                </span>
                <span style={{fontSize:10,color:"var(--text3)"}}>{included} pozisyon dahil{missing>0?`, ${missing} veri yok`:""}</span>
              </div>
            );
          })()}

          {/* Filter chips + Eksikleri Çek CTA — sadece detay açıkken */}
          {healthOpen && (() => {
            const types=["all"];
            if(healthEligible.some(p=>p.type==="US_STOCK"))types.push("US_STOCK");
            if(healthEligible.some(p=>p.type==="BIST"))types.push("BIST");
            if(types.length<=2)return null;
            return(
              <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                {types.map(t=>(
                  <button key={t} className={"mtab sm"+(healthFilter===t?" on":"")}
                    onClick={()=>setHealthFilter(t)}>
                    {t==="all"?"Hepsi":TYPE_LABEL_SHORT[t]||t}
                  </button>
                ))}
              </div>
            );
          })()}

          {healthOpen && healthMissing.length>0 && (
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"8px 10px",background:"var(--bg3)",borderRadius:8,marginTop:10,flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:"var(--text2)"}}>
                {fundBusy
                  ? <><span className="spin" style={{width:11,height:11,marginRight:6,verticalAlign:"middle"}}></span>Çekiliyor: {fundProg}</>
                  : `${healthMissing.length} pozisyonun fundamental verisi henüz çekilmemiş.`}
              </span>
              {!fundBusy && <button className="pri btn-xs" onClick={fetchAllFund}>Eksikleri Çek</button>}
            </div>
          )}

          {/* Tablo: sticky ticker + 8 metrik + skor — sadece healthOpen iken */}
          {healthOpen && (() => {
            const rows = healthFiltered.map(p => {
              const fund = fundCache[p.ticker];
              const m = fund?.metrics || null;
              const sc = rowScore(m);
              return {p, m, sc, hasData: !!m};
            }).sort((a,b) => {
              if(a.hasData !== b.hasData) return a.hasData ? -1 : 1;
              if(!a.hasData) return a.p.ticker.localeCompare(b.p.ticker);
              const aPct = a.sc.total>0 ? a.sc.good/a.sc.total : 1;
              const bPct = b.sc.total>0 ? b.sc.good/b.sc.total : 1;
              return aPct - bPct;
            });
            return(
              <div className="tbl-wrap health-wrap">
                <table className="health-tbl">
                  <thead><tr>
                    <th scope="col" className="l health-sticky">Ticker</th>
                    {HEALTH_METRICS.map(([k,lbl])=>(
                      <th key={k} scope="col" className="r" data-tip={fundThreshText(k, HEALTH_METRICS.find(x=>x[0]===k)[2])}>{lbl}</th>
                    ))}
                    <th scope="col" className="r" data-tip="Yeşil sayım / değerli metrik sayımı">Skor</th>
                  </tr></thead>
                  <tbody>
                    {rows.map(({p,m,sc,hasData}) => (
                      <tr key={p.ticker} className="pos-row" onClick={()=>openDetail(p.ticker,p.type,"analysis")}>
                        <td className="l health-sticky">
                          <span className="tsym">{p.ticker}</span>
                          {p.type==="BIST"&&<span style={{fontSize:9,color:"var(--text3)",marginLeft:5}}>BIST</span>}
                        </td>
                        {hasData ? HEALTH_METRICS.map(([k,lbl,type])=>{
                          const v=m[k];
                          const s=fundScore(k,v);
                          const cls = s==="good"?"hp-ok":s==="neutral"?"hp-warn":s==="bad"?"hp-err":"hp-na";
                          return(
                            <td key={k} className="r"><span className={"hp "+cls}>{fmtFundVal(v,type)}</span></td>
                          );
                        }) : HEALTH_METRICS.map(([k])=>(
                          <td key={k} className="r dim" style={{fontSize:11}}>—</td>
                        ))}
                        <td className="r">
                          {hasData
                            ? <span className="hp" style={{background:"var(--bg4)",color:sc.good/sc.total>=0.66?"var(--ok)":sc.good/sc.total>=0.4?"var(--warn)":"var(--err)",fontWeight:600}}>{sc.good}/{sc.total}</span>
                            : <span className="dim" style={{fontSize:11}}>—</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })()}

          {healthOpen && (
            <div style={{fontSize:10,color:"var(--text3)",marginTop:8,lineHeight:1.5}}>
              Eşikler `FUND_THRESHOLDS`'tan; kolon başlığında hover ile detay. BIST için P/S henüz yok (—). TR enflasyon nominal CAGR'ı şişiriyor — BIST büyüme metriklerine ihtiyatla bak.
            </div>
          )}
        </div>
      );})()}

      {/* Toplam Komisyon — display cur'a convert edilmiş tek tutar */}
      <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
        {/* Üst bar: başlık + KPI sağda + Detay toggle (commData.total>0 ise) */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div className="stitle" style={{marginBottom:0}}>Toplam Komisyon</div>
          {commData.total>0 && (
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span className="mono" style={{fontSize:18,fontWeight:600}}>{mask(dSym+fmt(commData.total,2))}</span>
              <button className="btn-xs" onClick={()=>setCommOpen(o=>!o)} style={{fontSize:11}}>
                {commOpen?"Detay ▴":"Detay ▾"}
              </button>
            </div>
          )}
        </div>
        {commData.total === 0 && (
          <div className="empty" style={{padding:"40px 0"}}>Henüz komisyon kaydı yok</div>
        )}
        {commData.total > 0 && commOpen && (
          <div style={{marginTop:14}}>
            {/* Broker breakdown */}
            <div className="stitle" style={{marginBottom:8}}>Broker Bazında</div>
            <div style={{marginBottom:18}}>
              {commData.brokerList.map(({broker,sum}) => {
                const pct = (sum / commData.brokerList[0].sum) * 100;
                return (

      {/* Konsantrasyon Risk Göstergesi — top3 ağırlık + HHI */}
      <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
        <div className="stitle" style={{marginBottom:12}}>Konsantrasyon Riski</div>
        {(()=>{
          const posWithMv=filteredPos.map(p=>({...p,dispMv:mvDisp(p)})).filter(p=>p.dispMv>0);
          const total=posWithMv.reduce((a,p)=>a+p.dispMv,0);
          if(total<=0||posWithMv.length===0)return <div className="empty" style={{padding:"12px 0",fontSize:11}}>Yeterli pozisyon yok</div>;
          const sorted=[...posWithMv].sort((a,b)=>b.dispMv-a.dispMv);

          const top3w=weights.slice(0,3).reduce((a,p)=>a+p.w,0)*100;
          const hhi=Math.round(weights.reduce((a,p)=>a+(p.w*100)*(p.w*100),0));
          const level=top3w>60?"Yüksek":top3w>40?"Orta":"Düşük";
          const color=top3w>60?"var(--err)":top3w>40?"var(--warn)":"var(--ok)";

                </div>
                <span style={{fontSize:12,padding:"3px 10px",borderRadius:12,background:color+"22",color,fontWeight:600}}>{level}</span>
                <div style={{marginLeft:"auto",textAlign:"right"}}>

              <div style={{display:"flex",flexDirection:"column",gap:6}}>

                    <div style={{flex:1,height:6,background:"var(--bg3)",borderRadius:3,overflow:"hidden"}}>

                    <span className="mono" style={{fontSize:12,color:"var(--text2)",minWidth:40,textAlign:"right"}}>{fmt(p.w*100,1)}%</span>

              <div style={{marginTop:10,fontSize:10,color:"var(--text3)"}}>
                HHI = Σ(ağırlık²) × 10000 · {posWithMv.length} pozisyon · {posWithMv.length>3?`geri kalan ${posWithMv.length-3} pozisyon dağılımı etkiliyor`:""}{" "}
                <span data-tip="Herfindahl-Hirschman Endeksi: 0=tam çeşitlenmiş, 10000=tek pozisyon. >2500 konsantre sayılır.">HHI nedir?</span>

        })()}

      {/* Break-Even Analizi */}
      <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
        <div className="stitle" style={{marginBottom:12}} data-tip="Komisyon dahil alış maliyetini karşılamak için gereken minimum satış fiyatı.">Başa Baş Analizi</div>
        {(()=>{
          const beRows = filteredPos
            .filter(p => p.shares > CFG.DUST_THRESHOLD)
            .map(p => {
              const buyTxs = filteredTxs.filter(t => t.ticker === p.ticker && t.way === "BUY");
              const totalComm = buyTxs.reduce((a, t) => a + (t.commission || 0), 0);
              const breakEven = p.shares > 0 ? (p.shares * p.avgCost + totalComm) / p.shares : null;
              const curPrice = prc[p.ticker];
              const distPct = (breakEven != null && breakEven > 0 && curPrice != null)
                ? ((curPrice - breakEven) / breakEven) * 100
                : null;
              return { ...p, breakEven, curPrice, distPct, sym: displaySym(p.currency) };
            });

          const sorted = [...beRows].sort((a, b) => {
            if (a.distPct == null && b.distPct == null) return 0;
            if (a.distPct == null) return 1;
            if (b.distPct == null) return -1;
            return b.distPct - a.distPct;
          });

          if (sorted.length === 0) return <div className="empty" style={{padding:"12px 0",fontSize:11}}>Açık pozisyon yok</div>;

          return (
            <div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr>
                      <th scope="col" style={{textAlign:"left",paddingBottom:8,color:"var(--text3)",fontWeight:500,paddingRight:8}}>Ticker</th>
                      <th scope="col" style={{textAlign:"right",paddingBottom:8,color:"var(--text3)",fontWeight:500,paddingRight:8}}>Başa Baş</th>
                      <th scope="col" style={{textAlign:"right",paddingBottom:8,color:"var(--text3)",fontWeight:500,paddingRight:8}}>Güncel</th>
                      <th scope="col" style={{textAlign:"right",paddingBottom:8,color:"var(--text3)",fontWeight:500}}>Uzaklık</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.map(r => (
                      <tr key={r.ticker} className="pos-row" onClick={() => openDetail(r.ticker, r.type, "analysis")}
                        style={{cursor:"pointer"}}>
                        <td style={{padding:"5px 8px 5px 0",fontWeight:600,fontFamily:"'DM Mono',monospace"}}>
                          {r.ticker}
                        </td>
                        <td style={{padding:"5px 8px 5px 0",textAlign:"right",fontFamily:"'DM Mono',monospace"}}>
                          {r.breakEven != null ? mask(r.sym + fmt(r.breakEven, 2)) : <span className="dim">—</span>}
                        </td>
                        <td style={{padding:"5px 8px 5px 0",textAlign:"right",fontFamily:"'DM Mono',monospace"}}>
                          {r.curPrice != null
                            ? mask(r.sym + fmt(r.curPrice, 2))
                            : <span style={{fontSize:10,color:"var(--text3)"}}>Fiyat yok</span>}
                        </td>
                        <td style={{padding:"5px 0 5px 0",textAlign:"right",fontFamily:"'DM Mono',monospace"}}>
                          {r.distPct != null
                            ? <span className={r.distPct > 0 ? "ok" : "err"} style={{fontWeight:600}}>
                                {fmtP(r.distPct)}
                              </span>
                            : <span className="dim">—</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{fontSize:10,color:"var(--text3)",marginTop:8}}>Komisyon dahil alış maliyeti bazlı.</div>
            </div>
          );
        })()}
      </div>

      {/* Max Pain Simülasyonu */}
      <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
        <div className="stitle" style={{marginBottom:12}}>Potansiyel Kayıp Simülasyonu</div>
        {(()=>{
          const totalMV = filteredPos.reduce((a, p) => a + mvDisp(p), 0);
          const hasFx = fxRates && fxRates.USDTRY > 0;

      {/* Sektör Dağılımı — meta cache'ten sic_description (US) / industry (BIST) */}
      {(()=>{
        // sectorMetaTick'e bağımlı olduğu için her meta fetch sonrası yeniden hesaplar
        void sectorMetaTick;
        // Her pozisyon için sektör etiketi: US → sic_description, BIST → industry, tip bazlı fallback
        const posWithSector = filteredPos.map(p => {
          const m = metaCacheGet(p.ticker);
          const metaSector = m && (m.sic_description || m.industry);
          let sector;
          if (metaSector) sector = metaSector;
          else if (p.type === "CRYPTO") sector = "Kripto";
