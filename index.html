const SUPA_URL  = "https://jfetubcilmuthpddkodg.supabase.co";

const CFG = {

  DUST_THRESHOLD:   0.0001, // pozisyon sayılacak minimum shares

// ── Position rebuild (shared by HistoryTab + CSV import) ─────────
// SELL pozisyonda yoksa / shares yetmezse güvenli davran:
// negatif shares/cost oluşturmaz, fazla satış yok sayılır.
// Stock split'ler: bir işlemin tarihinden SONRA gelen her split'in
// ratio'su birikimli olarak uygulanır (shares × factor). Toplam cost
// aynı kalır, shares artar → avg_cost otomatik düşer.
const rebuildPositions = async (userId) => {
  const [txRes,splitRes] = await Promise.all([
    sb.from("transactions").select("*").eq("user_id",userId).order("date"),
    sb.from("splits").select("*").eq("user_id",userId)
  ]);
  const all = txRes.data || [];
  const splits = splitRes.data || [];
  const splitsByT = {};
  splits.forEach(s => { (splitsByT[s.ticker] = splitsByT[s.ticker] || []).push(s); });
  const factorFor = (ticker, date) => {
    const arr = splitsByT[ticker] || [];
    return arr.filter(s => s.split_date > date).reduce((a,s) => a * +s.ratio, 1);
  };

  const pm = {};
  for (const t of all) {
    if (!pm[t.ticker]) pm[t.ticker] = {ticker:t.ticker,name:t.name,type:t.asset_type,shares:0,cost:0,currency:t.currency,broker:t.broker};
    const p = pm[t.ticker];
    const f = factorFor(t.ticker, t.date);
    const adjShares = +t.shares * f;
    if (t.way === "BUY") {
      p.cost += +t.shares * +t.price;   // total unchanged by split
      p.shares += adjShares;
    } else if (t.way === "SELL" && p.shares > 0) {
      const avg = p.cost / p.shares;
      const qty = Math.min(adjShares, p.shares);
      p.cost = Math.max(0, p.cost - avg * qty);
      p.shares -= qty;
    }
  }
  await sb.from("positions").delete().eq("user_id",userId);
  const np = Object.values(pm).filter(p => p.shares > CFG.DUST_THRESHOLD).map(p => ({
    user_id: userId, ticker: p.ticker, name: p.name, type: p.type,
    shares: +p.shares.toFixed(6), avg_cost: +(p.cost/p.shares).toFixed(6),
    currency: p.currency, broker: p.broker, updated_at: new Date().toISOString()
  }));
  if (np.length) await sb.from("positions").insert(np);
  return np.length;
};

// ── SparkChart — küçük SVG portföy değer grafiği ─────────────────
// 7 nokta: 1Y / 6A / 3A / 1A / 1H / 1G / Bugün. "Bugünkü pozisyonların
// geçmiş fiyatla değeri" — gerçek tarihi portföy değeri değildir.
function SparkChart({data}){
  if(!data||data.length<2)return<div className="dim" style={{fontSize:11,padding:"14px 0",textAlign:"center"}}>Grafik için yeterli veri yok</div>;
  const W=400,H=70,pad=6;
  const vals=data.map(d=>d.value);
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const sx=i=>pad+(W-2*pad)*(i/(data.length-1));
  const sy=v=>pad+(H-2*pad)*(1-(v-min)/rng);
  const pts=data.map((d,i)=>`${sx(i).toFixed(1)},${sy(d.value).toFixed(1)}`).join(" ");
  const up=data[data.length-1].value>=data[0].value;
  const col=up?"var(--ok)":"var(--err)";
  const areaPts=`${pad},${H-pad} ${pts} ${W-pad},${H-pad}`;
  return(
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}} preserveAspectRatio="none">
        <polygon points={areaPts} fill={col} opacity="0.08"/>
        <polyline points={pts} fill="none" stroke={col} strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
        {data.map((d,i)=>(<circle key={i} cx={sx(i)} cy={sy(d.value)} r="2.2" fill={col}/>))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text2)",marginTop:6,padding:"0 4px"}}>
        {data.map((d,i)=>(<span key={i} style={{flex:1,textAlign:i===0?"left":i===data.length-1?"right":"center"}}>{d.lbl}</span>))}
      </div>
    </div>
  );
}

function ConfirmBox({data,onSave,onCancel}){

  const rows=[
    ["Tarih",data.date],["Ticker",data.ticker],["Şirket",data.name||"—"],
    ["Tür",TL[data.asset_type]||data.asset_type||"—"],
    ["İşlem",data.way==="BUY"?"Alış":"Satış"],["Adet",data.shares],
    ["Fiyat",c+fmt(data.price)],["Toplam",c+fmt((+data.shares)*(+data.price),0)],
    ["Broker",data.broker||"—"],["Komisyon",data.commission?("$"+data.commission):"—"]
  ];
  return(
    <div className="cbox" style={{marginTop:16}}>
      <div className="lbl" style={{marginBottom:12}}>Parse sonucu — doğrula</div>
      <div className="kv">
        {rows.map(([k,v])=>(
          <div key={k}><div className="kk">{k}</div><div className="kv_">{String(v)}</div></div>
        ))}
      </div>
      <div className="brow">
        <button className="pri" onClick={onSave}>Kaydet</button>
        <button onClick={onCancel}>İptal</button>
      </div>
    </div>
  );
}

// ── HistoryTab ───────────────────────────────────────────────────
function HistoryTab({txs,user,loadData,flash_,confirm_,mask,hideAmts,setTab,initialSearch,onConsume,splits}){
  const [open,setOpen]=useState(()=>initialSearch?{[initialSearch.toUpperCase()]:true}:{});
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [search,setSearch]=useState(initialSearch||"");
  const [wayF,setWayF]=useState("all");
  const [dateF,setDateF]=useState("all");
  useEffect(()=>{if(initialSearch&&onConsume)onConsume();},[]);

  const filtered=txs.filter(t=>{
    if(search){
      const q=search.toLowerCase();
      if(!t.ticker.toLowerCase().includes(q)&&!(t.name||"").toLowerCase().includes(q))return false;
    }
    if(wayF!=="all"&&t.way!==wayF)return false;
    if(dateF!=="all"){
      const days={d30:30,d90:90,y1:365}[dateF];
      if(days){const cutoff=new Date(Date.now()-days*86400000).toISOString().split("T")[0];if(t.date<cutoff)return false;}
    }
    return true;
  });

  const grouped={};
  filtered.forEach(t=>{if(!grouped[t.ticker])grouped[t.ticker]=[];grouped[t.ticker].push(t);});
  const tickers=Object.keys(grouped).sort();
  const isFiltered=search||wayF!=="all"||dateF!=="all";
  const clearFilters=()=>{setSearch("");setWayF("all");setDateF("all");};

  const startEdit=t=>{
    setEditId(t.id);
    setEditForm({date:t.date,way:t.way,shares:t.shares,price:t.price,currency:t.currency||"USD",broker:t.broker||"",commission:t.commission||0,notes:t.notes||""});
  };

  const saveEdit=async(t)=>{
    setSaving(true);
    const{error}=await sb.from("transactions").update({
      date:editForm.date,way:editForm.way,shares:+editForm.shares,price:+editForm.price,
      currency:editForm.currency,total:+((+editForm.shares)*(+editForm.price)).toFixed(4),
      broker:editForm.broker,commission:+(editForm.commission||0),notes:editForm.notes||""
    }).eq("id",t.id).eq("user_id",user.id);
    if(error){flash_(error.message,"err");}
    else{await rebuildPositions(user.id);await loadData();flash_("Güncellendi ✓");setEditId(null);}
    setSaving(false);
  };

  const delTx=async(t)=>{
    if(!(await confirm_(`${t.ticker} — ${t.date} işlemi silinsin mi?`,{okLbl:"Sil"})))return;
    await sb.from("transactions").delete().eq("id",t.id).eq("user_id",user.id);
    await rebuildPositions(user.id);await loadData();flash_("Silindi ✓");
  };

  if(txs.length===0)return(
    <div className="empty-card">
      <div className="ic">📝</div>
      <div className="ttl">Henüz işlem yok</div>
      <div className="sub">Metin, görüntü, CSV veya manuel giriş — ilk işlemini ekle.</div>
      <button className="pri" onClick={()=>setTab&&setTab("add")}>+ İlk işlemi ekle</button>
    </div>
  );

  return(
    <div>
      {/* Filter toolbar */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <input className="finp sm" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Ticker veya şirket..." style={{flex:"1 1 160px",minWidth:140}}/>
        <select className="finp sm" value={wayF} onChange={e=>setWayF(e.target.value)} style={{flex:"0 0 auto",width:90}}>
          <option value="all">Tümü</option>
          <option value="BUY">Alış</option>
          <option value="SELL">Satış</option>
        </select>
        <select className="finp sm" value={dateF} onChange={e=>setDateF(e.target.value)} style={{flex:"0 0 auto",width:120}}>
          <option value="all">Tüm zamanlar</option>
          <option value="d30">Son 30 gün</option>
          <option value="d90">Son 90 gün</option>
          <option value="y1">Son 1 yıl</option>
        </select>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span className="dim" style={{fontSize:12}}>
          {isFiltered?`${filtered.length} / ${txs.length}`:filtered.length} işlem · {tickers.length} varlık
          {isFiltered&&<button className="btn-xs" style={{marginLeft:8}} onClick={clearFilters}>Temizle</button>}
        </span>
        <div className="brow">
          <button className="pri btn-sm" onClick={()=>setTab&&setTab("add")}>+ Ekle</button>
          <button className="btn-sm" onClick={()=>setOpen(Object.fromEntries(tickers.map(t=>[t,true])))}>Tümünü Aç</button>
          <button className="btn-sm" onClick={()=>setOpen({})}>Kapat</button>
        </div>
      </div>
      {filtered.length===0&&(
        <div className="empty-card" style={{padding:"28px 20px"}}>
          <div className="ic">🔍</div>
          <div className="ttl">Eşleşen işlem yok</div>
          <div className="sub">Filtreleri değiştir ya da temizle.</div>
          <button className="pri" onClick={clearFilters}>Filtreleri temizle</button>
        </div>
      )}
      {tickers.map(tk=>{
        const items=grouped[tk];
        const isOpen=!!open[tk];
        const tot=items.reduce((a,t)=>a+(t.way==="BUY"?+t.total:-+t.total),0);
        return(
          <div key={tk} style={{marginBottom:8,border:"0.5px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
            <div onClick={()=>setOpen(o=>({...o,[tk]:!o[tk]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"var(--bg2)",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{tk}</span>
                <span className="dim" style={{fontSize:11}}>{items.length} işlem</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {!hideAmts&&<span className="dim mono" style={{fontSize:11}}>{mask("$"+fmt(tot,0))}</span>}
                <span style={{color:"var(--text3)",fontSize:12}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>
            {isOpen&&items.map(t=>(
              <div key={t.id} style={{borderTop:"0.5px solid var(--border)"}}>
                {editId===t.id?(
                  <div style={{padding:"12px 14px",background:"var(--bg3)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      <div><div className="kk" style={{marginBottom:3}}>Tarih</div><input className="finp sm" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>İşlem</div>
                        <select className="finp sm" value={editForm.way} onChange={e=>setEditForm(f=>({...f,way:e.target.value}))}>
                          <option value="BUY">Alış</option><option value="SELL">Satış</option>
                        </select>
                      </div>
                      <div><div className="kk" style={{marginBottom:3}}>Para</div>
                        <select className="finp sm" value={editForm.currency} onChange={e=>setEditForm(f=>({...f,currency:e.target.value}))}>
                          <option>USD</option><option>TRY</option><option>EUR</option>
                        </select>
                      </div>
                      <div><div className="kk" style={{marginBottom:3}}>Adet</div><input className="finp sm" type="number" value={editForm.shares} onChange={e=>setEditForm(f=>({...f,shares:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Fiyat</div><input className="finp sm" type="number" value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Broker</div><input className="finp sm" value={editForm.broker} onChange={e=>setEditForm(f=>({...f,broker:e.target.value}))}/></div>
                    </div>
                    <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Toplam: {editForm.currency==="TRY"?"₺":"$"}{fmt((+editForm.shares)*(+editForm.price))}</div>
                    <div className="brow">
                      <button className="pri btn-md" onClick={()=>saveEdit(t)} disabled={saving}>{saving?"Kaydediliyor...":"Kaydet"}</button>
                      <button className="btn-md" onClick={()=>setEditId(null)}>İptal</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center",flex:1,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,color:"var(--text2)",fontFamily:"monospace",minWidth:72}}>{t.date}</span>
                      <span className={t.way==="BUY"?"ok":"err"} style={{fontSize:11,minWidth:28}}>{t.way==="BUY"?"Alış":"Satış"}</span>
                      <span className="mono" style={{fontSize:12}}>{(+t.shares)%1===0?t.shares:(+t.shares).toFixed(4)} adet</span>
                      {!hideAmts&&<span className="mono dim" style={{fontSize:12}}>{mask((t.currency==="TRY"?"₺":"$")+fmt(t.price))}</span>}
                      {!hideAmts&&<span className="mono" style={{fontSize:12,fontWeight:600}}>{mask((t.currency==="TRY"?"₺":"$")+fmt(t.total,0))}</span>}
                      {t.broker&&<span className="dim" style={{fontSize:10}}>{t.broker}</span>}
                      {(()=>{
                        const af=(splits||[]).filter(s=>s.ticker===t.ticker&&s.split_date>t.date);
                        if(!af.length)return null;
                        const fac=af.reduce((a,s)=>a*+s.ratio,1);
                        const tip=`Bu işlem sonrası split: ${af.map(s=>`${s.split_date} ${s.ratio}:1`).join(" · ")}. Pozisyon hesabı ×${fac} uygulanır.`;
                        return<span className="badge split" title={tip}>⚡ ×{fac}</span>;
                      })()}
                    </div>
                    <div className="brow" style={{gap:5}}>
                      <button className="btn-xs" onClick={()=>startEdit(t)}>Düzenle</button>
                      <button className="btn-xs btn-danger-out" onClick={()=>delTx(t)}>Sil</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── ManuelPosForm ────────────────────────────────────────────────
function ManuelPosForm({session,user,pos,loadData,flash_,confirm_}){
  const E={ticker:"",name:"",type:"US_STOCK",shares:"",avgCost:"",currency:"USD",broker:"",commission:"",date:today()};
  const [form,setForm]=useState(E);
  const [curPrice,setCurPrice]=useState(null);
  const [fetchP,setFetchP]=useState(false);
  const [saving,setSaving]=useState(false);
  const [editTk,setEditTk]=useState(null);
  const set=f=>setForm(p=>({...p,...f}));

  const NAMES={SCHD:"Schwab US Dividend ETF",SPY:"SPDR S&P 500 ETF",QQQ:"Invesco QQQ Trust",MCHI:"iShares MSCI China ETF",VT:"Vanguard Total World ETF",NVDA:"NVIDIA Corp",SOFI:"SoFi Technologies",GOOGL:"Alphabet Inc",META:"Meta Platforms",KO:"Coca-Cola Co",UBER:"Uber Technologies",MNSO:"MINISO Group",AEVA:"Aeva Technologies",PYPL:"PayPal Holdings",SKLZ:"Skillz Inc",NNOX:"Nano-X Imaging",TSLA:"Tesla Inc",AAPL:"Apple Inc",MSFT:"Microsoft Corp",AMZN:"Amazon.com",BTC:"Bitcoin"};

  const fetchPrice=async(tk,date)=>{
    const upper=(tk||form.ticker).toUpperCase();
    const useDate=date||form.date||today();
    if(!upper)return;
    if(NAMES[upper])set({name:NAMES[upper]});
    setFetchP(true);setCurPrice(null);
    try{
      const r=await edgeCall("fetch-prices",{ticker:upper,mode:"price",date:useDate});
      const d=await r.json();
      if(d.result?.price){
        const p=d.result.price;
        setCurPrice(p);
        // Tarihin fiyatını otomatik maliyet olarak doldur
        set({avgCost:p.toFixed(2)});
      } else if(d.result?.error||d.error){
        console.warn(`[fetchPrice ${upper}]`,d.result?.error||d.error);
        flash_(`${upper}: ${d.result?.error||d.error}`,"err");
      }
    }catch(e){
      console.warn(`[fetchPrice ${upper}]`,e);
      flash_(`${upper} fiyatı alınamadı: ${e.message}`,"err");
    }
    setFetchP(false);
  };

  const startEdit=p=>{
    setEditTk(p.ticker);
    setForm({...E,ticker:p.ticker,name:p.name,type:p.type,shares:p.shares,avgCost:p.avgCost,currency:p.currency,broker:p.broker||""});
    fetchPrice(p.ticker);
  };

  const savePos=async()=>{
    if(!form.ticker||!form.shares||!form.avgCost)return;
    setSaving(true);
    const tk=form.ticker.toUpperCase();
    const nm=form.name||tk;
    const sh=+form.shares;
    const pr=+form.avgCost;

    // Transaction'a yaz
    const tx={
      user_id:user.id,
      date:form.date||today(),
      ticker:tk,name:nm,
      asset_type:form.type,
      way:"BUY",
      shares:sh,price:pr,
      currency:form.currency,
      total:+(sh*pr).toFixed(4),
      broker:form.broker||"",
      commission:+(form.commission||0),exchange:"",notes:"Manuel giriş"
    };
    const{error:te}=await sb.from("transactions").insert(tx);
    if(te){flash_(te.message,"err");setSaving(false);return;}

    // Pozisyonu güncelle
    const ex=pos.find(x=>x.ticker===tk);
    const ns=(ex?.shares||0)+sh;
    const na=((ex?.shares||0)*(ex?.avgCost||0)+sh*pr)/ns;
    await sb.from("positions").upsert({
      user_id:user.id,ticker:tk,name:nm,type:form.type,
      shares:+ns.toFixed(6),avg_cost:+na.toFixed(6),
      currency:form.currency,broker:form.broker||"",
      updated_at:new Date().toISOString()
    },{onConflict:"user_id,ticker"});

    await loadData();
    flash_(`${tk} işlem geçmişine ve pozisyona eklendi ✓`);
    setEditTk(null);setForm(E);setCurPrice(null);
    setSaving(false);
  };

  const delPos=async(tk)=>{
    if(!(await confirm_(`${tk} pozisyonu silinsin mi?`,{okLbl:"Sil"})))return;
    await sb.from("positions").delete().eq("user_id",user.id).eq("ticker",tk);
    await loadData();flash_(`${tk} silindi`);
  };

  return(
    <div>
      <div className="cbox" style={{marginBottom:16}}>
        <div className="lbl" style={{marginBottom:12}}>{editTk?`${editTk} — Düzenle`:"Yeni Pozisyon Ekle"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <div className="kk" style={{marginBottom:4}}>Tarih</div>
            <input className="finp" type="date" value={form.date}
              onChange={e=>{set({date:e.target.value});setCurPrice(null);}}
              max={today()}/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Ticker *</div>
            <div style={{display:"flex",gap:6}}>
              <input className="finp" style={{textTransform:"uppercase"}} value={form.ticker}
                onChange={e=>{set({ticker:e.target.value.toUpperCase(),name:"",avgCost:""});setCurPrice(null);}}
                onBlur={e=>e.target.value&&fetchPrice(e.target.value)}
                placeholder="AAPL" disabled={!!editTk}/>
              <button style={{whiteSpace:"nowrap",fontSize:12,padding:"7px 10px"}}
                onClick={()=>fetchPrice()} disabled={fetchP||!form.ticker}>
                {fetchP?<div className="spin" style={{width:12,height:12}}></div>:"↻"}
              </button>
            </div>
            {curPrice&&<div style={{fontSize:11,color:"var(--ok)",marginTop:4}}>{form.date} fiyatı: ${fmt(curPrice)}</div>}
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Şirket Adı</div>
            <input className="finp" value={form.name} onChange={e=>set({name:e.target.value})} placeholder="Apple Inc"/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Varlık Türü</div>
            <select className="finp" value={form.type} onChange={e=>set({type:e.target.value})}>
              <option value="US_STOCK">Hisse (US)</option>
              <option value="FUND">ETF / Fon</option>
              <option value="CRYPTO">Kripto</option>
              <option value="BIST">BIST</option>
              <option value="GOLD">Altın</option>
              <option value="FX">Döviz</option>
            </select>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Para Birimi</div>
            <select className="finp" value={form.currency} onChange={e=>set({currency:e.target.value})}>
              <option>USD</option><option>TRY</option><option>EUR</option>
            </select>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Adet *</div>
            <input className="finp" type="number" value={form.shares} onChange={e=>set({shares:e.target.value})} placeholder="0"/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Ort. Maliyet *</div>
            <input className="finp" type="number" value={form.avgCost} onChange={e=>set({avgCost:e.target.value})} placeholder="0.00"/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Broker</div>
            <input className="finp" value={form.broker} onChange={e=>set({broker:e.target.value})} placeholder="Akbank, Midas..."/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Komisyon</div>
            <input className="finp" type="number" value={form.commission} onChange={e=>set({commission:e.target.value})} placeholder="0.00"/>
          </div>
          <div style={{display:"flex",alignItems:"flex-end"}}>
            {form.shares&&form.avgCost?(
              <div style={{fontSize:11,color:"var(--text2)",padding:"7px 0"}}>
                Maliyet: {form.currency==="TRY"?"₺":"$"}{fmt((+form.shares)*(+form.avgCost),0)}
                {curPrice&&<><br/>Piyasa: {form.currency==="TRY"?"₺":"$"}{fmt((+form.shares)*curPrice,0)}</>}
              </div>
            ):null}
          </div>
        </div>
        <div className="brow">
          <button className="pri" onClick={savePos} disabled={saving||!form.ticker||!form.shares||!form.avgCost}>
            {saving?"Kaydediliyor...":(editTk?"Güncelle":"Pozisyon Kaydet")}
          </button>
          {editTk&&<button onClick={()=>{setEditTk(null);setForm(E);setCurPrice(null);}}>İptal</button>}
        </div>
        <div style={{fontSize:11,color:"var(--text2)",marginTop:8}}>⚠ Bu form pozisyonu doğrudan yazar — işlem geçmişine eklenmez.</div>
      </div>

      {pos.filter(p=>p.currency==="USD").length>0&&(
        <div>
          <div className="stitle">Mevcut Pozisyonlar</div>
          {[...pos].filter(p=>p.currency==="USD").sort((a,b)=>a.ticker.localeCompare(b.ticker)).map(p=>(
            <div key={p.ticker} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"0.5px solid var(--border)"}}>
              <div>
                <span style={{fontWeight:700,fontSize:13,fontFamily:"monospace"}}>{p.ticker}</span>
                <span className="dim" style={{fontSize:11,marginLeft:8}}>{(+p.shares)%1===0?p.shares:(+p.shares).toFixed(4)} adet · ${fmt(p.avgCost)} ort.</span>
                {p.broker&&<span className="dim" style={{fontSize:10,marginLeft:6}}>· {p.broker}</span>}
              </div>
              <div className="brow" style={{gap:5}}>
                <button className="btn-xs" onClick={()=>startEdit(p)}>Düzenle</button>
                <button className="btn-xs btn-danger-out" onClick={()=>delPos(p.ticker)}>Sil</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── AddTab ───────────────────────────────────────────────────────
function AddTab({session,user,pos,loadData,flash_,confirm_}){
  const [mode,setMode]=useState("text");
  const [parsed,setParsed]=useState(null);
  const [parsing,setParsing]=useState(false);
  const [parseErr,setParseErr]=useState("");
  const [textInput,setTextInput]=useState("");
  const [imgFile,setImgFile]=useState(null);
  const [csvText,setCsvText]=useState("");
  const [csvRows,setCsvRows]=useState([]);
  const [csvBusy,setCsvBusy]=useState(false);
  const [progStep,setProgStep]=useState("");
  const [progPct,setProgPct]=useState(0);
  const [progDone,setProgDone]=useState(false);
  const fileRef=useRef(null);

  const switchMode=m=>{setMode(m);setParsed(null);setParseErr("");};

  const callParse=async(body)=>{
    setParsing(true);setParseErr("");setParsed(null);
    try{
      const r=await edgeCall("parse-transaction",body);
      const d=await r.json();
      if(!r.ok||d.error||d.code)throw new Error(d.message||d.error||`HTTP ${r.status}`);
      if(!d.ticker||!d.date)throw new Error("Geçersiz yanıt — ticker veya tarih eksik");
      setParsed(d);
    }catch(e){setParseErr("Hata: "+e.message);}
    setParsing(false);
  };

  const parseText=()=>{if(textInput.trim())callParse({text:textInput});};

  const parseImage=async()=>{
    if(!imgFile)return;
    const b64=await new Promise((res,rej)=>{
      const rd=new FileReader();
      rd.onload=()=>res(rd.result.split(",")[1]);
      rd.onerror=rej;
      rd.readAsDataURL(imgFile);
    });
    callParse({imageBase64:b64,imageType:imgFile.type||"image/png"});
  };

  const saveTx=async()=>{
    if(!parsed)return;
    const p=parsed;
    const ex=pos.find(x=>x.ticker===p.ticker);
    const{error}=await sb.from("transactions").insert({
      user_id:user.id,date:p.date,ticker:p.ticker,name:p.name||"",
      asset_type:p.asset_type,way:p.way,shares:+p.shares,price:+p.price,
      currency:p.currency||"USD",total:+((+p.shares)*(+p.price)).toFixed(4),
      broker:p.broker||"",commission:+(p.commission||0),exchange:p.exchange||"",notes:p.notes||""
    });
    if(error){flash_(error.message,"err");return;}
    if(p.way==="BUY"){
      const ns=(ex?.shares||0)+(+p.shares);
      const na=((ex?.shares||0)*(ex?.avgCost||0)+(+p.shares)*(+p.price))/ns;
      await sb.from("positions").upsert({
        user_id:user.id,ticker:p.ticker,name:p.name||"",type:p.asset_type,
        shares:+ns.toFixed(6),avg_cost:+na.toFixed(6),currency:p.currency||"USD",
        broker:p.broker||"",updated_at:new Date().toISOString()
      },{onConflict:"user_id,ticker"});
    }else if(p.way==="SELL"&&ex){
      const ns=ex.shares-(+p.shares);
      if(ns<=CFG.DUST_THRESHOLD)await sb.from("positions").delete().eq("user_id",user.id).eq("ticker",p.ticker);
      else await sb.from("positions").update({shares:+ns.toFixed(6),updated_at:new Date().toISOString()}).eq("user_id",user.id).eq("ticker",p.ticker);
    }
    await loadData();
    setParsed(null);setTextInput("");setImgFile(null);
    flash_("Kaydedildi ✓");
  };

  const handleFile=f=>{
    if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{setCsvText(ev.target.result);setCsvRows([]);};
    rd.readAsText(f);
  };

  // RFC 4180 style splitter: quotes içinde virgül ve "" (escaped quote) destekler.
  const splitCSVLine=(line)=>{
    const out=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){
        if(inQ&&line[i+1]==='"'){cur+='"';i++;}
        else inQ=!inQ;
      } else if(c===','&&!inQ){out.push(cur);cur="";}
      else cur+=c;
    }
    out.push(cur);
    return out.map(v=>v.trim());
  };

  const parseCSV=()=>{
    const lines=csvText.trim().split(/\r?\n/).filter(l=>l.trim());
    if(lines.length===0){setCsvRows([]);flash_("CSV boş","err");return;}
    const hdrs=splitCSVLine(lines[0]).map(h=>h.toLowerCase().replace(/ /g,"_"));
    // Beklenen header (en az biri) yoksa format yanlış.
    if(!hdrs.some(h=>["ticker","date","way","shares"].includes(h))){
      setCsvRows([]);
      flash_('Header bulunamadı. İlk satır şöyle olmalı: "Date,Ticker,Name,Type,Way,Shares,Price,Currency,Total,Broker,Commission"',"err");
      return;
    }
    if(lines.length<2){setCsvRows([]);flash_("Header var ama veri satırı yok","err");return;}
    const rows=lines.slice(1).map(line=>{
      const vals=splitCSVLine(line);
      const obj={};
      hdrs.forEach((h,i)=>obj[h]=(vals[i]||""));
      return obj;
    }).filter(r=>r.ticker&&["BUY","SELL"].includes((r.way||"").toUpperCase()));
    if(rows.length===0){flash_("Geçerli BUY/SELL satırı bulunamadı","err");}
    setCsvRows(rows);
  };

  const importCSV=async()=>{
    if(!csvRows.length)return;
    setCsvBusy(true);setProgStep("Başlıyor...");setProgPct(5);setProgDone(false);

    const txInserts=csvRows.map(r=>({
      user_id:user.id,
      date:r.date||today(),
      ticker:(r.ticker||"").toUpperCase(),
      name:r.name||r.ticker||"",
      asset_type:r.type||r.asset_type||"US_STOCK",
      way:(r.way||"BUY").toUpperCase(),
      shares:parseFloat(r.shares)||0,
      price:parseFloat(r.price)||0,
      currency:r.currency||"USD",
      total:+(parseFloat(r.shares)*parseFloat(r.price)).toFixed(4),
      broker:r.broker||"",
      commission:parseFloat(r.commission)||0,
      exchange:r.exchange||"",
      notes:r.notes||""
    }));

    let ok=0;
    const bsz=CFG.CSV_BATCH_SIZE;
    for(let i=0;i<txInserts.length;i+=bsz){
      const{error}=await sb.from("transactions").insert(txInserts.slice(i,i+bsz));
      if(!error)ok+=Math.min(bsz,txInserts.length-i);
      const pct=Math.min(65,Math.round(((i+bsz)/txInserts.length)*60)+5);
      setProgStep(`${ok} / ${txInserts.length} işlem eklendi`);
      setProgPct(pct);
    }

    setProgStep("Pozisyonlar hesaplanıyor...");setProgPct(75);
    setProgStep("Supabase güncelleniyor...");setProgPct(90);
    const posCount=await rebuildPositions(user.id);
    await loadData();

    setProgStep(`✓ ${ok} işlem · ${posCount} pozisyon aktarıldı`);
    setProgPct(100);setProgDone(true);setCsvBusy(false);
    setTimeout(()=>{setCsvText("");setCsvRows([]);setProgStep("");setProgPct(0);setProgDone(false);},CFG.CSV_PROGRESS_MS);
  };

  const MODES=[["text","📝 Metin"],["image","📷 Görüntü"],["csv","📋 CSV"],["manuel","📌 Manuel"]];

  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {MODES.map(([m,l])=>(
          <button key={m} className={"mtab"+(mode===m?" on":"")} onClick={()=>switchMode(m)}>{l}</button>
        ))}
      </div>

      {mode==="text"&&(
        <div>
          <textarea value={textInput} onChange={e=>setTextInput(e.target.value)} rows={4}
            placeholder={"\"NVDA 5 adet $210 Akbank bugün\"\n\"SPY 2 lot sattım $715 QNB komisyon $3\"\n\"BTC 0.001 adet 95000 TRY Binance\""}
            style={{marginBottom:10,lineHeight:1.6,resize:"vertical"}}/>
          <button className="pri" onClick={parseText} disabled={parsing||!textInput.trim()}>
            {parsing?"Parse ediliyor...":"AI ile Parse Et"}
          </button>
          {parseErr&&<div className="flash err" style={{marginTop:10}}>{parseErr}</div>}
          <ConfirmBox data={parsed} onSave={saveTx} onCancel={()=>setParsed(null)}/>
        </div>
      )}

      {mode==="image"&&(
        <div>
          <div style={{marginBottom:12}}>
            <div className="lbl" style={{marginBottom:8}}>Broker ekran görüntüsü</div>
            <input type="file" accept="image/*" onChange={e=>setImgFile(e.target.files[0])} style={{fontSize:13}}/>
            {imgFile&&<div style={{fontSize:11,color:"var(--text2)",marginTop:6}}>{imgFile.name} · {(imgFile.size/1024).toFixed(0)} KB</div>}
          </div>
          <button className="pri" onClick={parseImage} disabled={parsing||!imgFile}>
            {parsing?"Okunuyor...":"Görüntüyü Oku"}
          </button>
          {parseErr&&<div className="flash err" style={{marginTop:10}}>{parseErr}</div>}
          <ConfirmBox data={parsed} onSave={saveTx} onCancel={()=>setParsed(null)}/>
        </div>
      )}

      {mode==="csv"&&(
        <div>
          <div style={{marginBottom:12}}>
            <div className="lbl" style={{marginBottom:8}}>Dosya Yükle</div>
            <input ref={fileRef} type="file" accept=".csv,text/csv" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
            <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{marginBottom:10}}>📂 Dosya Seç</button>
          </div>
          <div style={{marginBottom:12}}>
            <div className="lbl" style={{marginBottom:6}}>veya Yapıştır</div>
            <textarea value={csvText} onChange={e=>{setCsvText(e.target.value);setCsvRows([]);}} rows={4}
              placeholder={"Date,Ticker,Name,Type,Way,Shares,Price,Currency,Total,Broker,Commission\n2021-03-03,TSLA,Tesla Inc,US_STOCK,BUY,2,692.08,USD,1384.16,QNB,20"}
              style={{fontSize:11,fontFamily:"monospace",resize:"vertical",marginBottom:0}}/>
          </div>
          <div className="brow" style={{marginBottom:14}}>
            <button onClick={parseCSV} disabled={!csvText.trim()||csvBusy}>Önizle</button>
            {csvRows.length>0&&!csvBusy&&!progDone&&(
              <button className="pri" onClick={importCSV}>{csvRows.length} İşlemi İçe Aktar</button>
            )}
          </div>
          {progStep&&(
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,color:progDone?"var(--ok)":"var(--text2)"}}>{progStep}</span>
                <span style={{fontSize:11,color:"var(--text3)"}}>{progPct}%</span>
              </div>
              <div className="pbar">
                <div className="pbar-fill" style={{width:progPct+"%",background:progDone?"var(--ok)":"var(--info)"}}/>
              </div>
            </div>
          )}
          {csvRows.length>0&&!csvBusy&&(
            <div>
              <div className="stitle">{csvRows.length} işlem bulundu — ilk 5:</div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr>{["Tarih","Ticker","İşlem","Adet","Fiyat","Broker"].map(h=><th key={h} className="l">{h}</th>)}</tr></thead>
                  <tbody>
                    {csvRows.slice(0,5).map((r,i)=>(
                      <tr key={i}>
                        <td className="l" style={{fontSize:11}}>{r.date}</td>
                        <td className="l" style={{fontWeight:700}}>{r.ticker}</td>
                        <td className={"l "+((r.way||"").toUpperCase()==="BUY"?"ok":"err")} style={{fontSize:11}}>{(r.way||"").toUpperCase()==="BUY"?"Alış":"Satış"}</td>
                        <td className="l">{r.shares}</td>
                        <td className="l">{r.price}</td>
                        <td className="l" style={{fontSize:11}}>{r.broker}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {csvRows.length>5&&<div className="dim" style={{fontSize:11,marginTop:4}}>...ve {csvRows.length-5} işlem daha</div>}
            </div>
          )}
        </div>
      )}

      {mode==="manuel"&&(
        <ManuelPosForm session={session} user={user} pos={pos} loadData={loadData} flash_={flash_} confirm_={confirm_}/>
      )}
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────
function App({session}){
  const user=session.user;
  const [tab,setTab]=useState("dashboard");
  const [navTicker,setNavTicker]=useState("");
  const openHistory=tk=>{setNavTicker(tk);setTab("history");};
  const [period,setPeriod]=useState("max"); // selected period on dashboard
  const [pos,setPos]=useState([]);
  const [txs,setTxs]=useState([]);
  const [splits,setSplits]=useState([]);
  const [prc,setPrc_]=useState(()=>{const p=LS.get("il_prc",null);return p?p.p:{};});
  const [pdate,setPdate]=useState(()=>{const p=LS.get("il_prc",null);return p?p.d:"—";});
  const [hist,setHist_]=useState(()=>LS.get("il_hist",{}));
  const [hide,setHide_]=useState(()=>LS.get("il_hide",false));
  const [sort,setSort]=useState({by:"mv",dir:"desc"});
  const [distMode,setDistMode]=useState("mv"); // "cost" | "mv" — pie chart mode
  const [busy,setBusy]=useState({p:false,h:false,d:false});
  const [pprog,setPprog]=useState("");
  const [flash,setFlash]=useState(null);

  const savePrc=(p,d)=>{setPrc_(p);setPdate(d);LS.set("il_prc",{p,d});};
  const saveHist=h=>{setHist_(h);LS.set("il_hist",h);};
  const saveHide=v=>{setHide_(v);LS.set("il_hide",v);};
  const flash_=(msg,t="ok")=>{setFlash({msg,t});setTimeout(()=>setFlash(null),CFG.FLASH_MS);};
  const mask=v=>hide?<span className="mask">••••</span>:v;

  // Async confirm dialog — window.confirm yerine.
  // Kullanım: if(!(await confirm_("Silinsin mi?"))) return;
  const [confirmSt,setConfirmSt]=useState(null);
  const confirm_=(msg,{okLbl="Evet",cancelLbl="İptal",danger=true}={})=>
    new Promise(resolve=>setConfirmSt({msg,okLbl,cancelLbl,danger,resolve}));
  const closeConfirm=(val)=>{if(confirmSt){confirmSt.resolve(val);setConfirmSt(null);}};
  useEffect(()=>{
    if(!confirmSt)return;
    const onKey=e=>{if(e.key==="Escape")closeConfirm(false);else if(e.key==="Enter")closeConfirm(true);};
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[confirmSt]);

  const loadData=async()=>{
    setBusy(b=>({...b,d:true}));
    const[pr,tr,sr,pc]=await Promise.all([
      sb.from("positions").select("*").eq("user_id",user.id),
      sb.from("transactions").select("*").eq("user_id",user.id).order("date",{ascending:false}),
      sb.from("splits").select("*").eq("user_id",user.id),
      sb.from("price_cache").select("*")
    ]);
    if(pr.data)setPos(pr.data.map(p=>({ticker:p.ticker,name:p.name,type:p.type,shares:+p.shares,avgCost:+p.avg_cost,currency:p.currency,broker:p.broker})));
    if(tr.data)setTxs(tr.data.map(t=>({id:t.id,date:t.date,ticker:t.ticker,name:t.name,asset_type:t.asset_type,way:t.way,shares:+t.shares,price:+t.price,currency:t.currency,total:+t.total,broker:t.broker,commission:+t.commission})));
    if(sr.data)setSplits(sr.data);
    // Paylaşımlı fiyat cache'ini uygula — LS'teki hist/prc üstüne yazar.
    const cachedSet=new Set((pc.data||[]).map(c=>c.ticker));
    if(pc.data&&pc.data.length){
      const num=v=>v==null?null:+v;
      const nh={...hist},np={...prc};
      let latestDate=pdate;
      for(const c of pc.data){
        nh[c.ticker]={last:num(c.price),d1:num(c.d1),w1:num(c.w1),m1:num(c.m1),y1:num(c.y1),p_d1:num(c.p_d1),p_w1:num(c.p_w1),p_m1:num(c.p_m1),p_m3:num(c.p_m3),p_m6:num(c.p_m6),p_y1:num(c.p_y1)};
        if(c.price!=null)np[c.ticker]=+c.price;
        const d=c.updated_at?.split("T")[0];
        if(d&&(latestDate==="—"||d>latestDate))latestDate=d;
      }
      saveHist(nh);savePrc(np,latestDate);
    }
    // Backfill: LS'te olan ama cache'te olmayan ticker'ları cache'e yaz.
    // Sadece tarihi veri tam olanlar (p_y1 != null), tek seferlik katkı.
    const toBackfill=Object.keys(hist).filter(t=>!cachedSet.has(t)&&hist[t]?.p_y1!=null);
    if(toBackfill.length){
      const rows=toBackfill.map(t=>{
        const h=hist[t];
        return{ticker:t,price:h.last,d1:h.d1,w1:h.w1,m1:h.m1,y1:h.y1,p_d1:h.p_d1,p_w1:h.p_w1,p_m1:h.p_m1,p_m3:h.p_m3,p_m6:h.p_m6,p_y1:h.p_y1,updated_at:new Date().toISOString()};
      });
      sb.from("price_cache").upsert(rows,{onConflict:"ticker"}).then(({error})=>{
        if(error)console.warn("[cache backfill]",error.message);
        else console.log(`[cache backfill] ${rows.length} ticker paylaşımlı cache'e eklendi`);
      });
    }
    setBusy(b=>({...b,d:false}));
  };
  useEffect(()=>{loadData();},[]);

  // pos yüklendikten sonra cache'te olmayan USD ticker'lar için arka planda otomatik fetchHist.
  // Kullanıcı hiçbir butona basmadan chart + period butonlarını görür.
  useEffect(()=>{
    if(!pos.length||busy.h||busy.p)return;
    const tickers=pos.filter(p=>p.currency==="USD").map(p=>p.ticker);
    const missing=tickers.filter(t=>!hist[t]||hist[t].p_y1==null);
    if(missing.length){
      flash_(`${missing.length} ticker için tarihi veri otomatik yükleniyor...`,"ok");
      fetchHist(missing);
    }
  },[pos]);

  // Derived
  const usd=pos.filter(p=>p.currency==="USD").map(p=>{
    const price=prc[p.ticker],cost=p.shares*p.avgCost;
    const mv=price!=null?p.shares*price:null,pl=mv!=null?mv-cost:null;
    const h=hist[p.ticker]||null;
    return{...p,price,cost,mv,pl,plPct:(pl!=null&&cost>0)?(pl/cost)*100:null,d1:h?.d1??null,w1:h?.w1??null,m1:h?.m1??null,y1:h?.y1??null};
  });
  const tC=usd.reduce((a,p)=>a+p.cost,0);
  const tM=usd.reduce((a,p)=>a+(p.mv??p.cost),0);
  const tP=tM-tC,tPct=tC>0?(tP/tC)*100:null;
  // Varlık türü başına iki dağılım: cost ve market value (pie chart toggle için)
  const byTCost={},byTMV={};
  usd.forEach(p=>{
    byTCost[p.type]=(byTCost[p.type]||0)+p.cost;
    byTMV[p.type]=(byTMV[p.type]||0)+(p.mv??p.cost);
  });
  const byT=distMode==="cost"?byTCost:byTMV;
  const pPerf=k=>{const v=usd.filter(p=>p[k]!=null&&p.mv!=null);if(!v.length)return null;const s=v.reduce((a,p)=>a+p.mv,0);return v.reduce((a,p)=>a+p[k]*(p.mv/s),0);};
  const hasH=Object.keys(hist).length>0;
  const sorted=[...usd].sort((a,b)=>{const va=a[sort.by]??0,vb=b[sort.by]??0;return sort.dir==="asc"?va-vb:vb-va;});
  const tsort=k=>setSort(s=>({by:k,dir:s.by===k&&s.dir==="asc"?"desc":"asc"}));
  const sa=k=>sort.by===k?(sort.dir==="asc"?" ↑":" ↓"):"";
  const top4=fn=>[...usd].filter(p=>p.plPct!=null).sort(fn).slice(0,4);

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  const fetchPrices=async()=>{
    setBusy(b=>({...b,p:true}));
    const tickers=pos.filter(p=>p.currency==="USD").map(p=>p.ticker);
    const np={...prc};let cnt=0;const failed=[];
    for(let i=0;i<tickers.length;i++){
      const t=tickers[i];
      setPprog(`${t} (${i+1}/${tickers.length})`);
      try{
        const r=await edgeCall("fetch-prices",{ticker:t,mode:"price"});
        const d=await r.json();
        if(d.result?.price){np[t]=d.result.price;cnt++;}
        else{failed.push(t);console.warn(`[fetchPrices ${t}]`,d.result?.error||d.error||"no price");}
      }catch(e){failed.push(t);console.warn(`[fetchPrices ${t}]`,e);}
      if(i<tickers.length-1)await sleep(CFG.RATE_LIMIT_MS);
    }
    savePrc(np,new Date(Date.now()-86400000).toISOString().split("T")[0]);
    setBusy(b=>({...b,p:false}));setPprog("");
    flash_(`${cnt}/${tickers.length} fiyat güncellendi`+(failed.length?` · başarısız: ${failed.join(", ")}`:""),failed.length?"err":"ok");
  };

  const fetchHist=async(tickersOverride)=>{
    setBusy(b=>({...b,h:true}));
    const tickers=tickersOverride||pos.filter(p=>p.currency==="USD").map(p=>p.ticker);
    const nh={...hist};const np={...prc};let cnt=0;const failed=[];
    for(let i=0;i<tickers.length;i++){
      const t=tickers[i];
      setPprog(`${t} tarihi (${i+1}/${tickers.length})`);
      try{
        const r=await edgeCall("fetch-prices",{ticker:t,mode:"historical"});
        const d=await r.json();
        const v=d.result;
        if(v?.price){
          nh[t]={
            last:v.price,
            d1:v.d1,w1:v.w1,m1:v.m1,y1:v.y1,
            p_d1:v.p_d1,p_w1:v.p_w1,p_m1:v.p_m1,
            p_m3:v.p_m3,p_m6:v.p_m6,p_y1:v.p_y1
          };
          np[t]=v.price;cnt++;
          // Paylaşımlı cache'e yaz — diğer user'lar da faydalansın.
          sb.from("price_cache").upsert({
            ticker:t,price:v.price,
            d1:v.d1,w1:v.w1,m1:v.m1,y1:v.y1,
            p_d1:v.p_d1,p_w1:v.p_w1,p_m1:v.p_m1,
            p_m3:v.p_m3,p_m6:v.p_m6,p_y1:v.p_y1,
            updated_at:new Date().toISOString()
          },{onConflict:"ticker"}).then(({error})=>{if(error)console.warn(`[cache upsert ${t}]`,error.message);});
        } else {
          failed.push(t);console.warn(`[fetchHist ${t}]`,v?.error||d.error||"no data");
        }
      }catch(e){failed.push(t);console.warn(`[fetchHist ${t}]`,e);}
      if(i<tickers.length-1)await sleep(CFG.RATE_LIMIT_MS);
    }
    saveHist(nh);
    savePrc(np,new Date(Date.now()-86400000).toISOString().split("T")[0]);
    setBusy(b=>({...b,h:false}));setPprog("");
    flash_(`${cnt}/${tickers.length} tarihi veri yüklendi`+(failed.length?` · başarısız: ${failed.join(", ")}`:""),failed.length?"err":"ok");
  };

  const dlCSV=(rows,hdr,name)=>{const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent([hdr,...rows].join("\n"));a.download=name;a.click();};
  // CSV round-trip: virgül / tırnak / satır sonu içeren alanları tırnak içine al.
  const csvEsc=(v)=>{const s=v==null?"":String(v);return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const csvRow=(cols)=>cols.map(csvEsc).join(",");
  const expTx=()=>dlCSV(txs.map(t=>csvRow([t.date,t.ticker,t.name||"",t.asset_type||"",t.way,t.shares,t.price,t.currency||"USD",t.total||"",t.broker||"",t.commission||0])),"Date,Ticker,Name,Type,Way,Shares,Price,Currency,Total,Broker,Commission",`txs_${today()}.csv`);
  const expPos=()=>dlCSV(pos.map(p=>csvRow([p.ticker,p.name,p.type,p.shares,p.avgCost,p.currency,p.broker])),"Ticker,Name,Type,Shares,AvgCost,Currency,Broker",`pos_${today()}.csv`);

  const TABS=[["dashboard","Dashboard"],["history","İşlemler"],["add","+ Ekle"],["settings","Ayarlar"]];

  if(busy.d&&pos.length===0)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",gap:10,color:"#888",fontSize:13}}><div className="spin"></div>Yükleniyor...</div>;

  return(
    <div>
      <div className="hdr">
        <div>
          <h1>Investment Ledger</h1>
          <div className="sub">{user.email}{pdate!=="—"&&<span style={{marginLeft:8}}>· {pdate}</span>}{hasH&&<span className="dim" style={{marginLeft:8}}>· tarihi ✓</span>}</div>
        </div>
        <button className={"eye-btn"+(hide?" on":"")} onClick={()=>saveHide(!hide)}>{hide?<IconEyeOff/>:<IconEye/>}</button>
      </div>

      <div className="tabs">
        {TABS.map(([id,lbl])=><button key={id} className={"tab"+(tab===id?" on":"")} onClick={()=>setTab(id)}>{lbl}</button>)}
      </div>

      {flash&&<div className={"flash "+flash.t}>{flash.msg}</div>}

      {/* DASHBOARD */}
      {tab==="dashboard"&&pos.length===0&&(
        <div className="empty-card">
          <div className="ic">📊</div>
          <div className="ttl">Henüz pozisyon yok</div>
          <div className="sub">İlk yatırımını ekle ve takibe başla. Metin, görüntü, CSV veya manuel giriş yapabilirsin.</div>
          <button className="pri" onClick={()=>setTab("add")}>+ İlk işlemi ekle</button>
        </div>
      )}
      {tab==="dashboard"&&pos.length>0&&(()=>{
        // Period performance calculation
        const PERIODS=[
          {key:"d1",  lbl:"1G",  priceKey:"p_d1"},
          {key:"w1",  lbl:"1H",  priceKey:"p_w1"},
          {key:"m1",  lbl:"1A",  priceKey:"p_m1"},
          {key:"m3",  lbl:"3A",  priceKey:"p_m3"},
          {key:"m6",  lbl:"6A",  priceKey:"p_m6"},
          {key:"y1",  lbl:"1Y",  priceKey:"p_y1"},
          {key:"max", lbl:"Max", priceKey:null},
        ];

        const periodPerf=(key,priceKey)=>{
          if(key==="max")return{pl:tP,pct:tPct};
          const valid=usd.filter(p=>p.mv!=null&&hist[p.ticker]?.[priceKey]!=null);
          if(!valid.length)return null;
          const now=valid.reduce((a,p)=>a+p.mv,0);
          const past=valid.reduce((a,p)=>a+p.shares*hist[p.ticker][priceKey],0);
          if(past<=0)return null;
          return{pl:now-past,pct:(now/past-1)*100};
        };

        const sel=PERIODS.find(p=>p.key===period)||PERIODS[6];
        const perf=periodPerf(sel.key,sel.priceKey);

        return(
          <div>
            {/* Fiyat yok uyarısı */}
            {usd.length>0 && Object.keys(prc).length===0 && !busy.p && (
              <div className="warn-card">
                <div>
                  <div className="wc-ttl">Fiyatlar çekilmedi</div>
                  <div className="wc-sub">P&L hesaplamaları için güncel fiyatlar gerekli.</div>
                </div>
                <button className="pri" onClick={fetchPrices}>Şimdi çek</button>
              </div>
            )}
            {/* Summary cards */}
            <div className="g4">
              {[{l:"Maliyet",v:mask("$"+fmt(tC))},{l:"Piyasa Değeri",v:mask("$"+fmt(tM))},
                {l:"P&L ("+sel.lbl+")",v:perf?mask(fmtD(perf.pl)):"—",c:perf?pc(perf.pl):""},
                {l:"P&L % ("+sel.lbl+")",v:perf?fmtP(perf.pct):"—",c:perf?pc(perf.pct):""}
              ].map(x=>(
                <div key={x.l} className="card"><div className="lbl">{x.l}</div><div className={"mono"+(x.c||"")} style={{fontSize:16,fontWeight:600}}>{x.v}</div></div>
              ))}
            </div>

            {/* Period selector */}
            <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
              {PERIODS.map(p=>{
                const available=p.key==="max"||(hasH&&hist[usd[0]?.ticker]?.[p.priceKey]!=null);
                return(
                  <button key={p.key}
                    onClick={()=>setPeriod(p.key)}
                    disabled={!available&&p.key!=="max"}
                    style={{
                      flex:1,minWidth:40,fontSize:12,padding:"5px 8px",
                      background:period===p.key?"var(--info)":"var(--bg2)",
                      borderColor:period===p.key?"var(--info)":"var(--border2)",
                      color:period===p.key?"#fff":available?"var(--text)":"var(--text3)",
                    }}>{p.lbl}</button>
                );
              })}
            </div>

            {/* Period performance bar (if hist loaded) */}
            {hasH&&perf&&(
              <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span className="dim" style={{fontSize:12}}>{sel.lbl} performans</span>
                  <div style={{display:"flex",gap:16,alignItems:"center"}}>
                    {!hide&&<span className={"mono "+(perf.pl>=0?"ok":"err")} style={{fontSize:15,fontWeight:600}}>{fmtD(perf.pl)}</span>}
                    <span className={"mono "+(perf.pct>=0?"ok":"err")} style={{fontSize:18,fontWeight:700}}>{fmtP(perf.pct)}</span>
                  </div>
                </div>
              </div>
            )}

            {/* Değer trendi (mevcut pozisyonların geçmiş fiyatlarla değeri) */}
            {hasH&&!hide&&(()=>{
              const CHART=[
                {lbl:"1Y", priceKey:"p_y1"},
                {lbl:"6A", priceKey:"p_m6"},
                {lbl:"3A", priceKey:"p_m3"},
                {lbl:"1A", priceKey:"p_m1"},
                {lbl:"1H", priceKey:"p_w1"},
                {lbl:"1G", priceKey:"p_d1"},
                {lbl:"Bugün", priceKey:null},
              ];
              const data=CHART.map(({lbl,priceKey})=>{
                if(priceKey===null)return{lbl,value:tM};
                const valid=usd.filter(p=>p.mv!=null&&hist[p.ticker]?.[priceKey]!=null);
                if(!valid.length)return null;
                return{lbl,value:valid.reduce((a,p)=>a+p.shares*hist[p.ticker][priceKey],0)};
              }).filter(Boolean);
              if(data.length<2)return null;
              return(
                <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
                  <div className="stitle" style={{marginBottom:10}}>Değer Trendi</div>
                  <SparkChart data={data}/>
                  <div className="dim" style={{fontSize:10,marginTop:6}}>ℹ Mevcut pozisyonların geçmiş fiyatlarla değeri — gerçek tarihi bakiye değil.</div>
                </div>
              );
            })()}

            {/* Varlık dağılımı — pie + legend */}
            {(()=>{
              const entries=Object.entries(byT).sort((a,b)=>b[1]-a[1]);
              const total=entries.reduce((a,[,v])=>a+v,0);
              if(total<=0)return null;
              const CX=60,CY=60,R=50;
              const polar=(a)=>({x:CX+R*Math.cos(a-Math.PI/2),y:CY+R*Math.sin(a-Math.PI/2)});
              let ang=0;
              const slices=entries.map(([type,value])=>{
                const frac=value/total;
                const start=ang, end=ang+frac*2*Math.PI;
                ang=end;
                let path;
                if(frac>=0.9999){
                  // tek tür = tam çember, arc yerine iki yarım path
                  path=`M ${CX} ${CY-R} A ${R} ${R} 0 1 1 ${CX} ${CY+R} A ${R} ${R} 0 1 1 ${CX} ${CY-R} Z`;
                } else {
                  const s=polar(end),e=polar(start);
                  const large=(end-start)<=Math.PI?"0":"1";
                  path=`M ${CX} ${CY} L ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${R} ${R} 0 ${large} 0 ${e.x.toFixed(2)} ${e.y.toFixed(2)} Z`;
                }
                return{type,value,frac,path};
              });
              return(
                <div className="card" style={{marginBottom:16,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <span className="stitle" style={{marginBottom:0}}>Varlık Dağılımı</span>
                    <div className="seg">
                      <button className={distMode==="cost"?"on":""} onClick={()=>setDistMode("cost")}>Maliyet</button>
                      <button className={distMode==="mv"?"on":""} onClick={()=>setDistMode("mv")}>Piyasa</button>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:18,alignItems:"center",flexWrap:"wrap"}}>
                    <svg viewBox="0 0 120 120" style={{width:140,height:140,flex:"0 0 auto"}}>
                      {slices.map(s=>(
                        <path key={s.type} d={s.path} fill={TYPE_COLORS[s.type]||"#666"} stroke="var(--bg2)" strokeWidth="1"/>
                      ))}
                    </svg>
                    <div style={{flex:1,minWidth:180}}>
                      {slices.map(s=>(
                        <div key={s.type} className="pie-row">
                          <span className="pie-sw" style={{background:TYPE_COLORS[s.type]||"#666"}}></span>
                          <span style={{flex:1}}>{TL[s.type]||s.type}</span>
                          <span className="mono" style={{minWidth:64,textAlign:"right"}}>{mask("$"+fmt(s.value,0))}</span>
                          <span className="dim" style={{minWidth:46,textAlign:"right",fontSize:11}}>{(s.frac*100).toFixed(1)}%</span>
                        </div>
                      ))}
                      <div style={{borderTop:"0.5px solid var(--border)",marginTop:6,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600}}>
                        <span>Toplam</span>
                        <span className="mono">{mask("$"+fmt(total,0))}</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Pozisyonlar listesi */}
            <div style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="stitle">Pozisyonlar</div>
                <div className="brow">
                  <button className="pri btn-xs" onClick={()=>setTab("add")}>+ Ekle</button>
                  <button className="btn-xs" onClick={loadData} disabled={busy.d}>{busy.d?"...":"Yenile"}</button>
                  <button className="btn-xs" onClick={expPos}>CSV ↗</button>
                </div>
              </div>
              <div className="tbl-wrap">
                <table>
                  <thead><tr>
                    <th className="l" onClick={()=>tsort("ticker")}>Ticker{sa("ticker")}</th>
                    {!hide&&<th className="r" onClick={()=>tsort("shares")}>Adet{sa("shares")}</th>}
                    {!hide&&<th className="r" onClick={()=>tsort("avgCost")}>Maliyet{sa("avgCost")}</th>}
                    {!hide&&<th className="r" onClick={()=>tsort("price")}>Fiyat{sa("price")}</th>}
                    {!hide&&<th className="r" onClick={()=>tsort("mv")}>Değer{sa("mv")}</th>}
                    {!hide&&<th className="r" onClick={()=>tsort("pl")}>P&L${sa("pl")}</th>}
                    <th className="r" onClick={()=>tsort("plPct")}>P&L%{sa("plPct")}</th>
                    {hasH&&<th className="r" onClick={()=>tsort("d1")}>1G{sa("d1")}</th>}
                    {hasH&&<th className="r" onClick={()=>tsort("w1")}>1H{sa("w1")}</th>}
                    {hasH&&<th className="r" onClick={()=>tsort("m1")}>1A{sa("m1")}</th>}
                    {hasH&&<th className="r" onClick={()=>tsort("y1")}>1Y{sa("y1")}</th>}
                  </tr></thead>
                  <tbody>
                    {sorted.map(p=>(
                      <tr key={p.ticker} className="pos-row" onClick={()=>openHistory(p.ticker)} title={`${p.ticker} işlemlerini göster`}>
                        <td className="l"><div className="tcell"><span className="tsym">{p.ticker}{p.type==="FUND"&&<span className="badge etf">ETF</span>}{p.type==="CRYPTO"&&<span className="badge cry">₿</span>}</span><span className="tname">{p.name}</span></div></td>
                        {!hide&&<td className="r">{p.shares%1===0?p.shares:p.shares.toFixed(4)}</td>}
                        {!hide&&<td className="r">{mask("$"+fmt(p.avgCost))}</td>}
                        {!hide&&<td className="r">{p.price?mask("$"+fmt(p.price)):"—"}</td>}
                        {!hide&&<td className="r">{p.mv?mask("$"+fmt(p.mv,0)):"—"}</td>}
                        {!hide&&<td className={"r"+pc(p.pl)}>{fmtD(p.pl)}</td>}
                        <td className={"r"+pc(p.plPct)}>{fmtP(p.plPct)}</td>
                        {hasH&&<td className={"r"+pc(p.d1)}>{fmtP(p.d1)}</td>}
                        {hasH&&<td className={"r"+pc(p.w1)}>{fmtP(p.w1)}</td>}
                        {hasH&&<td className={"r"+pc(p.m1)}>{fmtP(p.m1)}</td>}
                        {hasH&&<td className={"r"+pc(p.y1)}>{fmtP(p.y1)}</td>}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            <div style={{fontSize:11,color:"var(--text2)",marginTop:8}}>{txs.length} işlem · {usd.length} USD pozisyon{!hasH&&<span style={{marginLeft:8}}>· Tarihi veri için Ayarlar → "Tarihi Veri" butonu</span>}</div>

            {/* TRY / EUR pozisyonları — fiyat desteği olmadığından yalnızca maliyet */}
            {["TRY","EUR"].map(cur=>{
              const items=pos.filter(p=>p.currency===cur);
              if(!items.length)return null;
              const cSym=cur==="TRY"?"₺":"€";
              const totCost=items.reduce((a,p)=>a+p.shares*p.avgCost,0);
              return(
                <div key={cur} style={{marginTop:22}}>
                  <div className="stitle">{cur} Pozisyonları · {mask(cSym+fmt(totCost,0))} maliyet</div>
                  <div className="tbl-wrap">
                    <table>
                      <thead><tr>
                        <th className="l">Ticker</th>
                        {!hide&&<th className="r">Adet</th>}
                        {!hide&&<th className="r">Ort. Maliyet</th>}
                        {!hide&&<th className="r">Toplam</th>}
                        <th className="l">Broker</th>
                      </tr></thead>
                      <tbody>
                        {[...items].sort((a,b)=>a.ticker.localeCompare(b.ticker)).map(p=>(
                          <tr key={p.ticker} className="pos-row" onClick={()=>openHistory(p.ticker)} title={`${p.ticker} işlemlerini göster`}>
                            <td className="l"><div className="tcell"><span className="tsym">{p.ticker}</span><span className="tname">{p.name}</span></div></td>
                            {!hide&&<td className="r">{p.shares%1===0?p.shares:p.shares.toFixed(4)}</td>}
                            {!hide&&<td className="r">{mask(cSym+fmt(p.avgCost))}</td>}
                            {!hide&&<td className="r">{mask(cSym+fmt(p.shares*p.avgCost,0))}</td>}
                            <td className="l" style={{fontSize:11,color:"var(--text2)"}}>{p.broker||"—"}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div className="dim" style={{fontSize:10,marginTop:4}}>ℹ {cur} için güncel fiyat desteği yok — yalnızca maliyet gösteriliyor.</div>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* HISTORY */}
      {tab==="history"&&(
        <HistoryTab txs={txs} user={user} loadData={loadData} flash_={flash_} confirm_={confirm_} mask={mask} hideAmts={hide} setTab={setTab} initialSearch={navTicker} onConsume={()=>setNavTicker("")} splits={splits}/>
      )}

      {/* ADD */}
      {tab==="add"&&(
        <AddTab session={session} user={user} pos={pos} loadData={loadData} flash_={flash_} confirm_={confirm_}/>
      )}

      {/* SETTINGS */}
      {tab==="settings"&&(
        <div>
          <div className="sg">
            <label>Fiyat & Veri</label>
            {(busy.p||busy.h)
              ?<div className="dim" style={{fontSize:13,display:"flex",alignItems:"center",gap:8}}><div className="spin" style={{width:14,height:14}}></div><span className="mono">{pprog}</span></div>
              :<div className="brow">
                <button onClick={fetchPrices}>Güncel Fiyatlar</button>
                <button onClick={fetchHist}>Tarihi Veri (1G/1H/1A/1Y)</button>
                <button onClick={async()=>{
                  try{
                    const r=await edgeCall("fetch-prices",{ticker:"NVDA",mode:"price"});
                    const txt=await r.text();
                    alert("HTTP "+r.status+"\n\n"+txt.slice(0,600));
                  }catch(e){alert("HATA: "+e.message);}
                }} style={{fontSize:11,padding:"5px 10px",color:"var(--warn)",borderColor:"var(--warn)"}}>🔍 Bağlantı Test</button>
              </div>}
            <div className="hint">Ticker başına ~8 sn · "Bağlantı Test" ile önce tek ticker dene</div>
          </div>
          <div className="sg">
            <label>Pozisyon Bakımı</label>
            <div className="brow">
              <button onClick={async()=>{
                const n=await rebuildPositions(user.id);
                await loadData();
                flash_(`Pozisyonlar yeniden hesaplandı · ${n} pozisyon`);
              }}>♻️ Pozisyonları Yeniden Hesapla</button>
            </div>
            <div className="hint">Split eklendi/değiştirildiyse basın — tüm işlemler split-aware yeniden hesaplanır.</div>
          </div>
          <div className="sg">
            <label>Export</label>
            <div className="brow">
              <button onClick={expTx}>İşlemler CSV</button>
              <button onClick={expPos}>Pozisyonlar CSV</button>
            </div>
          </div>
          <div style={{borderTop:"0.5px solid var(--border)",paddingTop:16,marginBottom:16}}>
            <div className="stitle">Sistem Durumu</div>
            {[
              [true,"Supabase","Bağlı · RLS aktif"],
              [true,"Edge Functions","parse-transaction · fetch-prices"],
              [hasH,"Tarihi Veri",hasH?Object.keys(hist).length+" ticker":"Yüklenmedi"],
              [pdate!=="—","Son Fiyat",pdate],
              [true,"Pozisyonlar",pos.length+" açık"],
              [true,"İşlemler",txs.length+" kayıtlı"],
              [splits.length>0,"Split Kayıtları",splits.length>0?splits.length+" tanımlı":"Yok / okunamıyor"],
            ].map(([ok,l,v])=>(
              <div key={l} className="row">
                <span style={{fontSize:13}}><span className={"dot "+(ok?"ok":"off")}></span>{l}</span>
                <span className="dim" style={{fontSize:12}}>{v}</span>
              </div>
            ))}
          </div>
          <button className="danger" onClick={()=>sb.auth.signOut()} style={{width:"100%"}}>Çıkış Yap</button>
        </div>
      )}

      {/* Confirm modal */}
      {confirmSt&&(
        <div className="mdl-bd" onClick={()=>closeConfirm(false)}>
          <div className="mdl-bx" onClick={e=>e.stopPropagation()}>
            <div className="mdl-msg">{confirmSt.msg}</div>
            <div className="brow">
              <button onClick={()=>closeConfirm(false)}>{confirmSt.cancelLbl}</button>
              <button className={confirmSt.danger?"danger":"pri"} onClick={()=>closeConfirm(true)} autoFocus>{confirmSt.okLbl}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Root ─────────────────────────────────────────────────────────
function Root(){
  const [session,setSession]=useState(undefined);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);
  if(session===undefined)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"80vh",gap:10,color:"#888",fontSize:13}}><div className="spin"></div>Yükleniyor...</div>;
  if(!session)return<Login/>;
  return<App session={session}/>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<Root/>);
</script>
</body>
</html>
