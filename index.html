  <style>

      .logo-text{display:none;}

    .finp{background:var(--bg);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;width:100%;padding:7px 9px;font-size:13px;}

    .pos-row{cursor:pointer;transition:background .12s ease;}

    .seg{display:inline-flex;background:var(--bg3);border-radius:7px;padding:2px;}

    /* Pie legend row */
    .pie-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;}
    .pie-sw{width:10px;height:10px;border-radius:2px;flex:0 0 auto;}
    /* Custom tooltip — data-tip attribute */
    [data-tip]{position:relative;}

      box-shadow:0 6px 18px rgba(0,0,0,0.45);border:0.5px solid var(--border2);

    @media (max-width:640px){

  </style>

<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:80vh;gap:10px;color:#888;font-size:13px;"><div class="spin"></div>Yükleniyor...</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script type="text/babel">
// ── CONFIG ──────────────────────────────────────────────────────
const SUPA_URL  = "https://jfetubcilmuthpddkodg.supabase.co";
const SUPA_ANON = "sb_publishable_fB2va7QAJaGjwdn0ULNr9g_SbO2fCPy";
// Debug logging — production'da false. Console'a edge function hatalarını
// loglamak istersen true yap.
const DEBUG = false;

const CFG = {
  RATE_LIMIT_MS:    7500,   // fiyat çekme arası bekleme (edge function rate limit)
  DUST_THRESHOLD:   0.0001, // pozisyon sayılacak minimum shares
  CSV_BATCH_SIZE:   50,     // CSV import'ta supabase insert batch
  FLASH_MS:         3500,   // flash mesaj görünüm süresi
  CSV_PROGRESS_MS:  5000,   // CSV bitişi sonrası progress reset
};
// ────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPA_URL, SUPA_ANON, {
  auth:{persistSession:true,autoRefreshToken:true}
});

const {useState,useEffect,useRef} = React;

const TL = {US_STOCK:"Hisse",FUND:"ETF/Fon",CRYPTO:"Kripto",BIST:"BIST",GOLD:"Altın",FX:"Döviz"};
// Pie chart slice + legend renkleri. Sabit — dashboard yeniden açıldığında değişmez.
const TYPE_COLORS = {
  US_STOCK: "#30d158",  // yeşil (iOS system green)
  FUND:     "#0a84ff",  // mavi (iOS system blue)
  CRYPTO:   "#ff9f0a",  // turuncu
  BIST:     "#bf5af2",  // mor
  GOLD:     "#ffd60a",  // sarı
  FX:       "#8e8e93",  // gri
};
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
const fmt  = (n,d=2)=>n==null?"—":n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD = n=>n==null?"—":(n>=0?"+$":"-$")+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = n=>n==null?"—":(n>=0?"+":"")+n.toFixed(1)+"%";
const pc   = n=>n==null?"":n>=0?" ok":" err";
const today= ()=>new Date().toISOString().split("T")[0];
const dago = n=>new Date(Date.now()-n*86400000).toISOString().split("T")[0];
// ISO date "YYYY-MM-DD" → display "DD/MM/YYYY". null/empty/invalid → orijinal döner.
const fmtDateTR = (s)=>{
  if(!s||typeof s!=="string")return s||"";
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : s;
};
// Adet formatı — tam sayıyı integer, kesirli olanı trailing-sıfırsız ondalıklı.
// 8 → "8", 255.4200 → "255.42", 1.234567 → "1.2346" (4 haneye yuvarla)
const fmtShares = (n, maxDec=4)=>{
  if(n==null||isNaN(+n))return "—";
  const num=+n;
  if(num%1===0)return String(num);
  return String(+num.toFixed(maxDec));
};
// "DD/MM/YYYY" → "YYYY-MM-DD"; geçersizse null
const parseTRDate = (s)=>{
  if(!s||typeof s!=="string")return null;
  const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(!m)return null;
  const dd=+m[1], mm=+m[2], yy=+m[3];
  if(mm<1||mm>12||dd<1||dd>31)return null;
  return `${yy}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
};

const edgeCall = (fn, body) => fetch(`${SUPA_URL}/functions/v1/${fn}`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${SUPA_ANON}`
  },
  body: JSON.stringify(body)
});

// ── Return metrics: Total Return & XIRR ──────────────────────────
// XIRR = düzensiz aralıklı cash flow'ların yıllık getirisi (Excel XIRR).
// cashflows: [{date: Date, amount: number}] — negatif=yatırım, pozitif=geri dönüş.
const yearsBetween = (d1, d0) => (d1.getTime() - d0.getTime()) / (365.25 * 86400000);
const xnpv = (rate, cfs) => cfs.reduce((a, cf) =>
  a + cf.amount / Math.pow(1 + rate, yearsBetween(cf.date, cfs[0].date)), 0);
const xirr = (cfs) => {
  if (!cfs || cfs.length < 2) return null;
  const sorted = [...cfs].sort((a, b) => a.date - b.date);
  // En az bir negatif ve bir pozitif cash flow olmalı — yoksa IRR tanımsız
  const hasNeg = sorted.some(c => c.amount < 0);
  const hasPos = sorted.some(c => c.amount > 0);
  if (!hasNeg || !hasPos) return null;
  let rate = 0.1;
  for (let i = 0; i < 100; i++) {
    const n = xnpv(rate, sorted);
    if (Math.abs(n) < 1e-6) return rate;
    const deriv = sorted.reduce((a, cf) => {
      const t = yearsBetween(cf.date, sorted[0].date);
      return a - t * cf.amount / Math.pow(1 + rate, t + 1);
    }, 0);
    if (Math.abs(deriv) < 1e-10) return null;
    const next = rate - n / deriv;
    if (!isFinite(next)) return null;
    if (Math.abs(next - rate) < 1e-7) return next;
    rate = next;
  }
  return null; // yakınsamadı
};

// Transaction listesi + bugünkü MV → cash flow serisi (XIRR/TR için).
// BUY: -(total + commission), SELL: (total - commission), bugün: +MV.
const buildCashflows = (txs, todayMV) => {
  const cfs = [];
  for (const t of txs) {
    const c = +t.commission || 0;
    const total = +t.total || 0;
    if (t.way === "BUY") cfs.push({ date: new Date(t.date), amount: -(total + c) });
    else if (t.way === "SELL") cfs.push({ date: new Date(t.date), amount: total - c });
  }
  if (todayMV > 0) cfs.push({ date: new Date(), amount: todayMV });
  return cfs;
};

// ── Position rebuild (shared by HistoryTab + CSV import) ─────────
// SELL pozisyonda yoksa / shares yetmezse güvenli davran:
// negatif shares/cost oluşturmaz, fazla satış yok sayılır.
// Stock split'ler: bir işlemin tarihinden SONRA gelen her split'in
// ratio'su birikimli olarak uygulanır (shares × factor). Toplam cost
// aynı kalır, shares artar → avg_cost otomatik düşer.
const rebuildPositions = async (userId) => {
  const [txRes,splitRes] = await Promise.all([
    sb.from("transactions").select("*").eq("user_id",userId).order("date"),
    sb.from("splits").select("*").eq("user_id",userId)
  ]);
  const all = txRes.data || [];
  const splits = splitRes.data || [];
  const splitsByT = {};
  splits.forEach(s => { (splitsByT[s.ticker] = splitsByT[s.ticker] || []).push(s); });
  const factorFor = (ticker, date) => {
    const arr = splitsByT[ticker] || [];
    return arr.filter(s => s.split_date > date).reduce((a,s) => a * +s.ratio, 1);
  };

  const pm = {};
  for (const t of all) {
    if (!pm[t.ticker]) pm[t.ticker] = {ticker:t.ticker,name:t.name,type:t.asset_type,shares:0,cost:0,currency:t.currency,broker:t.broker};
    const p = pm[t.ticker];
    const f = factorFor(t.ticker, t.date);
    const adjShares = +t.shares * f;
    if (t.way === "BUY") {
      p.cost += +t.shares * +t.price;   // total unchanged by split
      p.shares += adjShares;
    } else if (t.way === "SELL" && p.shares > 0) {
      const avg = p.cost / p.shares;
      const qty = Math.min(adjShares, p.shares);
      p.cost = Math.max(0, p.cost - avg * qty);
      p.shares -= qty;
    }
  }
  await sb.from("positions").delete().eq("user_id",userId);
  const np = Object.values(pm).filter(p => p.shares > CFG.DUST_THRESHOLD).map(p => ({
    user_id: userId, ticker: p.ticker, name: p.name, type: p.type,
    shares: +p.shares.toFixed(6), avg_cost: +(p.cost/p.shares).toFixed(6),
    currency: p.currency, broker: p.broker, updated_at: new Date().toISOString()
  }));
  if (np.length) await sb.from("positions").insert(np);
  return np.length;
};

// ── Login ────────────────────────────────────────────────────────
function Login(){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [isReg,setIsReg]=useState(false);
  const [loading,setLoading]=useState(false);
  const [errMsg,setErrMsg]=useState("");
  const [okMsg,setOkMsg]=useState("");

  const submit=async()=>{
    if(!email||!pw)return;
    setLoading(true);setErrMsg("");setOkMsg("");
    const{error}=isReg
      ?await sb.auth.signUp({email,password:pw})
      :await sb.auth.signInWithPassword({email,password:pw});
    if(error)setErrMsg(error.message);
    else if(isReg)setOkMsg("Hesap oluşturuldu!");
    setLoading(false);
  };

  return(
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">IL</div>
        <div className="login-title">Investment Ledger</div>
        <div className="login-sub">Kişisel yatırım takibi</div>
        <div className="login-field">
          <label>E-posta</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ornek@mail.com" onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        <div className="login-field">
          <label>Şifre</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        {errMsg&&<div style={{fontSize:12,color:"var(--err)",marginTop:8}}>{errMsg}</div>}

            {loading?<div className="spin" style={{width:14,height:14,margin:"0 auto"}}></div>:(isReg?"Kayıt Ol":"Giriş Yap")}

// ── SparkChart — küçük SVG portföy değer grafiği ─────────────────
// 7 nokta: 1Y / 6A / 3A / 1A / 1H / 1G / Bugün. "Bugünkü pozisyonların
// geçmiş fiyatla değeri" — gerçek tarihi portföy değeri değildir.
function SparkChart({data}){
  if(!data||data.length<2)return<div className="dim" style={{fontSize:11,padding:"14px 0",textAlign:"center"}}>Grafik için yeterli veri yok</div>;
  const W=400,H=70,pad=6;
  const vals=data.map(d=>d.value);
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const sx=i=>pad+(W-2*pad)*(i/(data.length-1));
  const sy=v=>pad+(H-2*pad)*(1-(v-min)/rng);
  const pts=data.map((d,i)=>`${sx(i).toFixed(1)},${sy(d.value).toFixed(1)}`).join(" ");
  const up=data[data.length-1].value>=data[0].value;
  const col=up?"var(--ok)":"var(--err)";
  const areaPts=`${pad},${H-pad} ${pts} ${W-pad},${H-pad}`;
  return(
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}} preserveAspectRatio="none">
        <polygon points={areaPts} fill={col} opacity="0.08"/>
        <polyline points={pts} fill="none" stroke={col} strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
        {data.map((d,i)=>(<circle key={i} cx={sx(i)} cy={sy(d.value)} r="2.2" fill={col}/>))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text2)",marginTop:6,padding:"0 4px"}}>
        {data.map((d,i)=>(<span key={i} style={{flex:1,textAlign:i===0?"left":i===data.length-1?"right":"center"}}>{d.lbl}</span>))}
      </div>
    </div>
  );
}

// Tek ticker için: Manuel form veya AI ile metin parse.
function AddTxInline({ticker,user,pos,loadData,flash_,onClose}){
  const [mode,setMode]=useState("manuel");
  const E={date:today(),way:"BUY",shares:"",price:"",broker:"",commission:""};
  const [form,setForm]=useState(E);
  const [saving,setSaving]=useState(false);
  const [aiText,setAiText]=useState("");
  const [aiParsing,setAiParsing]=useState(false);
  const [aiParsed,setAiParsed]=useState(null);
  const [aiErr,setAiErr]=useState("");

  const tkPos=pos.find(x=>x.ticker===ticker);

  const saveManual=async()=>{
    if(!form.shares||!form.price){flash_("Adet ve fiyat zorunlu","err");return;}
    setSaving(true);
    const sh=+form.shares,pr=+form.price;
    const{error}=await sb.from("transactions").insert({
      user_id:user.id,date:form.date,ticker,
      name:tkPos?.name||ticker,
      asset_type:tkPos?.type||"US_STOCK",
      way:form.way,shares:sh,price:pr,
      currency:tkPos?.currency||"USD",
      total:+(sh*pr).toFixed(4),
      broker:form.broker||"",
      commission:+(form.commission||0),
      exchange:"",notes:"Detay sayfasından"
    });
    setSaving(false);
    if(error){flash_(error.message,"err");return;}
    await rebuildPositions(user.id);await loadData();
    flash_(`${ticker} ${form.way==="BUY"?"alış":"satış"} eklendi ✓`);
    onClose();
  };

  const parseAI=async()=>{
    if(!aiText.trim())return;
    setAiParsing(true);setAiErr("");setAiParsed(null);
    try{
      // Ticker'ı prompt'a göm — AI doğru ticker bulsun
      const r=await edgeCall("parse-transaction",{text:`Ticker: ${ticker}. ${aiText}`});
      const d=await r.json();
      if(!r.ok||d.error)throw new Error(d.message||d.error||`HTTP ${r.status}`);
      d.ticker=ticker; // güvenlik: ticker'ı override et
      if(!d.name)d.name=tkPos?.name||ticker;
      setAiParsed(d);
    }catch(e){setAiErr("Hata: "+e.message);}
    setAiParsing(false);
  };

  const saveAI=async()=>{
    if(!aiParsed)return;
    const p=aiParsed;
    const{error}=await sb.from("transactions").insert({
      user_id:user.id,date:p.date,ticker,
      name:p.name||tkPos?.name||ticker,
      asset_type:p.asset_type||tkPos?.type||"US_STOCK",
      way:p.way,shares:+p.shares,price:+p.price,
      currency:p.currency||tkPos?.currency||"USD",
      total:+((+p.shares)*(+p.price)).toFixed(4),
      broker:p.broker||"",commission:+(p.commission||0),
      exchange:p.exchange||"",notes:p.notes||""
    });
    if(error){flash_(error.message,"err");return;}
    await rebuildPositions(user.id);await loadData();
    flash_("İşlem eklendi ✓");
    onClose();
  };

  return(
    <div className="cbox" style={{marginTop:10,marginBottom:14}}>
      <div className="seg" style={{marginBottom:12}}>
        <button className={mode==="manuel"?"on":""} onClick={()=>setMode("manuel")}>📌 Manuel</button>
        <button className={mode==="ai"?"on":""} onClick={()=>setMode("ai")}>📝 AI ile</button>
      </div>

      {mode==="manuel"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
            <div><div className="kk" style={{marginBottom:3}}>Tarih</div>
              <input className="finp sm" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} max={today()}/></div>
            <div><div className="kk" style={{marginBottom:3}}>İşlem</div>
              <select className="finp sm" value={form.way} onChange={e=>setForm(f=>({...f,way:e.target.value}))}>
                <option value="BUY">Alış</option><option value="SELL">Satış</option>
              </select></div>
            <div><div className="kk" style={{marginBottom:3}}>Broker</div>
              <input className="finp sm" value={form.broker} onChange={e=>setForm(f=>({...f,broker:e.target.value}))} placeholder="Akbank..."/></div>
            <div><div className="kk" style={{marginBottom:3}}>Adet *</div>
              <input className="finp sm" type="number" value={form.shares} onChange={e=>setForm(f=>({...f,shares:e.target.value}))} placeholder="0"/></div>
            <div><div className="kk" style={{marginBottom:3}}>Fiyat *</div>
              <input className="finp sm" type="number" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="0.00"/></div>
            <div><div className="kk" style={{marginBottom:3}}>Komisyon</div>
              <input className="finp sm" type="number" value={form.commission} onChange={e=>setForm(f=>({...f,commission:e.target.value}))} placeholder="0"/></div>
          </div>
          {form.shares&&form.price&&(
            <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Toplam: ${fmt((+form.shares)*(+form.price),2)}</div>
          )}
          <div className="brow">
            <button className="pri btn-md" onClick={saveManual} disabled={saving||!form.shares||!form.price}>{saving?"...":"Kaydet"}</button>
            <button className="btn-md" onClick={onClose} disabled={saving}>İptal</button>
          </div>
        </div>
      )}

      {mode==="ai"&&(
        <div>
          <textarea value={aiText} onChange={e=>setAiText(e.target.value)} rows={3}
            placeholder={`"5 adet $200 bugün Akbank komisyon $2"\n"3 adet $150 dün satış QNB"`}
            style={{lineHeight:1.5,marginBottom:8,resize:"vertical"}}/>
          <div className="brow" style={{marginBottom:aiParsed||aiErr?10:0}}>
            <button className="pri btn-md" onClick={parseAI} disabled={aiParsing||!aiText.trim()}>{aiParsing?"Parse...":"AI Parse"}</button>
            <button className="btn-md" onClick={onClose} disabled={aiParsing}>İptal</button>
          </div>
          {aiErr&&<div className="flash err" style={{fontSize:12}}>{aiErr}</div>}
          <ConfirmBox data={aiParsed} onSave={saveAI} onCancel={()=>setAiParsed(null)}/>
        </div>
      )}
    </div>
  );
}

};

const fundScore = (key, val) => {
  if (val == null || !isFinite(val)) return null;
  const t = FUND_THRESHOLDS[key];
  if (!t) return null;
  // netDebtToFcf negatif = net cash → koşulsuz iyi
  if (key === "netDebtToFcf" && val < 0) return "good";
  if (t.dir === "high") {
    if (val >= t.good) return "good";
    if (val >= t.ok)   return "neutral";
    return "bad";
  } else {
    if (val <= t.good) return "good";
    if (val <= t.ok)   return "neutral";
    return "bad";
  }
};

  roe:                "Net kâr / Özkaynak (TTM). 15%+ güçlü.",
  roa:                "Net kâr / Toplam varlık (TTM). 7%+ verimli.",
  roic:               "Yatırılan sermayenin getirisi. 15%+ ekonomik moat işareti.",
  pe:                 "Fiyat / Kâr (TTM). ≤15 cazip değerleme (sektöre göre).",
  ps:                 "Fiyat / Satış (TTM). ≤2 cazip (sektöre göre).",
  capexToNetIncome:   "CapEx / Net kâr. ≤25% düşük yeniden-yatırım yükü.",
  capexToSales:       "CapEx / Gelir. ≤5% düşük capital intensity.",
  capexToOcf:         "CapEx / Operasyonel nakit. ≤30% sağlıklı reinvestment.",
  ebitToInterest:     "Faiz Karşılama (EBIT/Faiz). ≥10× rahat borç servisi.",
  netDebtToFcf:       "(Borç − Nakit) / FCF. ≤2 yıl borçtan rahat çıkar; negatifse net cash.",
};

// homepage_url'den domain çıkar — Clearbit logo için.
const extractDomain = (url) => {
  if (!url) return null;
  try {
    return new URL(url.startsWith("http") ? url : "https://" + url).hostname.replace(/^www\./, "");
  } catch (e) { return null; }
};

// Güvenli href — sadece http/https protokolüne izin ver. javascript:/data: gibi
// URL'leri (provider compromise edilirse) engelle. Geçersizse "#" döner.
const safeUrl = (url) => {
  if (!url || typeof url !== "string") return "#";
  try {
    const u = new URL(url.startsWith("http") ? url : "https://" + url);
    return (u.protocol === "http:" || u.protocol === "https:") ? u.href : "#";
  } catch (e) { return "#"; }
};

// Sayı formatı: 4014264110200 → "4.01T", 166000 → "166K"
const fmtCompact = (n) => {
  if (n == null) return "—";
  const abs = Math.abs(n);
  if (abs >= 1e12) return (n/1e12).toFixed(2)+"T";
  if (abs >= 1e9)  return (n/1e9).toFixed(2)+"B";
  if (abs >= 1e6)  return (n/1e6).toFixed(1)+"M";
  if (abs >= 1e3)  return (n/1e3).toFixed(1)+"K";
  return ""+n;
};

function TickerDetailTab({ticker,pos,txs,prc,hist,user,confirm_,flash_,loadData,closeDetail,hideAmts,mask}){
  const [meta,setMeta]=useState(()=>metaCacheGet(ticker));
  const [metaLoading,setMetaLoading]=useState(false);
  const [metaErr,setMetaErr]=useState("");
  const [fund,setFund]=useState(()=>fundCacheGet(ticker));
  const [fundLoading,setFundLoading]=useState(false);
  const [fundErr,setFundErr]=useState("");
  const [showFullDesc,setShowFullDesc]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [expandedTx,setExpandedTx]=useState(null);   // tıklanan tx.id
  const [editTxId,setEditTxId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [savingTx,setSavingTx]=useState(false);

  const startEditTx=t=>{
    setEditTxId(t.id);
    setEditForm({date:t.date,way:t.way,shares:t.shares,price:t.price,currency:t.currency||"USD",broker:t.broker||"",commission:t.commission||0,notes:t.notes||""});
  };
  const cancelEditTx=()=>{setEditTxId(null);setEditForm({});};
  const saveEditTx=async(t)=>{
    setSavingTx(true);
    const{error}=await sb.from("transactions").update({
      date:editForm.date,way:editForm.way,shares:+editForm.shares,price:+editForm.price,
      currency:editForm.currency,total:+((+editForm.shares)*(+editForm.price)).toFixed(4),
      broker:editForm.broker,commission:+(editForm.commission||0),notes:editForm.notes||""
    }).eq("id",t.id).eq("user_id",user.id);
    if(error){flash_(error.message,"err");}
    else{await rebuildPositions(user.id);await loadData();flash_("Güncellendi ✓");setEditTxId(null);setEditForm({});}
    setSavingTx(false);
  };
  const delTxRow=async(t)=>{
    if(!(await confirm_(`${fmtDateTR(t.date)} tarihli ${t.way==="BUY"?"alış":"satış"} silinsin mi?`,{okLbl:"Sil"})))return;
    await sb.from("transactions").delete().eq("id",t.id).eq("user_id",user.id);
    await rebuildPositions(user.id);await loadData();flash_("Silindi ✓");
    setExpandedTx(null);
  };

  const p=pos.find(x=>x.ticker===ticker);
  const tickerTxs=txs.filter(t=>t.ticker===ticker);
  const price=prc[ticker];
  const currentCost=p?p.shares*p.avgCost:0;
  const mv=p&&price!=null?p.shares*price:null;
  const dayChange=hist[ticker]?.d1; // % değişim son 1G

  // Realize / Unrealize / Toplam — bu ticker için tüm zaman
  const totalInvested=tickerTxs.filter(t=>t.way==="BUY").reduce((a,t)=>a+(+t.total+(+t.commission||0)),0);
  const totalReceived=tickerTxs.filter(t=>t.way==="SELL").reduce((a,t)=>a+(+t.total-(+t.commission||0)),0);
  const totalCommission=tickerTxs.reduce((a,t)=>a+(+t.commission||0),0);
  const realized=totalReceived+currentCost-totalInvested;
  const unrealized=mv!=null?mv-currentCost:null;
  const totalPL=unrealized!=null?realized+unrealized:null;
  const totalPLPct=totalInvested>0&&totalPL!=null?(totalPL/totalInvested)*100:null;

  // Meta fetch — cache'te yoksa veya zorla yenile
  const fetchMeta=async(force)=>{
    if(!force){
      const cached=metaCacheGet(ticker);
      if(cached){setMeta(cached);return;}
    }
    setMetaLoading(true);setMetaErr("");
    try{
      const r=await edgeCall("fetch-prices",{ticker,mode:"meta"});
      const d=await r.json();
      if(d.result&&!d.result.error){
        setMeta(d.result);
        metaCacheSet(ticker,d.result);
      } else {
        setMetaErr(d.result?.error||d.error||"Bilinmeyen hata");
      }
    }catch(e){setMetaErr(e.message);}
    setMetaLoading(false);
  };
  useEffect(()=>{if(!meta)fetchMeta(false);},[ticker]);

  // Fundamental fetch — sadece US_STOCK için anlamlı (FMP US-only).
  const fetchFund=async(force)=>{
    if(!force){
      const cached=fundCacheGet(ticker);
      if(cached){setFund(cached);return;}
    }
    setFundLoading(true);setFundErr("");
    try{
      const r=await edgeCall("fetch-fundamentals",{ticker});
      let d=null;
      try{d=await r.json();}catch(_){/* non-JSON */}
      if(r.ok&&d&&d.metrics){
        setFund(d);
        fundCacheSet(ticker,d);
      } else {
        const msg=d?.error||d?.message||d?.code||`HTTP ${r.status}`;
        setFundErr(msg);
      }
    }catch(e){setFundErr(e.message);}
    setFundLoading(false);
  };
  useEffect(()=>{
    const isUsStock=pos.find(x=>x.ticker===ticker)?.type==="US_STOCK";
    if(isUsStock&&!fund)fetchFund(false);
  },[ticker]);

    return(
      <div>
        <button className="btn-sm" onClick={closeDetail} style={{marginBottom:14}}>← Dashboard'a dön</button>
        <div className="empty-card">
          <div className="ic">❓</div>
          <div className="ttl">{ticker} pozisyonunda yok</div>
          <div className="sub">Bu ticker mevcut pozisyonlarınızda bulunmuyor.</div>
        </div>
      </div>
    );

  const exchangeShort={XNAS:"NASDAQ",XNYS:"NYSE",ARCX:"NYSE Arca",BATS:"CBOE",IEXG:"IEX"}[meta?.primary_exchange]||meta?.primary_exchange;

  return(

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>

        <div style={{flex:1}}></div>
        <button className="btn-sm" onClick={()=>fetchMeta(true)} disabled={metaLoading}>{metaLoading?"...":"↻ Meta"}</button>
      </div>

      {/* Ticker + price */}
      <div className="card" style={{marginBottom:14,padding:"16px 18px"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}}>

              {p.type==="FUND"&&<span className="badge etf">ETF</span>}
              {p.type==="CRYPTO"&&<span className="badge cry">₿</span>}
            </div>
            <div className="dim" style={{fontSize:13,marginTop:2}}>
              {meta?.name||p.name||"—"}
              {exchangeShort&&<span> · {exchangeShort}</span>}
              {meta?.type&&<span> · {meta.type}</span>}
            </div>
          </div>
          {!hideAmts&&price!=null&&(
            <div style={{textAlign:"right"}}>
              <div className="mono" style={{fontSize:18,fontWeight:600}}>${fmt(price)}</div>
              {dayChange!=null&&<div className={"mono"+pc(dayChange)} style={{fontSize:12}}>{fmtP(dayChange)} bugün</div>}
            </div>
          )}
        </div>
      </div>

      {/* Pozisyon özeti — 4 ana kart */}

          <div className="mono" style={{fontSize:16,fontWeight:600}}>{fmtShares(p.shares)}</div>
        </div>
        <div className="card" data-tip="Mevcut pozisyonun toplam maliyeti (Adet × Ort. Maliyet). Daha önce sattıklarının maliyeti dahil değil." style={{cursor:"help"}}>

          <div className="mono" style={{fontSize:16,fontWeight:600}}>{mask("$"+fmt(currentCost,0))}</div>
        </div>
        <div className="card" data-tip="Bugünkü güncel fiyatla pozisyonun piyasa değeri" style={{cursor:"help"}}>
          <div className="lbl">Piyasa Değeri</div>

        </div>
        <div className="card" data-tip="Toplam P&L = Realized + Unrealized = MV + Toplam Satış − Toplam Alış (komisyonlar dahil)" style={{cursor:"help"}}>
          <div className="lbl">Toplam P&L</div>
          <div className={"mono"+(totalPL!=null?pc(totalPL):"")} style={{fontSize:16,fontWeight:600}}>{totalPL!=null?mask(fmtD(totalPL)):"—"}</div>
          {totalPLPct!=null&&<div className={"mono"+pc(totalPLPct)} style={{fontSize:11,marginTop:2}}>{fmtP(totalPLPct)}</div>}
        </div>
      </div>

      {/* Detay satırı — Ort. Maliyet · Realized · Unrealized · Komisyon */}
      <div style={{display:"flex",flexWrap:"wrap",gap:14,padding:"8px 14px",marginBottom:14,fontSize:11,color:"var(--text2)",background:"var(--bg2)",borderRadius:8,border:"0.5px solid var(--border)"}}>

        </span>

            const rows=[

            const goodN=allScores.filter(s=>s==="good").length;

              <div>
                <div style={{fontSize:11,color:"var(--text2)",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>

                      <div><div className="kk" style={{marginBottom:3}}>Fiyat</div><input className="finp sm" type="number" value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Komisyon</div><input className="finp sm" type="number" value={editForm.commission} onChange={e=>setEditForm(f=>({...f,commission:e.target.value}))}/></div>
                      <div style={{gridColumn:"span 3"}}><div className="kk" style={{marginBottom:3}}>Broker</div><input className="finp sm" value={editForm.broker} onChange={e=>setEditForm(f=>({...f,broker:e.target.value}))}/></div>
                    </div>
                    <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Toplam: {editForm.currency==="TRY"?"₺":"$"}{fmt((+editForm.shares)*(+editForm.price),2)}</div>
                    <div className="brow">
                      <button className="pri btn-md" onClick={()=>saveEditTx(t)} disabled={savingTx}>{savingTx?"...":"Kaydet"}</button>
                      <button className="btn-md" onClick={cancelEditTx} disabled={savingTx}>İptal</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── AccountSection — Ayarlar içinde hesap yönetimi ──────────────
function AccountSection({user,profile,flash_,confirm_,onSaved}){
  const [editing,setEditing]=useState(null); // null | "pw" | "email" | "uname"
  const [pw1,setPw1]=useState("");
  const [pw2,setPw2]=useState("");
  const [email,setEmail]=useState("");
  const [uname,setUname]=useState("");
  const [busy,setBusy]=useState(false);

  const cancel=()=>{setEditing(null);setPw1("");setPw2("");setEmail("");setUname("");};

  const savePw=async()=>{
    if(pw1.length<6){flash_("Şifre en az 6 karakter olmalı","err");return;}
    if(pw1!==pw2){flash_("Şifreler eşleşmiyor","err");return;}
    setBusy(true);
    const{error}=await sb.auth.updateUser({password:pw1});
    setBusy(false);
    if(error){flash_(error.message,"err");return;}
    flash_("Şifre güncellendi ✓");cancel();
  };

  const saveEmail=async()=>{
    if(!email||!email.includes("@")){flash_("Geçerli bir e-posta gir","err");return;}
    if(!(await confirm_(`${email} adresine onay maili gönderilecek. Onay verene kadar eski e-posta geçerli kalır.`,{okLbl:"Devam"})))return;
    setBusy(true);
    const{error}=await sb.auth.updateUser({email});
    setBusy(false);
    if(error){flash_(error.message,"err");return;}
    flash_("Onay maili gönderildi — yeni e-postanı kontrol et");cancel();
  };

  const saveUname=async()=>{
    if(!/^[a-z0-9_]{3,20}$/.test(uname)){
      flash_("3-20 karakter, küçük harf / rakam / alt tire","err");return;
    }
    setBusy(true);
    const{error}=await sb.from("profiles").upsert({
      user_id:user.id,username:uname,updated_at:new Date().toISOString()
    },{onConflict:"user_id"});
    setBusy(false);
    if(error){
      if(error.code==="23505"||(error.message||"").includes("duplicate")){
        flash_("Bu kullanıcı adı zaten alınmış","err");
      } else {
        flash_(error.message,"err");
      }
      return;
    }
    flash_("Kullanıcı adı kaydedildi ✓");cancel();
    if(onSaved)onSaved();
  };

  return(
    <div className="sg">
      <label>Hesap</label>
      {/* Kullanıcı adı satırı */}
      <div className="row" style={{borderBottom:"none",padding:"5px 0"}}>
        <div>
          <div style={{fontSize:11,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Kullanıcı Adı</div>
          <div className="mono" style={{fontSize:13}}>
            {profile?.username?<span>@{profile.username}</span>:<span className="dim">Henüz yok</span>}
          </div>
        </div>
        {editing!=="uname"&&<button className="btn-sm" onClick={()=>{setEditing("uname");setUname(profile?.username||"");}}>{profile?.username?"Değiştir":"Oluştur"}</button>}
      </div>
      {editing==="uname"&&(
        <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginTop:8}}>
          <div className="kk" style={{marginBottom:4}}>Kullanıcı adı</div>
          <input className="finp sm" value={uname} onChange={e=>setUname(e.target.value.toLowerCase())} placeholder="ornek_user" style={{marginBottom:4}}/>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:8}}>3-20 karakter · küçük harf, rakam, alt tire</div>
          <div className="brow">
            <button className="pri btn-md" onClick={saveUname} disabled={busy||!uname}>{busy?"Kaydediliyor...":"Kaydet"}</button>
            <button className="btn-md" onClick={cancel} disabled={busy}>İptal</button>
          </div>
        </div>
      )}
      {/* E-posta satırı */}
      <div className="row" style={{borderBottom:"none",padding:"5px 0"}}>
        <div>
          <div style={{fontSize:11,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>E-posta</div>
          <div className="mono" style={{fontSize:13}}>{user.email}</div>
        </div>
        {editing!=="email"&&<button className="btn-sm" onClick={()=>{setEditing("email");setEmail("");}}>Değiştir</button>}
      </div>
      {editing==="email"&&(
        <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginTop:8}}>
          <div className="kk" style={{marginBottom:4}}>Yeni e-posta</div>
          <input className="finp sm" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="yeni@ornek.com" style={{marginBottom:8}}/>
          <div className="brow">
            <button className="pri btn-md" onClick={saveEmail} disabled={busy||!email}>{busy?"Kaydediliyor...":"Onay Gönder"}</button>
            <button className="btn-md" onClick={cancel} disabled={busy}>İptal</button>
          </div>
        </div>
      )}
      {/* Şifre satırı */}
      <div className="row" style={{borderBottom:"none",padding:"5px 0"}}>
        <div>
          <div style={{fontSize:11,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Şifre</div>
          <div className="mono" style={{fontSize:13,color:"var(--text2)"}}>••••••••</div>
        </div>
        {editing!=="pw"&&<button className="btn-sm" onClick={()=>{setEditing("pw");setPw1("");setPw2("");}}>Değiştir</button>}
      </div>
      {editing==="pw"&&(
        <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginTop:8}}>
          <div className="kk" style={{marginBottom:4}}>Yeni şifre</div>
          <input className="finp sm" type="password" value={pw1} onChange={e=>setPw1(e.target.value)} placeholder="En az 6 karakter" style={{marginBottom:8}}/>
          <div className="kk" style={{marginBottom:4}}>Yeni şifre (tekrar)</div>
          <input className="finp sm" type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Tekrar yaz" style={{marginBottom:8}}/>
          <div className="brow">
            <button className="pri btn-md" onClick={savePw} disabled={busy||!pw1||!pw2}>{busy?"Kaydediliyor...":"Şifreyi Güncelle"}</button>
            <button className="btn-md" onClick={cancel} disabled={busy}>İptal</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── HistoryTab ───────────────────────────────────────────────────
function HistoryTab({txs,user,loadData,flash_,confirm_,mask,hideAmts,setTab,initialSearch,onConsume,splits}){
  const [open,setOpen]=useState(()=>initialSearch?{[initialSearch.toUpperCase()]:true}:{});
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [search,setSearch]=useState(initialSearch||"");
  const [wayF,setWayF]=useState("all");
  const [dateF,setDateF]=useState("all");
  useEffect(()=>{if(initialSearch&&onConsume)onConsume();},[]);

  const filtered=txs.filter(t=>{
    if(search){
      const q=search.toLowerCase();
      if(!t.ticker.toLowerCase().includes(q)&&!(t.name||"").toLowerCase().includes(q))return false;
    }
    if(wayF!=="all"&&t.way!==wayF)return false;
    if(dateF!=="all"){
      const days={d30:30,d90:90,y1:365}[dateF];
      if(days){const cutoff=new Date(Date.now()-days*86400000).toISOString().split("T")[0];if(t.date<cutoff)return false;}
    }
    return true;
  });

  const grouped={};
  filtered.forEach(t=>{if(!grouped[t.ticker])grouped[t.ticker]=[];grouped[t.ticker].push(t);});
  const tickers=Object.keys(grouped).sort();
  const isFiltered=search||wayF!=="all"||dateF!=="all";
  const clearFilters=()=>{setSearch("");setWayF("all");setDateF("all");};

  const startEdit=t=>{
    setEditId(t.id);
    setEditForm({date:t.date,way:t.way,shares:t.shares,price:t.price,currency:t.currency||"USD",broker:t.broker||"",commission:t.commission||0,notes:t.notes||""});
  };

  const saveEdit=async(t)=>{
    setSaving(true);
    const{error}=await sb.from("transactions").update({
      date:editForm.date,way:editForm.way,shares:+editForm.shares,price:+editForm.price,
      currency:editForm.currency,total:+((+editForm.shares)*(+editForm.price)).toFixed(4),
      broker:editForm.broker,commission:+(editForm.commission||0),notes:editForm.notes||""
    }).eq("id",t.id).eq("user_id",user.id);
    if(error){flash_(error.message,"err");}
    else{await rebuildPositions(user.id);await loadData();flash_("Güncellendi ✓");setEditId(null);}
    setSaving(false);
  };

  const delTx=async(t)=>{
    if(!(await confirm_(`${t.ticker} — ${fmtDateTR(t.date)} işlemi silinsin mi?`,{okLbl:"Sil"})))return;
    await sb.from("transactions").delete().eq("id",t.id).eq("user_id",user.id);
    await rebuildPositions(user.id);await loadData();flash_("Silindi ✓");
  };

  if(txs.length===0)return(
    <div className="empty-card">
      <div className="ic">📝</div>
      <div className="ttl">Henüz işlem yok</div>
      <div className="sub">Metin, görüntü, CSV veya manuel giriş — ilk işlemini ekle.</div>
      <button className="pri" onClick={()=>setTab&&setTab("add")}>+ İlk işlemi ekle</button>
    </div>
  );

  return(
    <div>
      {/* Filter toolbar */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <input className="finp sm" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Ticker veya şirket..." style={{flex:"1 1 160px",minWidth:140}}/>
        <select className="finp sm" value={wayF} onChange={e=>setWayF(e.target.value)} style={{flex:"0 0 auto",width:90}}>
          <option value="all">Tümü</option>
          <option value="BUY">Alış</option>
          <option value="SELL">Satış</option>
        </select>
        <select className="finp sm" value={dateF} onChange={e=>setDateF(e.target.value)} style={{flex:"0 0 auto",width:120}}>
          <option value="all">Tüm zamanlar</option>
          <option value="d30">Son 30 gün</option>
          <option value="d90">Son 90 gün</option>
          <option value="y1">Son 1 yıl</option>
        </select>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span className="dim" style={{fontSize:12}}>
          {isFiltered?`${filtered.length} / ${txs.length}`:filtered.length} işlem · {tickers.length} varlık
          {isFiltered&&<button className="btn-xs" style={{marginLeft:8}} onClick={clearFilters}>Temizle</button>}
        </span>
        <div className="brow">
          <button className="pri btn-sm" onClick={()=>setTab&&setTab("add")}>+ Ekle</button>
          <button className="btn-sm" onClick={()=>setOpen(Object.fromEntries(tickers.map(t=>[t,true])))}>Tümünü Aç</button>
          <button className="btn-sm" onClick={()=>setOpen({})}>Kapat</button>
        </div>
      </div>
      {filtered.length===0&&(
        <div className="empty-card" style={{padding:"28px 20px"}}>
          <div className="ic">🔍</div>
          <div className="ttl">Eşleşen işlem yok</div>
          <div className="sub">Filtreleri değiştir ya da temizle.</div>
          <button className="pri" onClick={clearFilters}>Filtreleri temizle</button>
        </div>
      )}
      {tickers.map(tk=>{
        const items=grouped[tk];
        const isOpen=!!open[tk];
        const tot=items.reduce((a,t)=>a+(t.way==="BUY"?+t.total:-+t.total),0);
        return(
          <div key={tk} style={{marginBottom:8,border:"0.5px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
            <div onClick={()=>setOpen(o=>({...o,[tk]:!o[tk]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"var(--bg2)",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{tk}</span>
                <span className="dim" style={{fontSize:11}}>{items.length} işlem</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {!hideAmts&&<span className="dim mono" style={{fontSize:11}}>{mask("$"+fmt(tot,0))}</span>}
                <span style={{color:"var(--text3)",fontSize:12}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>
            {isOpen&&items.map(t=>(
              <div key={t.id} style={{borderTop:"0.5px solid var(--border)"}}>
                {editId===t.id?(
                  <div style={{padding:"12px 14px",background:"var(--bg3)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      <div><div className="kk" style={{marginBottom:3}}>Tarih</div><input className="finp sm" type="date" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))} max={today()}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>İşlem</div>
                        <select className="finp sm" value={editForm.way} onChange={e=>setEditForm(f=>({...f,way:e.target.value}))}>
                          <option value="BUY">Alış</option><option value="SELL">Satış</option>
                        </select>
                      </div>
                      <div><div className="kk" style={{marginBottom:3}}>Para</div>
                        <select className="finp sm" value={editForm.currency} onChange={e=>setEditForm(f=>({...f,currency:e.target.value}))}>
                          <option>USD</option><option>TRY</option><option>EUR</option>
                        </select>
                      </div>
                      <div><div className="kk" style={{marginBottom:3}}>Adet</div><input className="finp sm" type="number" value={editForm.shares} onChange={e=>setEditForm(f=>({...f,shares:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Fiyat</div><input className="finp sm" type="number" value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Broker</div><input className="finp sm" value={editForm.broker} onChange={e=>setEditForm(f=>({...f,broker:e.target.value}))}/></div>
                    </div>
                    <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Toplam: {editForm.currency==="TRY"?"₺":"$"}{fmt((+editForm.shares)*(+editForm.price))}</div>
                    <div className="brow">
                      <button className="pri btn-md" onClick={()=>saveEdit(t)} disabled={saving}>{saving?"Kaydediliyor...":"Kaydet"}</button>
                      <button className="btn-md" onClick={()=>setEditId(null)}>İptal</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px"}}>
                    <div style={{display:"flex",gap:10,alignItems:"center",flex:1,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,color:"var(--text2)",fontFamily:"monospace",minWidth:80}}>{fmtDateTR(t.date)}</span>
                      <span className={t.way==="BUY"?"ok":"err"} style={{fontSize:11,minWidth:28}}>{t.way==="BUY"?"Alış":"Satış"}</span>
                      <span className="mono" style={{fontSize:12}}>{fmtShares(t.shares)} adet</span>
                      {!hideAmts&&<span className="mono dim" style={{fontSize:12}}>{mask((t.currency==="TRY"?"₺":"$")+fmt(t.price))}</span>}
                      {!hideAmts&&<span className="mono" style={{fontSize:12,fontWeight:600}}>{mask((t.currency==="TRY"?"₺":"$")+fmt(t.total,0))}</span>}
                      {t.broker&&<span className="dim" style={{fontSize:10}}>{t.broker}</span>}
                      {!hideAmts&&+t.commission>0&&<span className="dim" style={{fontSize:10}}>Kom: {mask((t.currency==="TRY"?"₺":"$")+fmt(+t.commission,2))}</span>}
                      {(()=>{
                        const af=(splits||[]).filter(s=>s.ticker===t.ticker&&s.split_date>t.date);
                        if(!af.length)return null;
                        const fac=af.reduce((a,s)=>a*+s.ratio,1);
                        const tip=`Bu işlem sonrası split: ${af.map(s=>`${s.split_date} ${s.ratio}:1`).join(" · ")}. Pozisyon hesabı ×${fac} uygulanır.`;
                        return<span className="badge split" title={tip}>⚡ ×{fac}</span>;
                      })()}
                    </div>
                    <div className="brow" style={{gap:5}}>
                      <button className="btn-xs" onClick={()=>startEdit(t)}>Düzenle</button>
                      <button className="btn-xs btn-danger-out" onClick={()=>delTx(t)}>Sil</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── ManuelPosForm ────────────────────────────────────────────────
function ManuelPosForm({session,user,pos,loadData,flash_,confirm_}){
  const E={ticker:"",name:"",type:"US_STOCK",shares:"",avgCost:"",currency:"USD",broker:"",commission:"",date:today()};
  const [form,setForm]=useState(E);
  const [curPrice,setCurPrice]=useState(null);
  const [fetchP,setFetchP]=useState(false);
  const [saving,setSaving]=useState(false);
  const [editTk,setEditTk]=useState(null);
  const set=f=>setForm(p=>({...p,...f}));

  const NAMES={SCHD:"Schwab US Dividend ETF",SPY:"SPDR S&P 500 ETF",QQQ:"Invesco QQQ Trust",MCHI:"iShares MSCI China ETF",VT:"Vanguard Total World ETF",NVDA:"NVIDIA Corp",SOFI:"SoFi Technologies",GOOGL:"Alphabet Inc",META:"Meta Platforms",KO:"Coca-Cola Co",UBER:"Uber Technologies",MNSO:"MINISO Group",AEVA:"Aeva Technologies",PYPL:"PayPal Holdings",SKLZ:"Skillz Inc",NNOX:"Nano-X Imaging",TSLA:"Tesla Inc",AAPL:"Apple Inc",MSFT:"Microsoft Corp",AMZN:"Amazon.com",BTC:"Bitcoin"};

  const fetchPrice=async(tk,date)=>{
    const upper=(tk||form.ticker).toUpperCase();
    const useDate=date||form.date||today();
    if(!upper)return;
    if(NAMES[upper])set({name:NAMES[upper]});
    setFetchP(true);setCurPrice(null);
    try{
      const r=await edgeCall("fetch-prices",{ticker:upper,mode:"price",date:useDate});
      const d=await r.json();
      if(d.result?.price){
        const p=d.result.price;
        setCurPrice(p);
        // Tarihin fiyatını otomatik maliyet olarak doldur
        set({avgCost:p.toFixed(2)});
      } else if(d.result?.error||d.error){
        DEBUG && console.warn(`[fetchPrice ${upper}]`,d.result?.error||d.error);
        flash_(`${upper}: ${d.result?.error||d.error}`,"err");
      }
    }catch(e){
      DEBUG && console.warn(`[fetchPrice ${upper}]`,e);
      flash_(`${upper} fiyatı alınamadı: ${e.message}`,"err");
    }
    setFetchP(false);
  };

  const startEdit=p=>{
    setEditTk(p.ticker);
    setForm({...E,ticker:p.ticker,name:p.name,type:p.type,shares:p.shares,avgCost:p.avgCost,currency:p.currency,broker:p.broker||""});
    fetchPrice(p.ticker);
  };

  const savePos=async()=>{
    if(!form.ticker||!form.shares||!form.avgCost)return;
    setSaving(true);
    const tk=form.ticker.toUpperCase();
    const nm=form.name||tk;
    const sh=+form.shares;
    const pr=+form.avgCost;

    // Transaction'a yaz
    const tx={
      user_id:user.id,
      date:form.date||today(),
      ticker:tk,name:nm,
      asset_type:form.type,
      way:"BUY",
      shares:sh,price:pr,
      currency:form.currency,
      total:+(sh*pr).toFixed(4),
      broker:form.broker||"",
      commission:+(form.commission||0),exchange:"",notes:"Manuel giriş"
    };
    const{error:te}=await sb.from("transactions").insert(tx);
    if(te){flash_(te.message,"err");setSaving(false);return;}

    // Pozisyonu güncelle
    const ex=pos.find(x=>x.ticker===tk);
    const ns=(ex?.shares||0)+sh;
    const na=((ex?.shares||0)*(ex?.avgCost||0)+sh*pr)/ns;
    await sb.from("positions").upsert({
      user_id:user.id,ticker:tk,name:nm,type:form.type,
      shares:+ns.toFixed(6),avg_cost:+na.toFixed(6),
      currency:form.currency,broker:form.broker||"",
      updated_at:new Date().toISOString()
    },{onConflict:"user_id,ticker"});

    await loadData();
    flash_(`${tk} işlem geçmişine ve pozisyona eklendi ✓`);
    setEditTk(null);setForm(E);setCurPrice(null);
    setSaving(false);
  };

  const delPos=async(tk)=>{
    if(!(await confirm_(`${tk} pozisyonu silinsin mi?`,{okLbl:"Sil"})))return;
    await sb.from("positions").delete().eq("user_id",user.id).eq("ticker",tk);
    await loadData();flash_(`${tk} silindi`);
  };

  return(
    <div>
      <div className="cbox" style={{marginBottom:16}}>
        <div className="lbl" style={{marginBottom:12}}>{editTk?`${editTk} — Düzenle`:"Yeni Pozisyon Ekle"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <div className="kk" style={{marginBottom:4}}>Tarih</div>
            <input className="finp" type="date" value={form.date}
              onChange={e=>{
                const newDate=e.target.value;
                set({date:newDate});
                setCurPrice(null);
                // Ticker zaten girilmişse, yeni tarihin fiyatını otomatik çek
                if(form.ticker&&newDate)fetchPrice(form.ticker,newDate);
              }}
              max={today()}/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Ticker *</div>
            <div style={{display:"flex",gap:6}}>
              <input className="finp" style={{textTransform:"uppercase"}} value={form.ticker}
                onChange={e=>{set({ticker:e.target.value.toUpperCase(),name:"",avgCost:""});setCurPrice(null);}}
                onBlur={e=>e.target.value&&fetchPrice(e.target.value)}
                placeholder="AAPL" disabled={!!editTk}/>
              <button style={{whiteSpace:"nowrap",fontSize:12,padding:"7px 10px"}}
                onClick={()=>fetchPrice()} disabled={fetchP||!form.ticker}>
                {fetchP?<div className="spin" style={{width:12,height:12}}></div>:"↻"}
              </button>
            </div>
            {curPrice&&<div style={{fontSize:11,color:"var(--ok)",marginTop:4}}>{fmtDateTR(form.date)} fiyatı: ${fmt(curPrice)}</div>}
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Şirket Adı</div>
            <input className="finp" value={form.name} onChange={e=>set({name:e.target.value})} placeholder="Apple Inc"/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Varlık Türü</div>
            <select className="finp" value={form.type} onChange={e=>set({type:e.target.value})}>
              <option value="US_STOCK">Hisse (US)</option>
              <option value="FUND">ETF / Fon</option>
              <option value="CRYPTO">Kripto</option>
              <option value="BIST">BIST</option>
              <option value="GOLD">Altın</option>
              <option value="FX">Döviz</option>
            </select>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Para Birimi</div>
            <select className="finp" value={form.currency} onChange={e=>set({currency:e.target.value})}>
              <option>USD</option><option>TRY</option><option>EUR</option>
            </select>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Adet *</div>
            <input className="finp" type="number" value={form.shares} onChange={e=>set({shares:e.target.value})} placeholder="0"/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Ort. Maliyet *</div>
            <input className="finp" type="number" value={form.avgCost} onChange={e=>set({avgCost:e.target.value})} placeholder="0.00"/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Broker</div>
            <input className="finp" value={form.broker} onChange={e=>set({broker:e.target.value})} placeholder="Akbank, Midas..."/>
          </div>
          <div>
            <div className="kk" style={{marginBottom:4}}>Komisyon</div>
            <input className="finp" type="number" value={form.commission} onChange={e=>set({commission:e.target.value})} placeholder="0.00"/>
          </div>
          <div style={{display:"flex",alignItems:"flex-end"}}>
            {form.shares&&form.avgCost?(
              <div style={{fontSize:11,color:"var(--text2)",padding:"7px 0"}}>
                Maliyet: {form.currency==="TRY"?"₺":"$"}{fmt((+form.shares)*(+form.avgCost),0)}
                {curPrice&&<><br/>Piyasa: {form.currency==="TRY"?"₺":"$"}{fmt((+form.shares)*curPrice,0)}</>}
              </div>
            ):null}
          </div>
        </div>
        <div className="brow">
          <button className="pri" onClick={savePos} disabled={saving||!form.ticker||!form.shares||!form.avgCost}>
            {saving?"Kaydediliyor...":(editTk?"Güncelle":"Pozisyon Kaydet")}
          </button>
          {editTk&&<button onClick={()=>{setEditTk(null);setForm(E);setCurPrice(null);}}>İptal</button>}
        </div>
        <div style={{fontSize:11,color:"var(--text2)",marginTop:8}}>⚠ Bu form pozisyonu doğrudan yazar — işlem geçmişine eklenmez.</div>
      </div>

      {pos.filter(p=>p.currency==="USD").length>0&&(
        <div>
          <div className="stitle">Mevcut Pozisyonlar</div>
          {[...pos].filter(p=>p.currency==="USD").sort((a,b)=>a.ticker.localeCompare(b.ticker)).map(p=>(
            <div key={p.ticker} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"0.5px solid var(--border)"}}>
              <div>
                <span style={{fontWeight:700,fontSize:13,fontFamily:"monospace"}}>{p.ticker}</span>
                <span className="dim" style={{fontSize:11,marginLeft:8}}>{fmtShares(p.shares)} adet · ${fmt(p.avgCost)} ort.</span>
                {p.broker&&<span className="dim" style={{fontSize:10,marginLeft:6}}>· {p.broker}</span>}
              </div>
              <div className="brow" style={{gap:5}}>
                <button className="btn-xs" onClick={()=>startEdit(p)}>Düzenle</button>
                <button className="btn-xs btn-danger-out" onClick={()=>delPos(p.ticker)}>Sil</button>
