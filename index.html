<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Investment Ledger</title>
  <meta name="theme-color" content="#6658ff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Ledger"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>"/>
  <link rel="apple-touch-icon" href="/Investment-Ledger/icon-192.png"/>
  <link rel="manifest" href="/Investment-Ledger/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#000000;--bg2:#0c0c0c;--bg3:#141414;--bg4:#1c1c1c;
      --border:rgba(255,255,255,0.06);--border2:rgba(102,88,255,0.28);
      --text:#f0ede8;--text2:#b8b8b8;--text3:#888888;
      --ok:#00d97e;--err:#ff3366;--info:#6658ff;--warn:#ffb800;
      --r:10px;--rl:16px;
    }
    [data-theme="light"]{
      --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;--bg4:#e0e0e0;
      --border:rgba(0,0,0,0.08);--border2:rgba(82,72,212,0.28);
      --text:#1a1a1a;--text2:#4a4a4a;--text3:#808080;
      --info:#5248d4;
      --ok:#00a65a;--err:#e0003c;--warn:#c47d00;
      --topbar-bg:rgba(255,255,255,0.90);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;min-height:100vh;}
    #app{display:contents;}
    #shell{display:flex;flex-direction:column;min-height:100vh;}
    #topbar{height:52px;background:var(--topbar-bg,rgba(0,0,0,0.85));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;}
    .topbar-left{display:flex;align-items:center;gap:9px;margin-right:28px;}
    .logo-mark{width:28px;height:28px;background:var(--info);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:-0.03em;flex-shrink:0;}
    .logo-text{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.02em;}
    .topbar-nav{display:flex;align-items:center;gap:4px;flex:1;}
    .topbar-nav .tab{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:transparent;border:none;border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap;transition:color .12s,background .12s;}
    .topbar-nav .tab:hover{color:var(--text);}
    .topbar-nav .tab.on{background:rgba(102,88,255,0.12);color:var(--text);font-weight:500;}
    .topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
    .cur-seg{display:inline-flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px;}
    .cur-seg button{background:transparent;border:none;color:var(--text2);padding:4px 9px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;line-height:1;transition:background .12s,color .12s;min-width:26px;}
    .cur-seg button:hover{color:var(--text);}
    .cur-seg button.on{background:rgba(102,88,255,0.18);color:var(--text);}
    /* AddTab tip picker — CSS hover (önceki inline DOM mutation anti-pattern'i değiştirdi) */
    .pick-card{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:left;color:var(--text);transition:border-color .15s,background .15s;}
    .pick-card:hover{border-color:var(--info);background:var(--bg4);}
    .pick-card:focus-visible{outline:2px solid var(--info);outline-offset:2px;}
    /* Portföy Sağlık Tablosu — sticky ticker + renk pill metrik hücreler */
    .health-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .health-tbl{min-width:680px;}
    .health-tbl th,.health-tbl td{white-space:nowrap;}
    .health-sticky{position:sticky;left:0;background:var(--bg2);z-index:2;}
    .health-tbl tbody tr:hover .health-sticky{background:var(--bg3);}
    .hp{display:inline-block;padding:2px 7px;border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;line-height:1.4;}
    .hp-ok{background:rgba(0,217,126,0.14);color:var(--ok);}
    .hp-warn{background:rgba(255,184,0,0.14);color:var(--warn);}
    .hp-err{background:rgba(255,51,102,0.14);color:var(--err);}
    .hp-na{background:var(--bg3);color:var(--text3);}
    #app-main{flex:1;max-width:920px;margin:0 auto;padding:24px 20px 60px;width:100%;}
    #bottom-tabs{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg2);border-top:1px solid var(--border);z-index:100;}
    #bottom-tabs .btab{flex:1;height:100%;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;transition:color .12s;}
    #bottom-tabs .btab.on{color:var(--info);font-weight:500;}
    #fab{display:none;position:fixed;bottom:76px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--info);border:none;color:#fff;box-shadow:0 6px 20px rgba(102,88,255,0.45);z-index:101;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,box-shadow .12s;}
    #fab:hover{transform:scale(1.05);box-shadow:0 8px 28px rgba(102,88,255,0.55);}
    #fab:active{transform:scale(0.96);}
    @media (max-width:640px){
      .topbar-nav{display:none;}
      .logo-text{display:none;}
      #app-main{padding:16px 12px 130px;}
      #bottom-tabs{display:flex;}
      #fab{display:flex;}
      #topbar{padding:0 14px;}
      .topbar-right .btn-add-primary{display:none;}
      /* iOS Safari/Chrome input'a tıklandığında font-size < 16px ise sayfayı
         otomatik zoom-in eder ve kalıcı zoom hissi verir. Mobile'da input
         font'unu 16px'e çıkarmak bu davranışı engeller. */
      input,textarea,select,.finp,.finp.sm{font-size:16px;}
      .cur-seg button{min-height:44px;padding:4px 12px;}
    }
    /* Base — ghost stil (default). Özel class'lı butonlar (.tab, .btab, .eye-btn, #fab vb.) cascade ile bunu override eder. */
    button{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;padding:7px 14px;transition:opacity .12s,background .12s;}
    button.pri{background:var(--info);border:none;color:#fff;font-weight:500;padding:8px 16px;}
    button.danger{background:transparent;border:1px solid rgba(255,51,102,0.25);color:var(--err);}
    button.danger:hover:not(:disabled){background:rgba(255,51,102,0.08);}
    button:hover:not(:disabled){opacity:.82;}
    button:active:not(:disabled){opacity:.6;}
    button:disabled{opacity:.35;cursor:default;}
    input,textarea,select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;padding:10px 13px;width:100%;outline:none;transition:border-color .15s;}
    input:focus,textarea:focus,select:focus{border-color:var(--info);}
    input::placeholder,textarea::placeholder{color:var(--text3);}
    table{width:100%;border-collapse:collapse;}
    th{font-size:10px;font-weight:500;color:var(--text3);padding:10px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;cursor:pointer;user-select:none;}
    th.l{text-align:left;}th.r{text-align:right;}
    td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;font-family:'DM Mono','Fira Code',monospace;font-variant-numeric:tabular-nums;}
    td.l{text-align:left;font-family:inherit;}td.r{text-align:right;}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;}
    .lbl{font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
    .mono{font-family:'DM Mono','Fira Code',monospace;}
    .ok{color:var(--ok);}.err{color:var(--err);}.dim{color:var(--text2);}
    .flash{position:fixed;top:53px;left:12px;right:12px;z-index:150;border-radius:var(--r);padding:9px 13px;font-size:13px;}
    .flash.ok{background:rgba(48,209,88,.12);color:var(--ok);border:0.5px solid rgba(48,209,88,.3);}
    .flash.err{background:rgba(255,69,58,.12);color:var(--err);border:0.5px solid rgba(255,69,58,.3);}
    .g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:16px;}
    .g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-bottom:16px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
    @media(max-width:500px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:1fr 1fr;}.g3>*:first-child{grid-column:1/-1;}}
    .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);}
    .row:last-child{border-bottom:none;}
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .stitle{font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
    .badge{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 7px;border-radius:6px;letter-spacing:.05em;border:1px solid transparent;margin-left:3px;}
    .badge.etf{background:rgba(102,88,255,0.12);color:var(--info);border-color:rgba(102,88,255,0.28);}
    .badge.cry{background:rgba(255,184,0,0.10);color:var(--warn);border-color:rgba(255,184,0,0.20);}
    .badge.split{background:rgba(255,184,0,0.10);color:var(--warn);border-color:rgba(255,184,0,0.20);cursor:help;}
    .cbox{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rl);padding:15px;margin-bottom:14px;}
    .kv{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:14px;}
    .kk{font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
    .kv_{font-size:13px;font-weight:500;font-family:'DM Mono','Fira Code',monospace;}
    .sg{margin-bottom:20px;}
    .sg label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;}
    .sg .hint{font-size:11px;color:var(--text3);margin-top:5px;}
    .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;}
    .dot.ok{background:var(--ok);}.dot.off{background:var(--text3);}
    .brow{display:flex;gap:8px;flex-wrap:wrap;}
    .empty{color:var(--text2);font-size:13px;padding:3rem 0;text-align:center;}
    .spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--info);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;}
    .mask{color:var(--text3);letter-spacing:2px;}
    .tcell{display:flex;flex-direction:column;gap:1px;}
    .tsym{font-weight:700;font-size:12px;font-family:'DM Mono','Fira Code',monospace;}
    .tname{font-size:10px;color:var(--text2);max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .pchip{background:var(--bg2);border-radius:8px;padding:7px 10px;text-align:center;flex:1;min-width:60px;}
    .pchip-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
    .pchip-val{font-size:14px;font-weight:600;font-family:'DM Mono','Fira Code',monospace;}
    .eye-btn{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);padding:6px 9px;cursor:pointer;display:flex;align-items:center;color:var(--text2);}
    .eye-btn:hover{opacity:.7;}.eye-btn.on{border-color:var(--warn);color:var(--warn);}
    .pbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px;}
    .pbar-fill{height:100%;border-radius:3px;transition:width 0.3s ease;}
    /* Login */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:90vh;}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:32px 28px;width:100%;max-width:360px;}
    .login-logo{width:40px;height:40px;background:var(--info);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin:0 auto 14px;}
    .login-title{text-align:center;font-size:18px;font-weight:600;margin-bottom:4px;}
    .login-sub{text-align:center;font-size:12px;color:var(--text2);margin-bottom:24px;}
    .login-field{margin-bottom:12px;}
    .login-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
    /* Mode tabs in Add */
    .mtab{flex:1;min-width:70px;font-size:12px;}
    .mtab.sm{flex:0 0 auto;min-width:auto;padding:3px 9px;font-size:11px;}
    .mtab.on{background:var(--info);border-color:var(--info);color:#fff;}
    /* Horizontally-scrollable filter chip row (Dashboard + AnalysisTab global filters) */
    .fbar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
    .fbar::-webkit-scrollbar{display:none;}
    .fbar .mtab{flex:0 0 auto;min-width:auto;display:flex;align-items:center;gap:4px;white-space:nowrap;}
    /* Modal */
    .mdl-bd{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);animation:fadeIn .15s ease;}
    .mdl-bx{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:20px 22px;max-width:360px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.6);animation:popIn .18s ease;}
    .mdl-msg{font-size:14px;line-height:1.5;margin-bottom:16px;color:var(--text);}
    .mdl-bx .brow{justify-content:flex-end;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes popIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
    /* Empty state card */
    .empty-card{background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--rl);padding:48px 20px;text-align:center;margin:20px 0;}
    .empty-card .ic{font-size:44px;margin-bottom:12px;opacity:.7;}
    .empty-card .ttl{font-size:15px;font-weight:600;margin-bottom:6px;}
    .empty-card .sub{font-size:12px;color:var(--text2);margin-bottom:18px;max-width:280px;margin-left:auto;margin-right:auto;line-height:1.5;}
    /* Warning card (missing prices vs.) */
    .warn-card{background:rgba(255,159,10,.08);border:0.5px solid rgba(255,159,10,.35);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
    .warn-card .wc-ttl{font-size:13px;font-weight:600;color:var(--warn);margin-bottom:2px;}
    .warn-card .wc-sub{font-size:11px;color:var(--text2);}
    /* Size modifiers for buttons (used in list actions & toolbars) */
    .btn-xs{font-size:11px;padding:3px 9px;}
    .btn-sm{font-size:11px;padding:4px 9px;}
    .btn-md{font-size:12px;padding:5px 12px;}
    .btn-danger-out{color:var(--err);border-color:var(--err);background:transparent;}
    /* Form input variant (inline-form fields inside rows) */
    .finp{background:var(--bg);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;width:100%;padding:7px 9px;font-size:13px;}
    .finp.sm{padding:5px 8px;font-size:12px;}
    /* Clickable position rows */
    .pos-row{cursor:pointer;transition:background .12s ease;}
    .pos-row:hover{background:var(--bg3);}
    /* Responsive position list — desktop:table, mobile:card-rows */
    .pos-card-list{display:none;}
    @media(max-width:640px){
      .pos-tbl-desktop{display:none;}
      .pos-card-list{display:block;border-radius:12px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);}
      .pos-sort-bar{display:flex;align-items:center;gap:2px;padding:7px 12px;background:var(--bg2);}
      .pos-sort-bar>span{flex:1;font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
      .psb-btn{background:none;border:none;color:var(--text3);font:11px 'DM Sans',sans-serif;cursor:pointer;padding:4px 7px;border-radius:6px;white-space:nowrap;}
      .psb-btn.on{color:var(--text);background:rgba(255,255,255,0.06);}
      .pcr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg2);cursor:pointer;transition:background .12s;gap:8px;border-top:1px solid var(--bg3);}
      .pcr:first-of-type{border-top:none;}
      .pcr:hover,.pcr:active{background:var(--bg3);}
      .pcr-left{display:flex;flex-direction:column;gap:3px;min-width:0;}
      .pcr-ticker{font:700 15px/1.2 'DM Mono','Fira Code',monospace;color:var(--text);}
      .pcr-sub{font-size:12px;color:var(--text3);font-family:'DM Mono','Fira Code',monospace;white-space:nowrap;}
      .pcr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
      .pcr-mv{font:600 15px/1.2 'DM Mono','Fira Code',monospace;color:var(--text);}
      .pcr-chg{font-size:12px;font-family:'DM Mono','Fira Code',monospace;color:var(--text3);white-space:nowrap;}
      .pcr-chg.ok{color:var(--ok);}
      .pcr-chg.err{color:var(--err);}
    }
    /* Segmented control (toggle) */
    .seg{display:inline-flex;background:var(--bg3);border-radius:7px;padding:2px;}
    .seg button{background:transparent;border:none;padding:4px 10px;font-size:11px;border-radius:5px;color:var(--text2);cursor:pointer;}
    .seg button.on{background:var(--bg2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,0.15);}
    /* Pie legend row */
    .pie-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;}
    .pie-sw{width:10px;height:10px;border-radius:2px;flex:0 0 auto;}
    /* Custom tooltip — data-tip attribute */
    [data-tip]{position:relative;}
    [data-tip]:hover::after{
      content:attr(data-tip);
      position:absolute;top:100%;left:50%;transform:translateX(-50%);
      margin-top:6px;background:var(--bg3);color:var(--text);
      padding:8px 11px;border-radius:7px;font-size:11px;font-family:inherit;
      white-space:normal;width:max-content;max-width:260px;
      z-index:50;pointer-events:none;line-height:1.45;
      box-shadow:0 6px 18px rgba(0,0,0,0.45);border:0.5px solid var(--border2);
    }
    /* Mobile: tooltip'i viewport'a sabitle (taşmasın) — alttan banner gibi */
    @media (max-width:640px){
      [data-tip]:hover::after{
        position:fixed;top:auto;bottom:140px;left:12px;right:12px;
        transform:none;margin-top:0;max-width:none;width:auto;
      }
    }
    /* Touch tap-to-show — data-tip-visible attribute ile hover ile aynı görünüm */
    [data-tip][data-tip-visible]::after{
      content:attr(data-tip);
      position:absolute;top:100%;left:50%;transform:translateX(-50%);
      margin-top:6px;background:var(--bg3);color:var(--text);
      padding:8px 11px;border-radius:7px;font-size:11px;font-family:inherit;
      white-space:normal;width:max-content;max-width:min(260px,80vw);
      z-index:50;pointer-events:none;line-height:1.45;
      box-shadow:0 6px 18px rgba(0,0,0,0.45);border:0.5px solid var(--border2);
    }
    @media (max-width:640px){
      [data-tip][data-tip-visible]::after{
        position:fixed;top:auto;bottom:140px;left:12px;right:12px;
        transform:none;margin-top:0;max-width:none;width:auto;
        z-index:150;
      }
    }
  </style>

  if(amount==null||isNaN(+amount)) return null;

  const usdtry = +fxRates.USDTRY;

  else if(from==="EUR") usd = a * eurusd;
  else return null;
  if(to==="USD") return usd;
  if(to==="TRY") return usd * usdtry;
  if(to==="EUR") return usd / eurusd;

};

const enrichParseWithPrice = async (d) => {
  if (!d || !d.ticker || !d.date) return d;

  price = await tryFetch({ ticker, mode: "price", asset_type: at });

// ── Return metrics: Total Return & XIRR ──────────────────────────
// XIRR = düzensiz aralıklı cash flow'ların yıllık getirisi (Excel XIRR).
// cashflows: [{date: Date, amount: number}] — negatif=yatırım, pozitif=geri dönüş.
const yearsBetween = (d1, d0) => (d1.getTime() - d0.getTime()) / (365.25 * 86400000);
const xnpv = (rate, cfs) => cfs.reduce((a, cf) =>
  a + cf.amount / Math.pow(1 + rate, yearsBetween(cf.date, cfs[0].date)), 0);
const xirr = (cfs) => {
  if (!cfs || cfs.length < 2) return null;
  const sorted = [...cfs].sort((a, b) => a.date - b.date);
  // En az bir negatif ve bir pozitif cash flow olmalı — yoksa IRR tanımsız
  const hasNeg = sorted.some(c => c.amount < 0);
  const hasPos = sorted.some(c => c.amount > 0);
  if (!hasNeg || !hasPos) return null;
  let rate = 0.1;
  for (let i = 0; i < 100; i++) {
    const n = xnpv(rate, sorted);
    if (Math.abs(n) < 1e-6) return rate;
    const deriv = sorted.reduce((a, cf) => {
      const t = yearsBetween(cf.date, sorted[0].date);
      return a - t * cf.amount / Math.pow(1 + rate, t + 1);
    }, 0);
    if (Math.abs(deriv) < 1e-10) return null;
    const next = rate - n / deriv;
    if (!isFinite(next)) return null;
    if (Math.abs(next - rate) < 1e-7) return next;
    rate = next;
  }
  return null; // yakınsamadı
};

// Transaction listesi + bugünkü MV → cash flow serisi (XIRR/TR için).
// BUY: -(total + commission), SELL: (total - commission), bugün: +MV.
const buildCashflows = (txs, todayMV) => {
  const cfs = [];
  for (const t of txs) {
    const c = +t.commission || 0;
    const total = +t.total || 0;
    if (t.way === "BUY") cfs.push({ date: new Date(t.date), amount: -(total + c) });
    else if (t.way === "SELL") cfs.push({ date: new Date(t.date), amount: total - c });
    else if (t.way === "DIV") cfs.push({ date: new Date(t.date), amount: total }); // temettü = net nakit geliri
  }
  if (todayMV > 0) cfs.push({ date: new Date(), amount: todayMV });
  return cfs;
};

// ── Position rebuild (shared by HistoryTab + CSV import) ─────────
// SELL pozisyonda yoksa / shares yetmezse güvenli davran:
// negatif shares/cost oluşturmaz, fazla satış yok sayılır.
// Stock split'ler: bir işlemin tarihinden SONRA gelen her split'in
// ratio'su birikimli olarak uygulanır (shares × factor). Toplam cost
// aynı kalır, shares artar → avg_cost otomatik düşer.
const rebuildPositions = async (userId, portfolioId = null) => {
  // portfolioId yoksa DB'den kullanıcının ilk portföyünü al.
  // Gelecekte: aktif portföy switcher'dan gelir; şimdilik fallback yeterli.
  let pid = portfolioId;
  if (!pid) {
    const {data:pf} = await sb.from("portfolios").select("id").eq("user_id",userId).order("created_at").limit(1).maybeSingle();
    pid = pf?.id || null;
  }
  if (!pid) { DEBUG && console.warn("[rebuildPositions] no portfolio for user",userId); return 0; }

  const [txRes,splitRes] = await Promise.all([
    sb.from("transactions").select("*").eq("user_id",userId).eq("portfolio_id",pid).order("date"),
    sb.from("splits").select("*").eq("user_id",userId).eq("portfolio_id",pid)
  ]);
  const all = txRes.data || [];
  const splits = splitRes.data || [];
  const splitsByT = {};
  splits.forEach(s => { (splitsByT[s.ticker] = splitsByT[s.ticker] || []).push(s); });
  const factorFor = (ticker, date) => {
    const arr = splitsByT[ticker] || [];
    return arr.filter(s => s.split_date > date).reduce((a,s) => a * +s.ratio, 1);
  };

  const pm = {};
  for (const t of all) {
    if (!pm[t.ticker]) {
      // Normalize currency per asset type: BIST→TRY, all others→USD.
      // Prevents AI-parse errors (e.g. BTC stored as TRY) from hiding positions.
      const normCur = t.asset_type==="BIST" ? "TRY" : (t.currency==="EUR" ? "EUR" : "USD");
      pm[t.ticker] = {ticker:t.ticker,name:t.name,type:t.asset_type,shares:0,cost:0,currency:normCur,broker:t.broker};
    }
    const p = pm[t.ticker];
    const f = factorFor(t.ticker, t.date);
    const adjShares = +t.shares * f;
    if (t.way === "BUY") {
      p.cost += +t.shares * +t.price;   // total unchanged by split
      p.shares += adjShares;
    } else if (t.way === "SELL" && p.shares > 0) {
      const avg = p.cost / p.shares;
      const qty = Math.min(adjShares, p.shares);
      p.cost = Math.max(0, p.cost - avg * qty);
      p.shares -= qty;
    }
  }
  // unit kolonu transaction'da yok; delete öncesi mevcut pozisyonlardan snapshot al.
  const snapRes = await sb.from("positions").select("ticker,unit").eq("user_id",userId).eq("portfolio_id",pid);
  const unitMap = Object.fromEntries((snapRes.data||[]).map(p=>[p.ticker,p.unit||null]));
  await sb.from("positions").delete().eq("user_id",userId).eq("portfolio_id",pid);
  const np = Object.values(pm).filter(p => p.shares > CFG.DUST_THRESHOLD).map(p => ({
    user_id: userId, portfolio_id: pid, ticker: p.ticker, name: p.name, type: p.type,
    shares: +p.shares.toFixed(6), avg_cost: +(p.cost/p.shares).toFixed(6),
    currency: p.currency, broker: p.broker,
    unit: unitMap[p.ticker] ?? null,
    updated_at: new Date().toISOString()
  }));
  if (np.length) await sb.from("positions").insert(np);
  return np.length;
};

// ── Login ────────────────────────────────────────────────────────
function Login(){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [isReg,setIsReg]=useState(false);
  const [loading,setLoading]=useState(false);
  const [errMsg,setErrMsg]=useState("");
  const [okMsg,setOkMsg]=useState("");

  const submit=async()=>{
    if(!email||!pw)return;
    setLoading(true);setErrMsg("");setOkMsg("");
    const{error}=isReg
      ?await sb.auth.signUp({email,password:pw})
      :await sb.auth.signInWithPassword({email,password:pw});
    if(error)setErrMsg(error.message);
    else if(isReg)setOkMsg("Hesap oluşturuldu!");
    setLoading(false);
  };

  return(
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">IL</div>
        <div className="login-title">Investment Ledger</div>
        <div className="login-sub">Kişisel yatırım takibi</div>
        <div className="login-field">
          <label>E-posta</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="ornek@mail.com" onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        <div className="login-field">
          <label>Şifre</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        {errMsg&&<div style={{fontSize:12,color:"var(--err)",marginTop:8}}>{errMsg}</div>}
        {okMsg&&<div style={{fontSize:12,color:"var(--ok)",marginTop:8}}>{okMsg}</div>}
        <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:10}}>
          <button className="pri" onClick={submit} disabled={loading||!email||!pw}>
            {loading?<div className="spin" style={{width:14,height:14,margin:"0 auto"}}></div>:(isReg?"Kayıt Ol":"Giriş Yap")}
          </button>
          <button style={{background:"transparent",border:"none",color:"var(--info)",fontSize:13,cursor:"pointer",padding:0}} onClick={()=>{setIsReg(!isReg);setErrMsg("");setOkMsg("");}}>
            {isReg?"Hesabım var → Giriş Yap":"Hesabım yok → Kayıt Ol"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SparkChart kaldırıldı (2026-04-29)
function SparkChart({data}){
  if(!data||data.length<2)return<div className="dim" style={{fontSize:11,padding:"14px 0",textAlign:"center",minHeight:80,display:"flex",alignItems:"center",justifyContent:"center"}}>Grafik için yeterli veri yok</div>;
  const W=400,H=70,pad=6;
  const vals=data.map(d=>d.value);
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const sx=i=>pad+(W-2*pad)*(i/(data.length-1));
  const sy=v=>pad+(H-2*pad)*(1-(v-min)/rng);
  const pts=data.map((d,i)=>`${sx(i).toFixed(1)},${sy(d.value).toFixed(1)}`).join(" ");
  const up=data[data.length-1].value>=data[0].value;
  const col=up?"var(--ok)":"var(--err)";
  const areaPts=`${pad},${H-pad} ${pts} ${W-pad},${H-pad}`;
  return(
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}} preserveAspectRatio="none">
        <polygon points={areaPts} fill={col} opacity="0.08"/>
        <polyline points={pts} fill="none" stroke={col} strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
        {data.map((d,i)=>(<circle key={i} cx={sx(i)} cy={sy(d.value)} r="2.2" fill={col}/>))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text2)",marginTop:6,padding:"0 4px"}}>
        {data.map((d,i)=>(<span key={i} style={{flex:1,textAlign:i===0?"left":i===data.length-1?"right":"center"}}>{d.lbl}</span>))}
      </div>
    </div>
  );
}

// ── AddTxInline — Detail sayfasından hızlı işlem ekleme ────────
// Tek ticker için: Manuel form veya AI ile metin parse.
function AddTxInline({ticker,user,pos,loadData,flash_,onClose,assetType,portfolioId}){
  const [mode,setMode]=useState("manuel");
  const E={date:today(),way:"BUY",shares:"",price:"",broker:"",commission:"",notes:""};
  const [form,setForm]=useState(E);
  const [saving,setSaving]=useState(false);
  const [aiText,setAiText]=useState("");
  const [aiParsing,setAiParsing]=useState(false);
  const [aiParsed,setAiParsed]=useState(null);
  const [aiErr,setAiErr]=useState("");

  const tkPos=pos.find(x=>x.ticker===ticker);
  // Effective asset type: pozisyondan, yoksa parent'tan gelen hint'ten, yoksa US_STOCK default.
  // Non-held BIST detayından eklemede asset_type doğru olsun diye kritik.
  const effType = tkPos?.type || assetType || "US_STOCK";
  const effCur  = tkPos?.currency || (effType==="BIST" ? "TRY" : "USD");

  const saveManual=async()=>{
    const sh=+form.shares,pr=+form.price;
    if(!form.shares||isNaN(sh)||sh<=0){flash_("Geçersiz adet","err");return;}
    if(!form.price||isNaN(pr)||pr<0){flash_("Geçersiz fiyat","err");return;}
    setSaving(true);
    const{error}=await sb.from("transactions").insert({
      user_id:user.id,date:form.date,ticker,
      name:tkPos?.name||ticker,
      asset_type:effType,
      way:form.way,shares:sh,price:pr,
      currency:effCur,
      total:+(sh*pr).toFixed(4),
      broker:form.broker||"",
      commission:+(form.commission||0),
      exchange:"",notes:form.notes||"",
      portfolio_id:portfolioId
    });
    setSaving(false);
    if(error){flash_(error.message,"err");return;}
    await rebuildPositions(user.id,portfolioId);await loadData();
    flash_(`${ticker} ${form.way==="BUY"?"alış":form.way==="DIV"?"temettü":"satış"} eklendi ✓`);
    onClose();
  };

  const parseAI=async()=>{
    if(!aiText.trim())return;
    setAiParsing(true);setAiErr("");setAiParsed(null);
    try{
      // Ticker'ı prompt'a göm — AI doğru ticker bulsun
      const r=await edgeCallAuth("parse-transaction",{text:`Ticker: ${ticker}. ${aiText}`});
      const d=await r.json();
      if(!r.ok||d.error)throw new Error(d.message||d.error||`HTTP ${r.status}`);
      const list = Array.isArray(d.transactions) ? d.transactions : (d.ticker && d.date ? [d] : []);
      if(list.length===0)throw new Error("Geçersiz yanıt — işlem bulunamadı");
      // Detay sayfasından eklendiği için ticker'ı zorla override et + name fallback
      list.forEach(t=>{ t.ticker=ticker; if(!t.name)t.name=tkPos?.name||ticker; });
      setAiParsed(await enrichParseListWithPrices(list));
    }catch(e){setAiErr("Hata: "+e.message);}
    setAiParsing(false);
  };

  const saveAI=async(list)=>{
    const items = Array.isArray(list) ? list : (aiParsed||[]);
    if(!items||items.length===0)return;
    const valid=items.filter(p=>{const sh=+p.shares,pr=+p.price;return !isNaN(sh)&&sh>0&&!isNaN(pr)&&pr>=0;});
    const invalidCnt=items.length-valid.length;
    if(valid.length===0){flash_("Geçerli işlem bulunamadı","err");return;}
    const rows = valid.map(p=>({
      user_id:user.id,date:p.date,ticker,
      name:p.name||tkPos?.name||ticker,
      asset_type:p.asset_type||effType,
      way:p.way,shares:+p.shares,price:+p.price,
      currency:p.currency||effCur,
      total:+((+p.shares)*(+p.price)).toFixed(4),
      broker:p.broker||"",commission:+(p.commission||0),
      exchange:p.exchange||"",notes:p.notes||"",
      portfolio_id:portfolioId
    }));
    const{error}=await sb.from("transactions").insert(rows);
    if(error){flash_(error.message,"err");return;}
    await rebuildPositions(user.id,portfolioId);await loadData();
    const msg=rows.length===1?"İşlem eklendi ✓":`${rows.length} işlem eklendi ✓`;
    flash_(invalidCnt>0?msg+` · ${invalidCnt} geçersiz atlandı`:msg);
    onClose();
  };

  return(
    <div className="cbox" style={{marginTop:10,marginBottom:14}}>
      <div className="seg" style={{marginBottom:12}}>
        <button className={mode==="manuel"?"on":""} onClick={()=>setMode("manuel")}>📌 Manuel</button>
        <button className={mode==="ai"?"on":""} onClick={()=>setMode("ai")}>📝 AI ile</button>
      </div>

      {mode==="manuel"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
            <div><div className="kk" style={{marginBottom:3}}>Tarih</div>
              <input className="finp sm" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} max={today()}/></div>
            <div><div className="kk" style={{marginBottom:3}}>İşlem</div>
              <select className="finp sm" value={form.way} onChange={e=>setForm(f=>({...f,way:e.target.value}))}>
                <option value="BUY">Alış</option><option value="SELL">Satış</option><option value="DIV">Temettü</option>
              </select></div>
            <div><div className="kk" style={{marginBottom:3}}>Broker</div>
              <input className="finp sm" value={form.broker} maxLength={50} onChange={e=>setForm(f=>({...f,broker:e.target.value}))} placeholder="Akbank..."/></div>
            <div><div className="kk" style={{marginBottom:3}}>Adet *</div>
              <input className="finp sm" type="number" step="any" value={form.shares} onChange={e=>setForm(f=>({...f,shares:e.target.value}))} placeholder="0"/></div>
            <div><div className="kk" style={{marginBottom:3}}>Fiyat *</div>
              <input className="finp sm" type="number" step="any" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="0.00"/></div>
            <div><div className="kk" style={{marginBottom:3}}>Komisyon</div>
              <input className="finp sm" type="number" step="any" value={form.commission} onChange={e=>setForm(f=>({...f,commission:e.target.value}))} placeholder="0"/></div>
          </div>
          <div style={{marginBottom:8}}>
            <div className="kk" style={{marginBottom:3}}>Not (opsiyonel)</div>
            <input className="finp sm" value={form.notes} maxLength={200} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="e.g. Q1 temettü, ikramiye..."/>
          </div>
          {form.shares&&form.price&&(
            <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Toplam: {displaySym(effCur)}{fmt((+form.shares)*(+form.price),2)}</div>
          )}
          <div className="brow">
            <button className="pri btn-md" onClick={saveManual} disabled={saving||!form.shares||!form.price}>{saving?"...":"Kaydet"}</button>
            <button className="btn-md" onClick={onClose} disabled={saving}>İptal</button>
          </div>
        </div>
      )}

      {mode==="ai"&&(
        <div>
          <textarea value={aiText} onChange={e=>setAiText(e.target.value)} rows={3}
            placeholder={`"5 adet $200 bugün Akbank komisyon $2"\n"3 adet $150 dün satış QNB"`}
            style={{lineHeight:1.5,marginBottom:8,resize:"vertical"}}/>
          <div className="brow" style={{marginBottom:aiParsed||aiErr?10:0}}>
            <button className="pri btn-md" onClick={parseAI} disabled={aiParsing||!aiText.trim()}>{aiParsing?"Parse...":"AI Parse"}</button>
            <button className="btn-md" onClick={onClose} disabled={aiParsing}>İptal</button>
          </div>
          {aiErr&&<div className="flash err" style={{fontSize:12}}>{aiErr}</div>}
          <ConfirmBox data={aiParsed} onSave={saveAI} onCancel={()=>setAiParsed(null)}/>
        </div>
      )}
    </div>
  );
}

// ── TickerDetailTab — pozisyon + meta + transactions ───────────
// LS cache: 7 gün TTL (ticker meta'sı yavaş değişir)
const META_TTL_MS = 7 * 86400000;
const metaCacheGet = (ticker) => {
  const c = LS.get(`meta_${ticker}`, null);
  if (!c || !c.t) return null;
  if (Date.now() - c.t > META_TTL_MS) return null;
  return c.d;
};
// Provider compromise koruması: description multi-MB string olabilir → LS quota'yı şişirir.
// 5KB cap (içerik anlamlı kalır, render'da `cursor:help` ile zaten clamp'liyor).
const META_DESC_CAP = 5000;
const sanitizeMeta = (data) => {
  if (!data || typeof data !== "object") return data;
  const clean = {...data};
  if (typeof clean.description === "string" && clean.description.length > META_DESC_CAP) {
    clean.description = clean.description.slice(0, META_DESC_CAP) + "…";
  }
  return clean;
};
const metaCacheSet = (ticker, data) => LS.set(`meta_${ticker}`, { d: sanitizeMeta(data), t: Date.now() });

// Fundamental cache (FMP TTM + 5Y) — 7 gün TTL
const FUND_TTL_MS = 7 * 86400000;
const fundCacheGet = (ticker) => {
  const c = LS.get(`fund_${ticker}`, null);
  if (!c || !c.t) return null;
  if (Date.now() - c.t > FUND_TTL_MS) return null;
  return c.d;
};
const fundCacheSet = (ticker, data) => LS.set(`fund_${ticker}`, { d: data, t: Date.now() });

// Value-investing checklist eşikleri.
// dir: "high"=büyük iyi, "low"=küçük iyi. Örn. ROE yüksek, P/E düşük olsun.
const FUND_THRESHOLDS = {
  revenueGrowth5Y:    {dir:"high", good:0.10,  ok:0.05},
  earningsGrowth5Y:   {dir:"high", good:0.10,  ok:0.05},
  grossMargin:        {dir:"high", good:0.40,  ok:0.25},
  operatingMargin:    {dir:"high", good:0.15,  ok:0.08},
  netMargin:          {dir:"high", good:0.10,  ok:0.05},
  fcfMargin:          {dir:"high", good:0.10,  ok:0.05},
  sgaToGrossProfit:   {dir:"low",  good:0.30,  ok:0.50},
  depToGrossProfit:   {dir:"low",  good:0.10,  ok:0.25},
  interestToOpIncome: {dir:"low",  good:0.15,  ok:0.30},
  liabToEquity:       {dir:"low",  good:0.80,  ok:2.00},
  retainedToEquity:   {dir:"high", good:1.00,  ok:0.50},
  roe:                {dir:"high", good:0.15,  ok:0.08},
  roa:                {dir:"high", good:0.07,  ok:0.03},
  roic:               {dir:"high", good:0.15,  ok:0.08},
  pe:                 {dir:"low",  good:15,    ok:25},
  ps:                 {dir:"low",  good:2,     ok:5},
  capexToNetIncome:   {dir:"low",  good:0.25,  ok:0.50},
  capexToSales:       {dir:"low",  good:0.05,  ok:0.10},
  capexToOcf:         {dir:"low",  good:0.30,  ok:0.50},
  ebitToInterest:     {dir:"high", good:10,    ok:5},
  netDebtToFcf:       {dir:"low",  good:2,     ok:5},
};

const fundScore = (key, val) => {
  if (val == null || !isFinite(val)) return null;
  const t = FUND_THRESHOLDS[key];
  if (!t) return null;
  // netDebtToFcf negatif = net cash → koşulsuz iyi
  if (key === "netDebtToFcf" && val < 0) return "good";
  if (t.dir === "high") {
    if (val >= t.good) return "good";
    if (val >= t.ok)   return "neutral";
    return "bad";
  } else {
    if (val <= t.good) return "good";
    if (val <= t.ok)   return "neutral";
    return "bad";
  }
};

// homepage_url'den domain çıkar — Clearbit logo için.
const extractDomain = (url) => {
  if (!url) return null;
  try {
    return new URL(url.startsWith("http") ? url : "https://" + url).hostname.replace(/^www\./, "");
  } catch (e) { return null; }
};

// Güvenli href — sadece http/https protokolüne izin ver. javascript:/data: gibi
// URL'leri (provider compromise edilirse) engelle. Geçersizse "#" döner.
const safeUrl = (url) => {
  if (!url || typeof url !== "string") return "#";
  try {
    const u = new URL(url.startsWith("http") ? url : "https://" + url);
    return (u.protocol === "http:" || u.protocol === "https:") ? u.href : "#";
  } catch (e) { return "#"; }
};

// Sayı formatı: 4014264110200 → "4.01T", 166000 → "166K"
const fmtCompact = (n) => {
  if (n == null) return "—";
  const abs = Math.abs(n);
  if (abs >= 1e12) return (n/1e12).toFixed(2)+"T";
  if (abs >= 1e9)  return (n/1e9).toFixed(2)+"B";
  if (abs >= 1e6)  return (n/1e6).toFixed(1)+"M";
  if (abs >= 1e3)  return (n/1e3).toFixed(1)+"K";
  return ""+n;
};

function TickerDetailTab({ticker,assetTypeHint,pos,txs,prc,hist,user,confirm_,flash_,loadData,closeDetail,hideAmts,mask,portfolioId}){

  const sym = displayCurrency==="TRY" ? "₺" : displayCurrency==="EUR" ? "€" : "$";

  // Non-held için canlı fiyat (search'ten açıldı, prc[ticker] yok). Held için prc cache'ten.
  const [livePrice,setLivePrice]=useState(null);

    if(p)return;

  const divTxs=tickerTxs.filter(t=>t.way==="DIV").sort((a,b)=>a.date.localeCompare(b.date));

              {p?.type==="FUND"&&<span className="badge etf">ETF</span>}
              {p?.type==="CRYPTO"&&<span className="badge cry">₿</span>}
              {!p&&<span className="badge etf" data-tip="Portföyünde yok — keşif modu" style={{cursor:"help"}}>YOK</span>}

              {meta?.name||p?.name||"—"}

          {!hideAmts&&price!=null&&(

              <div>
                <div className="kv" style={{marginBottom:meta.description?12:0}}>
                  {rows.map(([k,v])=>(
                    <div key={k}>
                      <div className="kk">{k}</div>
                      <div className="kv_">{k==="Web"?<a href={safeUrl(v)} target="_blank" rel="noopener noreferrer" style={{color:"var(--info)",textDecoration:"none"}}>{extractDomain(v)} ↗</a>:v}</div>
                    </div>
                  ))}
                </div>
                {meta.description&&(
                  <div style={{fontSize:12,lineHeight:1.55,color:"var(--text2)"}}>
                    {showFullDesc?meta.description:meta.description.slice(0,260)+(meta.description.length>260?"…":"")}
                    {meta.description.length>260&&(
                      <button onClick={()=>setShowFullDesc(s=>!s)} style={{background:"none",border:"none",color:"var(--info)",fontSize:12,cursor:"pointer",padding:"0 0 0 4px"}}>
                        {showFullDesc?"daha az":"devamı"}
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })()}
        </div>
        );
      })()}

      {/* Fundamental — değer yatırımı checklist (US_STOCK + BIST) */}
      {supportsFund&&(
        <div className="card" style={{marginBottom:14,padding:"14px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div className="stitle" style={{marginBottom:0}}>Fundamental · Değer Yatırımı Checklist</div>
              {fund?.source==="edgar"&&<span className="badge etf" data-tip="FMP free planında yok; SEC EDGAR'dan çekildi. PE/PS bu modda boş kalır." style={{cursor:"help"}}>EDGAR</span>}
              {fund?.source==="fmp"&&<span className="badge etf" style={{opacity:.5}}>FMP</span>}
              {fund?.source==="isyatirim"&&<span className="badge etf" data-tip="İş Yatırım MaliTablo (XI_29). PE/PS henüz yok; eşikler US tarafıyla aynı (sektör-aware ileride)." style={{cursor:"help"}}>İş Yatırım</span>}
            </div>
            <button className="btn-sm" onClick={()=>fetchFund(true)} disabled={fundLoading}>{fundLoading?"...":(fund?"↻":"Çek")}</button>
          </div>
          {fundLoading&&<SkeletonRows n={5} gap={10}/>}
          {fundErr&&!fundLoading&&fundErrCode==="OUT_OF_PLAN"&&(
            <div className="warn-card">
              <div>
                <div className="wc-ttl">Ticker FMP free planında yok</div>
                <div className="wc-sub">{ticker} için FMP "Special Endpoint" gerekiyor; SEC EDGAR fallback de başarısız oldu (genelde XBRL dosyalanmamış küçük/orta şirketler). Alternatif provider gerek.</div>
              </div>
            </div>
          )}
          {fundErr&&!fundLoading&&fundErrCode!=="OUT_OF_PLAN"&&<div className="err" style={{fontSize:12}}>{fundErr}</div>}
          {!fund&&!fundLoading&&!fundErr&&<div className="dim" style={{fontSize:12}}>Henüz çekilmedi.</div>}
          {fund?.metrics&&!fundLoading&&(()=>{
            // BIST'te PE edge function'da null kalır (market price + shares gerekir).
            // borsa-mcp profile meta.pe_ratio zaten ekranda; fund.metrics'e inject edip
            // checklist'te skor üret. Cache mutate etmemek için lokal kopya.
            const metrics = (fund.source==="isyatirim"&&fund.metrics.pe==null&&meta?.pe_ratio!=null)
              ? {...fund.metrics, pe: meta.pe_ratio}
              : fund.metrics;
            const allScores=Object.entries(metrics).map(([k,v])=>fundScore(k,v)).filter(Boolean);
            const goodN=allScores.filter(s=>s==="good").length;
            // Toplam her zaman tam checklist boyutu (21) — null metrikler de kriter sayılır,
            // sadece "iyi" işareti almazlar
            const totalN=Object.keys(metrics).length;
            const fy=fund.raw?.latestFiscalYear;
            const yb=fund.raw?.yearsBackUsed;
            return(
              <div>
                <div style={{fontSize:11,color:"var(--text2)",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                  <span>{fy?`FY${fy}`:"TTM"}{yb?` · ${yb}Y CAGR`:""} · <strong style={{color:"var(--text)"}}>{goodN}/{totalN}</strong> kriter ✓</span>
                  <span style={{display:"flex",gap:10,alignItems:"center",fontSize:10}}>
                    <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:"50%",background:"var(--ok)"}}></span>iyi</span>
                    <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:"50%",background:"var(--warn)"}}></span>orta</span>
                    <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:"50%",background:"var(--err)"}}></span>zayıf</span>
                  </span>
                </div>
                {FUND_GROUPS.map(([groupName,items])=>(
                  <div key={groupName} style={{marginBottom:14}}>
                    <div className="stitle" style={{marginBottom:6,fontSize:9}}>{groupName}</div>
                    <div style={{background:"var(--bg3)",borderRadius:8,overflow:"hidden"}}>
                      {items.map(([key,label,type],i)=>{
                        const val=metrics[key];
                        const score=fundScore(key,val);
                        const color=score?SCORE_COLOR[score]:"var(--text2)";
                        const dotColor=score?SCORE_COLOR[score]:"var(--text3)";
                        return(
                          <div key={key} data-tip={FUND_TIP[key]}
                            style={{
                              display:"flex",alignItems:"center",gap:10,
                              padding:"8px 12px",
                              borderTop:i>0?"0.5px solid var(--border)":"none",
                              cursor:"help"
                            }}>
                            <span style={{width:7,height:7,borderRadius:"50%",background:dotColor,flex:"0 0 auto"}}></span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,color:"var(--text)",lineHeight:1.3}}>{label}</div>
                              <div style={{fontSize:10,color:"var(--text3)",marginTop:1,fontFamily:"'DM Mono',monospace"}}>{fundThreshText(key,type)}</div>
                            </div>
                            <span className="mono" style={{fontSize:14,fontWeight:600,color,flex:"0 0 auto"}}>
                              {fmtFundVal(val,type)}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
                <TrendMiniChart annual={fund?.annual} currency={fund?.raw?.currency==="TRY"?"₺":"$"}/>
                <div style={{fontSize:10,color:"var(--text3)",marginTop:8,lineHeight:1.5}}>
                  Kaynak: {
                    fund?.source==="edgar"?"SEC EDGAR (annual 10-K, son 5 yıl). PE/PS bu modda boş — market price gerek." :
                    fund?.source==="isyatirim"?"İş Yatırım MaliTablo (XI_29 yıllık, son 5 yıl). PE meta'dan; PS henüz yok. Tutarlar TRY; eşikler nominal — TR enflasyonu büyüme metriklerini şişirebilir." :
                    "Financial Modeling Prep (TTM + son 5 yıl)"
                  }. Eşikler genel value-investing kılavuzudur; sektör kıyaslaması her metriğe doğrudan uygulanmaz.
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* İşlem geçmişi */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div className="stitle" style={{marginBottom:0}}>İşlem Geçmişi · {tickerTxs.length}</div>
        {!showAdd&&<button className="pri btn-sm" onClick={()=>setShowAdd(true)}>+ Ekle</button>}
      </div>
      {showAdd&&(
        <AddTxInline ticker={ticker} user={user} pos={pos} loadData={loadData} flash_={flash_} onClose={()=>setShowAdd(false)} assetType={effectiveType} portfolioId={portfolioId}/>
      )}
      {tickerTxs.length===0?(
        <div className="dim" style={{fontSize:13,padding:"14px 0"}}>Bu ticker için işlem yok.</div>
      ):(
        <div style={{border:"0.5px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
          {tickerTxs.map(t=>{
            const cSym=t.currency==="TRY"?"₺":"$";
            const isOpen=expandedTx===t.id;
            const isEdit=editTxId===t.id;
            return(
              <div key={t.id} style={{borderBottom:"0.5px solid var(--border)"}}>
                {/* Özet satır */}
                <div onClick={()=>!isEdit&&setExpandedTx(isOpen?null:t.id)}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",cursor:isEdit?"default":"pointer"}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",flex:1,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"var(--text2)",fontFamily:"monospace",minWidth:80}}>{fmtDateTR(t.date)}</span>
                    <span className={t.way==="BUY"?"ok":t.way==="DIV"?"warn":"err"} style={{fontSize:11,minWidth:28}}>{t.way==="BUY"?"Alış":t.way==="DIV"?"Temettü":"Satış"}</span>
                    <span className="mono" style={{fontSize:12}}>{fmtShares(t.shares)} adet</span>
                    {!hideAmts&&<span className="mono dim" style={{fontSize:12}}>{mask(cSym+fmt(t.price))}</span>}
                    {!hideAmts&&<span className="mono" style={{fontSize:12,fontWeight:600}}>{mask(cSym+fmt(t.total,0))}</span>}
                    {t.broker&&<span className="dim" style={{fontSize:10}}>{t.broker}</span>}
                    {!hideAmts&&+t.commission>0&&<span className="dim" style={{fontSize:10}}>Kom: {mask(cSym+fmt(+t.commission,2))}</span>}
                  </div>
                  <span style={{color:"var(--text3)",fontSize:11,marginLeft:8}}>{isOpen?"▲":"▼"}</span>
                </div>

                {/* Expand: detay + Düzenle/Sil */}
                {isOpen&&!isEdit&&(
                  <div style={{padding:"10px 14px 12px",background:"var(--bg2)",borderTop:"0.5px solid var(--border)"}}>
                    <div className="kv" style={{marginBottom:10}}>
                      {[
                        ["Tarih",fmtDateTR(t.date)],
                        ["İşlem",t.way==="BUY"?"Alış":t.way==="DIV"?"Temettü":"Satış"],
                        ["Adet",fmtShares(t.shares,6)],
                        ["Birim Fiyat",hideAmts?"••••":cSym+fmt(t.price)],
                        ["Toplam",hideAmts?"••••":cSym+fmt(t.total,2)],
                        ["Komisyon",hideAmts?"••••":cSym+fmt(+t.commission||0,2)],
                        ["Para Birimi",t.currency||"USD"],
                        ["Broker",t.broker||"—"],
                        ["Borsa",t.exchange||"—"],
                        ["Tür",TL[t.asset_type]||t.asset_type||"—"],
                      ].map(([k,v])=>(
                        <div key={k}><div className="kk">{k}</div><div className="kv_">{String(v)}</div></div>
                      ))}
                    </div>
                    {t.notes&&(
                      <div style={{marginBottom:10}}>
                        <div className="kk" style={{marginBottom:3}}>Not</div>
                        <div style={{fontSize:12,color:"var(--text2)"}}>{t.notes}</div>
                      </div>
                    )}
                    <div className="brow">
                      <button className="btn-sm" onClick={()=>startEditTx(t)}>Düzenle</button>
                      <button className="btn-sm btn-danger-out" onClick={()=>delTxRow(t)}>Sil</button>
                    </div>
                  </div>
                )}

                {/* Edit form */}
                {isEdit&&(
                  <div style={{padding:"12px 14px",background:"var(--bg3)",borderTop:"0.5px solid var(--border)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      <div><div className="kk" style={{marginBottom:3}}>Tarih</div><input className="finp sm" type="date" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))} max={today()}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>İşlem</div>
                        <select className="finp sm" value={editForm.way} onChange={e=>setEditForm(f=>({...f,way:e.target.value}))}>
                          <option value="BUY">Alış</option><option value="SELL">Satış</option><option value="DIV">Temettü</option>
                        </select></div>
                      <div><div className="kk" style={{marginBottom:3}}>Para</div>
                        <select className="finp sm" value={editForm.currency} onChange={e=>setEditForm(f=>({...f,currency:e.target.value}))}>
                          <option>USD</option><option>TRY</option><option>EUR</option>
                        </select></div>
                      <div><div className="kk" style={{marginBottom:3}}>Adet</div><input className="finp sm" type="number" step="any" value={editForm.shares} onChange={e=>setEditForm(f=>({...f,shares:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Fiyat</div><input className="finp sm" type="number" step="any" value={editForm.price} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))}/></div>
                      <div><div className="kk" style={{marginBottom:3}}>Komisyon</div><input className="finp sm" type="number" step="any" value={editForm.commission} onChange={e=>setEditForm(f=>({...f,commission:e.target.value}))}/></div>
                      <div style={{gridColumn:"span 3"}}><div className="kk" style={{marginBottom:3}}>Broker</div><input className="finp sm" maxLength={50} value={editForm.broker} onChange={e=>setEditForm(f=>({...f,broker:e.target.value}))}/></div>
                    </div>
                    <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Toplam: {editForm.currency==="TRY"?"₺":"$"}{fmt((+editForm.shares)*(+editForm.price),2)}</div>
                    <div className="brow">
                      <button className="pri btn-md" onClick={()=>saveEditTx(t)} disabled={savingTx}>{savingTx?"...":"Kaydet"}</button>
                      <button className="btn-md" onClick={cancelEditTx} disabled={savingTx}>İptal</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── AccountSection — Ayarlar içinde hesap yönetimi ──────────────
function AccountSection({user,profile,flash_,confirm_,onSaved}){
  const [editing,setEditing]=useState(null); // null | "pw" | "email" | "uname"
  const [pw1,setPw1]=useState("");
  const [pw2,setPw2]=useState("");
  const [email,setEmail]=useState("");
  const [uname,setUname]=useState("");
  const [busy,setBusy]=useState(false);

  // Profilim state
  const [profileOpen,setProfileOpen]=useState(false);
  const [bioVal,setBioVal]=useState("");
  const [avatarVal,setAvatarVal]=useState("👤");
  const [profilePublic,setProfilePublic]=useState(false);
  const [profileBusy,setProfileBusy]=useState(false);

  const saveProfile=async()=>{
    if(bioVal.length>160){flash_("Bio 160 karakteri geçemez","err");return;}
    setProfileBusy(true);
    const{error}=await sb.from("profiles").upsert({
      user_id:user.id,
      bio:bioVal.trim()||null,
      avatar_emoji:avatarVal,
      is_profile_public:profilePublic,
      updated_at:new Date().toISOString()
    },{onConflict:"user_id"});
    setProfileBusy(false);
    if(error){flash_("Kaydedilemedi","err");return;}
    flash_("Profil güncellendi ✓");
    if(onSaved)onSaved();
  };

  const cancel=()=>{setEditing(null);setPw1("");setPw2("");setEmail("");setUname("");};

  const savePw=async()=>{
    if(pw1.length<6){flash_("Şifre en az 6 karakter olmalı","err");return;}
    if(pw1!==pw2){flash_("Şifreler eşleşmiyor","err");return;}
    setBusy(true);
    const{error}=await sb.auth.updateUser({password:pw1});
    setBusy(false);
    if(error){flash_(error.message,"err");return;}
    flash_("Şifre güncellendi ✓");cancel();
  };

  const saveEmail=async()=>{
    if(!email||!email.includes("@")){flash_("Geçerli bir e-posta gir","err");return;}
    if(!(await confirm_(`${email} adresine onay maili gönderilecek. Onay verene kadar eski e-posta geçerli kalır.`,{okLbl:"Devam"})))return;
    setBusy(true);
    const{error}=await sb.auth.updateUser({email});
    setBusy(false);
    if(error){flash_(error.message,"err");return;}
    flash_("Onay maili gönderildi — yeni e-postanı kontrol et");cancel();
  };

  const saveUname=async()=>{
    if(!/^[a-z0-9_]{3,20}$/.test(uname)){
      flash_("3-20 karakter, küçük harf / rakam / alt tire","err");return;
    }
    setBusy(true);
    const{error}=await sb.from("profiles").upsert({
      user_id:user.id,username:uname,updated_at:new Date().toISOString()
    },{onConflict:"user_id"});
    setBusy(false);
    if(error){
      if(error.code==="23505"||(error.message||"").includes("duplicate")){
        flash_("Bu kullanıcı adı zaten alınmış","err");
      } else {
        flash_(error.message,"err");
      }
      return;
    }
    flash_("Kullanıcı adı kaydedildi ✓");cancel();
    if(onSaved)onSaved();
  };

  return(
    <div className="sg">
      <label>Hesap</label>
      {/* Profilim — collapsible */}
      <div style={{borderBottom:"1px solid var(--border)",paddingBottom:10,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"}}>
          <div>
            <div style={{fontSize:11,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Profilim</div>
            <div style={{fontSize:13,marginTop:2}}>
              <span style={{marginRight:6}}>{profile?.avatar_emoji||"👤"}</span>
              {profile?.bio
                ?<span style={{color:"var(--text2)",fontSize:12}}>{profile.bio.slice(0,40)}{profile.bio.length>40?"…":""}</span>
                :<span className="dim" style={{fontSize:12}}>Bio eklenmemiş</span>}
            </div>
          </div>
          <button className="btn-sm" onClick={()=>{
            if(!profileOpen){
              setBioVal(profile?.bio||"");
              setAvatarVal(profile?.avatar_emoji||"👤");
              setProfilePublic(profile?.is_profile_public||false);
            }
            setProfileOpen(o=>!o);
          }}>{profileOpen?"Kapat":"Düzenle"}</button>
        </div>

        {profileOpen&&(
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"12px 14px",marginTop:8}}>
            <div className="kk" style={{marginBottom:6}}>Avatar</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
              {["👤","🦁","🐯","🦊","🐻","🦅","🌊","⚡","🔥","💎","🚀","🎯"].map(e=>(
                <button key={e} onClick={()=>setAvatarVal(e)}
                  style={{
                    width:36,height:36,borderRadius:8,border:`2px solid ${avatarVal===e?"var(--info)":"transparent"}`,
                    background:avatarVal===e?"rgba(102,88,255,0.15)":"var(--bg4)",
                    fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"
                  }}>{e}</button>
              ))}
            </div>

            <div className="kk" style={{marginBottom:4}}>Bio <span style={{color:"var(--text3)",fontWeight:400}}>{bioVal.length}/160</span></div>
            <textarea
              className="finp sm"
              value={bioVal}
              onChange={e=>setBioVal(e.target.value.slice(0,160))}
              placeholder="Kendini kısaca tanıt..."
              rows={3}
              maxLength={160}
              style={{resize:"none",width:"100%",marginBottom:12,boxSizing:"border-box"}}
            />

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:12,fontWeight:500}}>Profili herkese göster</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>Diğer kullanıcılar adını ve biyografini görebilir</div>
              </div>
              <button
                className={"btn-sm"+(profilePublic?" btn-danger-out":"")}
                onClick={()=>setProfilePublic(v=>!v)}
                style={{flexShrink:0}}
              >{profilePublic?"Gizle":"Göster"}</button>
            </div>

            <div className="brow">
              <button className="pri btn-md" onClick={saveProfile} disabled={profileBusy}>
                {profileBusy?"Kaydediliyor...":"Kaydet"}
              </button>
              <button className="btn-md" onClick={()=>setProfileOpen(false)} disabled={profileBusy}>İptal</button>
            </div>
          </div>
        )}
      </div>

      {/* Kullanıcı adı satırı */}
      <div className="row" style={{borderBottom:"none",padding:"5px 0"}}>
        <div>
          <div style={{fontSize:11,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Kullanıcı Adı</div>
          <div className="mono" style={{fontSize:13}}>
            {profile?.username?<span>@{profile.username}</span>:<span className="dim">Henüz yok</span>}
          </div>
        </div>
        {editing!=="uname"&&<button className="btn-sm" onClick={()=>{setEditing("uname");setUname(profile?.username||"");}}>{profile?.username?"Değiştir":"Oluştur"}</button>}
      </div>
      {editing==="uname"&&(
        <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginTop:8}}>
          <div className="kk" style={{marginBottom:4}}>Kullanıcı adı</div>
          <input className="finp sm" value={uname} onChange={e=>setUname(e.target.value.toLowerCase())} placeholder="ornek_user" maxLength={20} style={{marginBottom:4}}/>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:8}}>3-20 karakter · küçük harf, rakam, alt tire</div>
          <div className="brow">
            <button className="pri btn-md" onClick={saveUname} disabled={busy||!uname}>{busy?"Kaydediliyor...":"Kaydet"}</button>
            <button className="btn-md" onClick={cancel} disabled={busy}>İptal</button>
          </div>
        </div>
      )}
      {/* E-posta satırı */}
      <div className="row" style={{borderBottom:"none",padding:"5px 0"}}>
        <div>
          <div style={{fontSize:11,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>E-posta</div>
          <div className="mono" style={{fontSize:13}}>{user.email}</div>
        </div>
        {editing!=="email"&&<button className="btn-sm" onClick={()=>{setEditing("email");setEmail("");}}>Değiştir</button>}
      </div>
      {editing==="email"&&(
        <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginTop:8}}>
          <div className="kk" style={{marginBottom:4}}>Yeni e-posta</div>
          <input className="finp sm" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="yeni@ornek.com" style={{marginBottom:8}}/>
          <div className="brow">
            <button className="pri btn-md" onClick={saveEmail} disabled={busy||!email}>{busy?"Kaydediliyor...":"Onay Gönder"}</button>
            <button className="btn-md" onClick={cancel} disabled={busy}>İptal</button>
          </div>
        </div>
      )}
      {/* Şifre satırı */}
      <div className="row" style={{borderBottom:"none",padding:"5px 0"}}>
        <div>
          <div style={{fontSize:11,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Şifre</div>
          <div className="mono" style={{fontSize:13,color:"var(--text2)"}}>••••••••</div>
        </div>
        {editing!=="pw"&&<button className="btn-sm" onClick={()=>{setEditing("pw");setPw1("");setPw2("");}}>Değiştir</button>}
      </div>
      {editing==="pw"&&(
        <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 12px",marginTop:8}}>
          <div className="kk" style={{marginBottom:4}}>Yeni şifre</div>
          <input className="finp sm" type="password" value={pw1} onChange={e=>setPw1(e.target.value)} placeholder="En az 6 karakter" style={{marginBottom:8}}/>
          <div className="kk" style={{marginBottom:4}}>Yeni şifre (tekrar)</div>
          <input className="finp sm" type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Tekrar yaz" style={{marginBottom:8}}/>
          <div className="brow">
            <button className="pri btn-md" onClick={savePw} disabled={busy||!pw1||!pw2}>{busy?"Kaydediliyor...":"Şifreyi Güncelle"}</button>
            <button className="btn-md" onClick={cancel} disabled={busy}>İptal</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ConfirmBox (AddTab dışında!) ─────────────────────────────────
// Parse sonuç onayı — array (1 veya N işlem) destekler. Tek işlemde detay
// kv-grid; çoklu işlemde compact satır listesi + per-row remove.
function ConfirmBox({data,onSave,onCancel}){
  const toArr=(d)=>Array.isArray(d)?d:(d?[d]:[]);
  const [items,setItems]=useState(()=>toArr(data));
  useEffect(()=>setItems(toArr(data)),[data]);
  if(!items||items.length===0)return null;

  const symFor=(cur)=>cur==="TRY"?"₺":(cur==="EUR"?"€":"$");
  const upd=(idx,patch)=>setItems(prev=>prev.map((it,i)=>i===idx?{...it,...patch}:it));

  // Tek işlem: kv-grid + düzenlenebilir alanlar
  if(items.length===1){
    const d=items[0];
    const c=symFor(d.currency);
    const total=(+(d.shares)||0)*(+(d.price)||0);
    const priceFlag=d._priceFallback
      ?<span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:"rgba(255,184,0,0.15)",color:"var(--warn)",fontWeight:600}}>⚠ son kapanış</span>
      :d._priceAutoFilled
        ?<span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:"rgba(0,217,126,0.12)",color:"var(--ok)",fontWeight:600}}>↻ otomatik</span>
        :null;
    const inp=(val,onChange,type="text",extra={})=>(
      <input className="finp sm" type={type} value={val||""} onChange={e=>onChange(e.target.value)}
        style={{marginBottom:0,padding:"3px 8px",height:28,...extra}}/>
    );
    const rows=[
      ["Tarih",inp(d.date,v=>upd(0,{date:v}),"date")],
      ["Ticker",<span className="mono" style={{fontWeight:700}}>{d.ticker}</span>],
      ["Şirket",d.name||"—"],
      ["Tür",TL[d.asset_type]||d.asset_type||"—"],
      ["İşlem",d.way==="BUY"?"Alış":d.way==="DIV"?"Temettü":"Satış"],
      ["Adet",inp(d.shares,v=>upd(0,{shares:v}),"number",{width:80})],
      ["Fiyat",<span style={{display:"flex",alignItems:"center",gap:6}}>{inp(d.price,v=>upd(0,{price:v}),"number",{width:90})}{priceFlag}</span>],
      ["Toplam",c+fmt(total,0)],
      ["Broker",inp(d.broker||"",v=>upd(0,{broker:v}))],
      ["Komisyon",inp(d.commission||"",v=>upd(0,{commission:v}),"number",{width:90})],
    ];
    return(
      <div className="cbox" style={{marginTop:16}}>
        <div className="lbl" style={{marginBottom:12}}>Parse sonucu — düzenle ve doğrula</div>
        <div className="kv">
          {rows.map(([k,v])=>(
            <div key={k}><div className="kk">{k}</div><div className="kv_" style={{display:"flex",alignItems:"center"}}>{typeof v==="string"?v:v}</div></div>
          ))}
        </div>
        <div className="brow">
          <button className="pri" onClick={()=>onSave(items)}>Kaydet</button>
          <button onClick={onCancel}>İptal</button>
        </div>
      </div>
    );
  }

  // Çoklu işlem: satır listesi + per-row edit
  const [editIdx,setEditIdx]=useState(null);
  const remove=(idx)=>{setItems(prev=>prev.filter((_,i)=>i!==idx));if(editIdx===idx)setEditIdx(null);};
  return(
    <div className="cbox" style={{marginTop:16}}>
      <div className="lbl" style={{marginBottom:12}}>Parse sonucu — {items.length} işlem doğrula</div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
        {items.map((tx,idx)=>{
          const c=symFor(tx.currency);
          const total=(+tx.shares)*(+tx.price);
          const isEdit=editIdx===idx;
          return(
            <div key={idx} style={{background:"var(--bg3)",borderRadius:8,overflow:"hidden"}}>
              <div style={{padding:"9px 12px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text2)",minWidth:80}}>{fmtDateTR(tx.date)}</span>
                <span style={{fontWeight:600,fontSize:13,minWidth:60}}>{tx.ticker}</span>
                <span className={tx.way==="BUY"?"ok":tx.way==="DIV"?"warn":"err"} style={{fontSize:11,minWidth:32}}>{tx.way==="BUY"?"Alış":tx.way==="DIV"?"Temettü":"Satış"}</span>
                <span className="mono" style={{fontSize:12,color:"var(--text2)",display:"flex",alignItems:"center",gap:5}}>
                  {fmtShares(tx.shares)} × {c}{fmt(tx.price)}
                  {tx._priceFallback&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:10,background:"rgba(255,184,0,0.15)",color:"var(--warn)",fontWeight:600}}>⚠ son kapanış</span>}
                  {!tx._priceFallback&&tx._priceAutoFilled&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:10,background:"rgba(0,217,126,0.12)",color:"var(--ok)",fontWeight:600}}>↻ otomatik</span>}
                </span>
                <span className="mono" style={{fontSize:12,fontWeight:600,marginLeft:"auto"}}>{c}{fmt(total,0)}</span>
                <button onClick={()=>setEditIdx(isEdit?null:idx)} data-tip={isEdit?"Düzenlemeyi kapat":"Bu işlemi düzenle"}
                  style={{padding:"3px 7px",fontSize:12,color:isEdit?"var(--info)":"var(--text3)",borderColor:"var(--border)",background:"transparent"}}>✎</button>
                <button onClick={()=>remove(idx)} data-tip="Bu işlemi listeden çıkar"
                  style={{padding:"3px 8px",fontSize:14,lineHeight:1,color:"var(--err)",borderColor:"rgba(255,51,102,0.25)",background:"transparent"}}>×</button>
              </div>
              {isEdit&&(
                <div style={{padding:"8px 12px 10px",borderTop:"1px solid var(--border)",display:"flex",flexWrap:"wrap",gap:8,alignItems:"flex-end"}}>
                  <div><div className="kk" style={{marginBottom:3}}>Tarih</div><input className="finp sm" type="date" value={tx.date||""} onChange={e=>upd(idx,{date:e.target.value})} style={{height:28,padding:"3px 8px"}}/></div>
                  <div><div className="kk" style={{marginBottom:3}}>Adet</div><input className="finp sm" type="number" step="any" value={tx.shares||""} onChange={e=>upd(idx,{shares:e.target.value})} style={{height:28,padding:"3px 8px",width:80}}/></div>
                  <div><div className="kk" style={{marginBottom:3}}>Fiyat ({c})</div><input className="finp sm" type="number" step="any" value={tx.price||""} onChange={e=>upd(idx,{price:e.target.value})} style={{height:28,padding:"3px 8px",width:90}}/></div>
                  <div><div className="kk" style={{marginBottom:3}}>Broker</div><input className="finp sm" type="text" value={tx.broker||""} onChange={e=>upd(idx,{broker:e.target.value})} style={{height:28,padding:"3px 8px",width:90}}/></div>
                  <div><div className="kk" style={{marginBottom:3}}>Komisyon</div><input className="finp sm" type="number" step="any" value={tx.commission||""} onChange={e=>upd(idx,{commission:e.target.value})} style={{height:28,padding:"3px 8px",width:80}}/></div>
                  <button className="btn-xs" style={{color:"var(--info)",borderColor:"var(--info)"}} onClick={()=>setEditIdx(null)}>✓ Tamam</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="brow">
        <button className="pri" onClick={()=>onSave(items)}>{items.length} İşlemi Kaydet</button>
        <button onClick={onCancel}>İptal</button>
      </div>
    </div>
  );
}

// ── HistoryTab ───────────────────────────────────────────────────
function HistoryTab({txs,user,loadData,flash_,confirm_,mask,hideAmts,setTab,openDetail,initialSearch,onConsume,splits,portfolioId}){
  const [open,setOpen]=useState(()=>initialSearch?{[initialSearch.toUpperCase()]:true}:{});
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [search,setSearch]=useState(initialSearch||"");
  const [wayF,setWayF]=useState("all");
  const [dateF,setDateF]=useState("all");
  useEffect(()=>{if(initialSearch&&onConsume)onConsume();},[]);

  const filtered=txs.filter(t=>{
    if(search){
      const q=search.toLowerCase();
      if(!t.ticker.toLowerCase().includes(q)&&!(t.name||"").toLowerCase().includes(q))return false;
    }
    if(wayF!=="all"&&t.way!==wayF)return false;
    if(dateF!=="all"){
      const days={d30:30,d90:90,y1:365}[dateF];
      if(days){const cutoff=new Date(Date.now()-days*86400000).toISOString().split("T")[0];if(t.date<cutoff)return false;}
    }
    return true;
  });

  const grouped={};
  filtered.forEach(t=>{if(!grouped[t.ticker])grouped[t.ticker]=[];grouped[t.ticker].push(t);});
  const tickers=Object.keys(grouped).sort();
  const isFiltered=search||wayF!=="all"||dateF!=="all";
  const clearFilters=()=>{setSearch("");setWayF("all");setDateF("all");};

  const startEdit=t=>{
    setEditId(t.id);
    setEditForm({date:t.date,way:t.way,shares:t.shares,price:t.price,currency:t.currency||"USD",broker:t.broker||"",commission:t.commission||0,notes:t.notes||""});
  };

  const saveEdit=async(t)=>{
    setSaving(true);
    const{error}=await sb.from("transactions").update({
      date:editForm.date,way:editForm.way,shares:+editForm.shares,price:+editForm.price,
      currency:editForm.currency,total:+((+editForm.shares)*(+editForm.price)).toFixed(4),
      broker:editForm.broker,commission:+(editForm.commission||0),notes:editForm.notes||""
    }).eq("id",t.id).eq("user_id",user.id);
    if(error){flash_(error.message,"err");}
    else{await rebuildPositions(user.id,portfolioId);await loadData();flash_("Güncellendi ✓");setEditId(null);}
    setSaving(false);
  };

  const delTx=async(t)=>{
    if(!(await confirm_(`${t.ticker} — ${fmtDateTR(t.date)} işlemi silinsin mi?`,{okLbl:"Sil"})))return;
    await sb.from("transactions").delete().eq("id",t.id).eq("user_id",user.id);
    await rebuildPositions(user.id,portfolioId);await loadData();flash_("Silindi ✓");
  };

  if(txs.length===0)return(
    <div className="empty-card">
      <div className="ic">📝</div>
      <div className="ttl">Henüz işlem yok</div>
      <div className="sub">Metin, görüntü, CSV veya manuel giriş — ilk işlemini ekle.</div>
      <button className="pri" onClick={()=>setTab&&setTab("add")}>+ İlk işlemi ekle</button>
    </div>
  );

  return(
    <div>
      {/* Filter toolbar */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <input className="finp sm" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Ticker veya şirket..." style={{flex:"1 1 160px",minWidth:140}}/>
        <select className="finp sm" value={wayF} onChange={e=>setWayF(e.target.value)} style={{flex:"0 0 auto",width:90}}>
          <option value="all">Tümü</option>
          <option value="BUY">Alış</option>
          <option value="SELL">Satış</option>
          <option value="DIV">Temettü</option>
        </select>
        <select className="finp sm" value={dateF} onChange={e=>setDateF(e.target.value)} style={{flex:"0 0 auto",width:120}}>
          <option value="all">Tüm zamanlar</option>
          <option value="d30">Son 30 gün</option>
          <option value="d90">Son 90 gün</option>
          <option value="y1">Son 1 yıl</option>
        </select>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span className="dim" style={{fontSize:12}}>
          {isFiltered?`${filtered.length} / ${txs.length}`:filtered.length} işlem · {tickers.length} varlık
          {isFiltered&&<button className="btn-xs" style={{marginLeft:8}} onClick={clearFilters}>Temizle</button>}
        </span>
        <div className="brow">
          <button className="pri btn-sm" onClick={()=>setTab&&setTab("add")}>+ Ekle</button>
          <button className="btn-sm" onClick={()=>setOpen(Object.fromEntries(tickers.map(t=>[t,true])))}>Tümünü Aç</button>
          <button className="btn-sm" onClick={()=>setOpen({})}>Kapat</button>
        </div>
      </div>
      {filtered.length===0&&(
        <div className="empty-card" style={{padding:"28px 20px"}}>
          <div className="ic">🔍</div>
          <div className="ttl">Eşleşen işlem yok</div>
          <div className="sub">Filtreleri değiştir ya da temizle.</div>
          <button className="pri" onClick={clearFilters}>Filtreleri temizle</button>
        </div>
      )}
      {tickers.map(tk=>{
        const items=grouped[tk];
        const isOpen=!!open[tk];
        const tot=items.reduce((a,t)=>a+(t.way==="BUY"?-(+t.total):+(+t.total)),0);
        const groupSym=displaySym(items[0]?.currency||"USD");
        return(
          <div key={tk} style={{marginBottom:8,border:"0.5px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
            <div onClick={()=>setOpen(o=>({...o,[tk]:!o[tk]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"var(--bg2)",cursor:"pointer"}}>
